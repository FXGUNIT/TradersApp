# ─────────────────────────────────────────────────────────────────────────────
# TradersApp — Observability Stack Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Self-hosted: Prometheus + Grafana + Loki + Jaeger for TradersApp ML Engine.
#
# Start:
#   docker compose -f docker-compose.observability.yml up -d
#
# Access:
#   Grafana:    http://localhost:3001  (admin / traders123)
#   Prometheus: http://localhost:9090
#   Loki:       http://localhost:3100  (via Grafana datasource)
#   Jaeger:     http://localhost:16686
# ─────────────────────────────────────────────────────────────────────────────

version: "3.8"

services:
  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: traders-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./k8s/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./k8s/observability/alerts:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--rule.path=/etc/prometheus/rules'
      - '--web.page-title=TradersApp Prometheus'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── Alertmanager (internal, for Docker Compose standalone) ─────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: traders-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./k8s/observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    container_name: traders-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: traders123
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
      GF_ALERTING_ENABLED: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./k8s/observability/grafana-provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  # ── Loki (Log aggregation) ────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.2.0
    container_name: traders-loki
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
      - ./k8s/observability/loki.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    depends_on:
      - promtail
    restart: unless-stopped

  # ── Promtail (Log shipper) ──────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.2.0
    container_name: traders-promtail
    volumes:
      - /var/log:/var/log:ro
      - ./k8s/observability/promtail.yml:/etc/promtail/config.yml:ro
      # Ship ML Engine logs
      - ml-engine-logs:/var/log/tradersapp/ml-engine:ro
      # Ship BFF logs
      - bff-logs:/var/log/tradersapp/bff:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

  # ── Jaeger (Distributed tracing) ─────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.59
    container_name: traders-jaeger
    ports:
      - "16686:16686"  # UI
      - "6831:6831"   # UDP agent (legacy)
      - "14268:14268"  # HTTP collector
      - "4317:4317"   # gRPC collector (OTLP)
      - "4318:4318"   # HTTP OTLP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_KEY: /badger/data
      BADGER_DIRECTORY_VALUE: /badger/wal
      # OTLP exporter config
      JAEGER_ENDPOINT: http://localhost:14268/api/traces
    volumes:
      - jaeger-data:/badger
    restart: unless-stopped

  # ── Node Exporter (host metrics) ───────────────────────────────────────────
  # Note: runs on Docker host, not in container. Install separately:
  #   docker run -d --name node-exporter -p 9100:9100 prom/node-exporter
  # Or on host: wget https://github.com/prometheus/node_exporter/releases/...

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  jaeger-data:
  alertmanager-data:
  ml-engine-logs:
  bff-logs: