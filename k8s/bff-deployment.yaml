# k8s/bff-deployment.yaml — Node.js BFF on k3s
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: tradersapp
  labels:
    app: bff
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bff
  template:
    metadata:
      labels:
        app: bff
        tier: api
    spec:
      containers:
        - name: bff
          image: tradersapp/bff:latest
          ports:
            - containerPort: 8788
          env:
            - name: ML_ENGINE_URL
              value: "http://ml-engine:8001"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8788
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8788
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: bff
  namespace: tradersapp
spec:
  type: ClusterIP
  selector:
    app: bff
  ports:
    - port: 8788
      targetPort: 8788
