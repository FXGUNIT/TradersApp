# External Secrets Operator Configuration
# Syncs secrets from Infisical to Kubernetes secrets
# Version: 1.0.0
# Updated: 2026-04-06

---
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
  labels:
    owner: security
    environment: production

---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: infisical-backend
  namespace: external-secrets
spec:
  provider:
    gcpsm:
      projectID: ""  # Not using GCP
    aws:
      service: SecretsManager
      region: ""  # Not using AWS
    vault:
      server: ""  # Not using Vault
    webhook:
      url: ""  # Not using webhook
    doppler:
      server: ""  # Not using Doppler
    # Infisical configuration
    generic:
      # Infisical is configured via Infisical operator
      # This is a placeholder for the Infisical provider

---
# Infisical Secret Store
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: infisical
  namespace: tradersapp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical-backend
    kind: ClusterSecretStore
  target:
    name: external-secrets-async
    creationPolicy: Owner
    deletionPolicy: Retain
  metadata:
    requestType: V2

---
# BFF Service Secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bff-secrets
  namespace: tradersapp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: SecretStore
  target:
    name: bff-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: bff/jwt-secret
        property: value
    - secretKey: KEYCLOAK_URL
      remoteRef:
        key: keycloak/url
        property: value
    - secretKey: KEYCLOAK_REALM
      remoteRef:
        key: keycloak/realm
        property: value
    - secretKey: KEYCLOAK_CLIENT_ID
      remoteRef:
        key: keycloak/clients/bff
        property: clientId
    - secretKey: KEYCLOAK_CLIENT_SECRET
      remoteRef:
        key: keycloak/clients/bff
        property: clientSecret

---
# ML Engine Secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ml-engine-secrets
  namespace: tradersapp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: SecretStore
  target:
    name: ml-engine-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: ml-engine/database
        property: url
    - secretKey: MLFLOW_TRACKING_URI
      remoteRef:
        key: ml-engine/mlflow
        property: uri
    - secretKey: REDIS_URL
      remoteRef:
        key: ml-engine/redis
        property: url
    - secretKey: KEYCLOAK_CLIENT_ID
      remoteRef:
        key: keycloak/clients/ml-engine
        property: clientId
    - secretKey: KEYCLOAK_CLIENT_SECRET
      remoteRef:
        key: keycloak/clients/ml-engine
        property: clientSecret
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: ml-engine/api-keys
        property: openai
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: ml-engine/api-keys
        property: anthropic

---
# Telegram Bridge Secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: telegram-bridge-secrets
  namespace: tradersapp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: SecretStore
  target:
    name: telegram-bridge-secrets
    creationPolicy: Owner
  data:
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: telegram/bot-token
        property: value
    - secretKey: SUPPORT_API_KEY
      remoteRef:
        key: telegram/support-api-key
        property: value

---
# MLflow Secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mlflow-runtime-secret
  namespace: tradersapp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: SecretStore
  target:
    name: mlflow-runtime-secret
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_DB
      remoteRef:
        key: mlflow/postgres-db
        property: value
    - secretKey: POSTGRES_USER
      remoteRef:
        key: mlflow/postgres-user
        property: value
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: mlflow/postgres-password
        property: value
    - secretKey: MINIO_ROOT_USER
      remoteRef:
        key: mlflow/minio-root-user
        property: value
    - secretKey: MINIO_ROOT_PASSWORD
      remoteRef:
        key: mlflow/minio-root-password
        property: value

---
# Keycloak Secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-admin-secret
  namespace: keycloak
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: infisical
    kind: SecretStore
  target:
    name: keycloak-admin-secret
    creationPolicy: Owner
  data:
    - secretKey: KEYCLOAK_ADMIN_PASSWORD
      remoteRef:
        key: keycloak/admin-password
        property: value
    - secretKey: KEYCLOAK_DB_PASSWORD
      remoteRef:
        key: keycloak/database-password
        property: value

---
# Prometheus/Grafana Secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: observability-secrets
  namespace: observability
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: infisical
    kind: SecretStore
  target:
    name: observability-secrets
    creationPolicy: Owner
  data:
    - secretKey: GRAFANA_ADMIN_PASSWORD
      remoteRef:
        key: observability/grafana
        property: adminPassword
    - secretKey: ALERTMANAGER_WEBHOOK_URL
      remoteRef:
        key: observability/alertmanager
        property: webhookUrl
    - secretKey: SLACK_WEBHOOK_URL
      remoteRef:
        key: observability/slack
        property: webhookUrl

---
# Certificate Secrets (for mTLS)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mtls-certificates
  namespace: tradersapp
spec:
  refreshInterval: 168h  # 7 days - certificates rotate monthly
  secretStoreRef:
    name: infisical
    kind: SecretStore
  target:
    name: mtls-certificates
    creationPolicy: Owner
  data:
    - secretKey: CA_CERT
      remoteRef:
        key: certificates/ca
        property: cert
    - secretKey: CA_KEY
      remoteRef:
        key: certificates/ca
        property: key
        propertyFilter: "false"  # Never expose CA private key
    - secretKey: BFF_CERT
      remoteRef:
        key: certificates/bff
        property: cert
    - secretKey: BFF_KEY
      remoteRef:
        key: certificates/bff
        property: key
    - secretKey: ML_ENGINE_CERT
      remoteRef:
        key: certificates/ml-engine
        property: cert
    - secretKey: ML_ENGINE_KEY
      remoteRef:
        key: certificates/ml-engine
        property: key
