# k8s/base/network-policies.yaml — Zero-trust network policies for TradersApp
#
# Principle: deny all, allow explicit. Every service can only talk to
# what it needs to, nothing more.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ml-engine-policy
  namespace: tradersapp
spec:
  podSelector:
    matchLabels:
      app: ml-engine
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # BFF and other internal services only
    - from:
        - podSelector:
            matchLabels:
              app: bff
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 8001
  egress:
    # Outbound: Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # Outbound: PostgreSQL (MLflow backend)
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Outbound: Kafka
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
    # Outbound: MLflow
    - to:
        - podSelector:
            matchLabels:
              app: mlflow
      ports:
        - protocol: TCP
          port: 5000
    # Outbound: DNS (kubernetes.io/cluster-dns)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Outbound: Jaeger (observability)
    - to:
        - podSelector:
            matchLabels:
              app: jaeger
      ports:
        - protocol: TCP
          port: 6831
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bff-policy
  namespace: tradersapp
spec:
  podSelector:
    matchLabels:
      app: bff
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Frontend only
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 8788
    # External via Ingress (tradersapp.local)
    - from: []
      ports:
        - protocol: TCP
          port: 8788
  egress:
    # Outbound: ML Engine
    - to:
        - podSelector:
            matchLabels:
              app: ml-engine
      ports:
        - protocol: TCP
          port: 8001
    # Outbound: DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-policy
  namespace: tradersapp
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # External via Ingress
    - from: []
      ports:
        - protocol: TCP
          port: 80
  egress:
    # Outbound: BFF only
    - to:
        - podSelector:
            matchLabels:
              app: bff
      ports:
        - protocol: TCP
          port: 8788
    # Outbound: DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-policy
  namespace: tradersapp
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: ml-engine
        - podSelector:
            matchLabels:
              app: bff
      ports:
        - protocol: TCP
          port: 6379
  egress: []  # Redis is stateless cache, no outbound needed
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kafka-policy
  namespace: tradersapp
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: ml-engine
      ports:
        - protocol: TCP
          port: 9092
  egress: []  # Kafka brokers don't need outbound in single-node
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: observability-policy
  namespace: tradersapp
spec:
  # All observability pods (prometheus, grafana, loki, jaeger)
  podSelector:
    matchExpressions:
      - key: tier
        operator: In
        values:
          - observability
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # ML Engine and BFF can push metrics/traces
    - from:
        - podSelector:
            matchLabels:
              app: ml-engine
        - podSelector:
            matchLabels:
              app: bff
  egress:
    # Prometheus egress to metrics targets (cloud, etc.)
    - to:
        - namespaceSelector: {}