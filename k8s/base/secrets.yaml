# k8s/base/secrets.yaml — Secrets for TradersApp k8s deployment
#
# IMPORTANT: This file is a TEMPLATE ONLY.
# Real secrets are managed via External Secrets Operator (see external-secrets.yaml)
# NEVER commit actual secrets to version control.
#
# This file documents the required secrets without containing actual values.
# Secrets are automatically synced from Infisical to Kubernetes secrets.
#
# To manually create secrets (only for local development):
#   kubectl create secret generic tradersapp-secrets \
#     --from-literal=POSTGRES_PASSWORD=your_real_password \
#     --from-literal=JWT_SECRET=your_real_jwt_secret \
#     --namespace=tradersapp
#
# For production: All secrets are managed via External Secrets Operator
# See: k8s/base/external-secrets.yaml
#
---
apiVersion: v1
kind: Secret
metadata:
  name: tradersapp-secrets
  namespace: tradersapp
  labels:
    owner: security
    managed-by: external-secrets
type: Opaque
# Values below are placeholders - real values come from Infisical via External Secrets Operator
# This file is kept in git for documentation purposes only
stringData:
  # PostgreSQL (MLflow backend store)
  POSTGRES_USER: "placeholder"
  POSTGRES_PASSWORD: "placeholder"
  POSTGRES_DB: "mlflow"
  # MLflow artifact storage
  MLFLOW_BUCKET: "mlflow-artifacts"
  # Kafka credentials
  KAFKA_USERNAME: "placeholder"
  KAFKA_PASSWORD: "placeholder"
  # JWT / auth tokens
  JWT_SECRET: "placeholder"
  # BFF security
  BFF_API_KEY: "placeholder"
  # Telegram bot token (telegram-bridge)
  TELEGRAM_BOT_TOKEN: "placeholder"
  # Infisical client key (secrets management)
  INFISICAL_CLIENT_KEY: "placeholder"
---
# NOTE: All production secrets should be managed via External Secrets Operator
# See k8s/base/external-secrets.yaml for the actual secret definitions
---
# SECRETS REFERENCE TABLE:
#
# | Secret Name              | Source           | Usage                          |
# |--------------------------|------------------|--------------------------------|
# | tradersapp-secrets       | Infisical        | ML Engine, BFF, API keys       |
# | mlflow-secrets           | Infisical        | MLflow tracking                |
# | keycloak-admin-secret    | Infisical        | Keycloak admin password        |
# | observability-secrets    | Infisical        | Grafana, Prometheus, Alertmanager |
# | mtls-certificates        | Infisical        | mTLS certificates              |
# | bff-secrets              | Infisical        | BFF Keycloak client            |
# | telegram-bridge-secrets  | Infisical        | Telegram bot                    |
---
# To apply secrets from Infisical:
#   kubectl apply -f k8s/base/external-secrets.yaml
#
# To check secret sync status:
#   kubectl get externalsecrets -n tradersapp
#   kubectl describe externalsecret <secret-name> -n tradersapp
