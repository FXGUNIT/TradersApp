# k8s/base/secrets.yaml — Secrets for TradersApp k8s deployment
#
# IMPORTANT: This file contains placeholder values only.
# NEVER commit real secrets to version control.
# Replace with actual values using:
#   kubectl create secret generic tradersapp-secrets \
#     --from-literal=POSTGRES_PASSWORD=your_real_password \
#     --from-literal=JWT_SECRET=your_real_jwt_secret \
#     --namespace=tradersapp
#
# Or use external secrets management (HashiCorp Vault, AWS Secrets Manager,
# Infisical) — never store real credentials in git.
apiVersion: v1
kind: Secret
metadata:
  name: tradersapp-secrets
  namespace: tradersapp
type: Opaque
stringData:
  # PostgreSQL (MLflow backend store)
  POSTGRES_USER: "traders"
  POSTGRES_PASSWORD: "CHANGEME_replace_with_strong_password"
  POSTGRES_DB: "mlflow"
  # MLflow artifact storage
  MLFLOW_BUCKET: "mlflow-artifacts"
  # Kafka credentials
  KAFKA_USERNAME: "traders"
  KAFKA_PASSWORD: "CHANGEME_replace_with_strong_password"
  # JWT / auth tokens
  JWT_SECRET: "CHANGEME_replace_with_strong_random_secret"
  # BFF security
  BFF_API_KEY: "CHANGEME_replace_with_strong_api_key"
  # Telegram bot token (telegram-bridge)
  TELEGRAM_BOT_TOKEN: "CHANGEME_replace_with_real_token"
  # Infisical client key (secrets management)
  INFISICAL_CLIENT_KEY: "CHANGEME_replace_with_infisical_key"