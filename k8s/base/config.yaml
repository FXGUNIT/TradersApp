# k8s/base/config.yaml — ConfigMaps for non-sensitive configuration
# Secrets (passwords, tokens, API keys) go in k8s/base/secrets.yaml
# which is gitignored — never commit real secrets.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-engine-config
  namespace: tradersapp
data:
  MODEL_STORE: "/models/store"
  MODEL_STORE_READ_ONLY: "true"
  MODEL_REGISTRY_MODE: "sidecar"
  MODEL_REGISTRY_URL: "http://127.0.0.1:8010"
  MODEL_REGISTRY_PORT: "8010"
  MODEL_REGISTRY_MAX_CACHED_INSTANCES: "4"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
  KAFKA_ENABLE: "true"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  OTEL_ENABLED: "true"
  OTEL_SERVICE_NAME: "ml-engine"
  OTEL_EXPORTER_JAEGER_AGENT_HOST_NAME: "jaeger"
  OTEL_EXPORTER_JAEGER_AGENT_PORT: "6831"
  LOG_LEVEL: "INFO"
  CACHE_TTL_SECONDS: "60"
  REGIME_CACHE_TTL_SECONDS: "300"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bff-config
  namespace: tradersapp
data:
  ML_ENGINE_URL: "http://ml-engine:8001"
  BFF_PORT: "8788"
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  CACHE_TTL_MS: "60000"
  CIRCUIT_BREAKER_FAILURE_THRESHOLD: "5"
  CIRCUIT_BREAKER_TIMEOUT_SECONDS: "30"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "120"
  REQUEST_TIMEOUT_MS: "5000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-engine-env
  namespace: tradersapp
data:
  APP_PORT: "8001"
  DB_PATH: "/data/trading_data.db"
  CORS_ALLOWED_ORIGINS: "http://tradersapp.local"
  KAFKA_CONSUMER_GROUP: "ml-engine-consumers"
  KAFKA_AUTO_OFFSET_RESET: "earliest"
  MAX_CANDLES_PER_REQUEST: "10000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-config
  namespace: tradersapp
data:
  PROMETHEUS_SCRAPE_INTERVAL: "15s"
  PROMETHEUS_SCRAPE_TIMEOUT: "10s"
  GRAFANA_DEFAULT_DASHBOARD: "ml-engine"
  LOKI_RETENTION_DAYS: "7"
  JAEGER_AGENT_HOST: "jaeger"
  JAEGER_AGENT_PORT: "6831"
