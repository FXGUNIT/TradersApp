apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: tradersapp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bff
  template:
    metadata:
      labels:
        app: bff
    spec:
      imagePullSecrets:
      - name: ghcr-pull
      containers:
      - name: bff
        image: ghcr.io/fxgunit/bff:f07e82af958ebf6a3ac08cdd62e3cba60c85ccfd
        ports:
        - containerPort: 8788
        env:
        - name: BFF_PORT
          value: "8788"
        envFrom:
        - secretRef:
            name: bff-secrets
        readinessProbe:
          httpGet:
            path: /health
            port: 8788
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: tradersapp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
      - name: ghcr-pull
      containers:
      - name: frontend
        image: ghcr.io/fxgunit/frontend:f07e82af958ebf6a3ac08cdd62e3cba60c85ccfd
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-engine
  namespace: tradersapp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ml-engine
  template:
    metadata:
      labels:
        app: ml-engine
    spec:
      imagePullSecrets:
      - name: ghcr-pull
      containers:
      - name: ml-engine
        image: ghcr.io/fxgunit/ml-engine:f07e82af958ebf6a3ac08cdd62e3cba60c85ccfd
        ports:
        - containerPort: 8001
        env:
        - name: KAFKA_ENABLED
          value: "false"
        envFrom:
        - secretRef:
            name: ml-engine-secrets
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          limits:
            cpu: 1000m
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: tradersapp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      imagePullSecrets:
      - name: ghcr-pull
      containers:
      - name: redis
        image: docker.io/library/redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
