# k8s/triton-deployment.yaml — NVIDIA Triton Inference Server on k3s
# GPU-accelerated model serving with ONNX Runtime backend.
# ML Engine falls back to Triton for low-latency inference.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton
  namespace: tradersapp
  labels:
    app: triton
    tier: inference
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triton
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: triton
        tier: inference
    spec:
      # GPU node scheduling (if GPU node available)
      # nodeSelector:
      #   nvidia.com/gpu: "true"
      # tolerations:
      #   - key: nvidia.com/gpu
      #     operator: Exists
      #     effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
      containers:
        - name: triton
          # NVIDIA Triton server with ONNX Runtime backend
          image: nvcr.io/nvidia/tritonserver:24.03-py3
          imagePullPolicy: Always
          ports:
            - containerPort: 8000  # HTTP/REST
              name: http
            - containerPort: 8001  # gRPC
              name: grpc
            - containerPort: 8002  # Metrics
              name: metrics
          args:
            - tritonserver
            - --model-repository=/models/triton
            - --backend-config=onnxruntime,allow-async-execution=true
            - --strict-model-config=false
            - --log-verbose=0
            - --http-server-address=0.0.0.0
            - --grpc-server-address=0.0.0.0
            - --metrics-port=8002
            - --allow-grpc=true
            - --allow-http=true
            - --allow-metrics=true
          env:
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: all
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
              nvidia.com/gpu: 1
            limits:
              cpu: 2000m
              memory: 4Gi
              nvidia.com/gpu: 1
          startupProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            failureThreshold: 60
            periodSeconds: 10
            initialDelaySeconds: 30
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            failureThreshold: 3
            periodSeconds: 10
            initialDelaySeconds: 60
          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: 8000
            failureThreshold: 3
            periodSeconds: 30
            initialDelaySeconds: 120
          volumeMounts:
            - name: model-store
              mountPath: /models/triton
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      volumes:
        - name: model-store
          persistentVolumeClaim:
            claimName: ml-models-pvc
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: triton
  namespace: tradersapp
  labels:
    app: triton
spec:
  type: ClusterIP
  selector:
    app: triton
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: grpc
      port: 8001
      targetPort: 8001
    - name: metrics
      port: 8002
      targetPort: 8002