apiVersion: v1
kind: Namespace
metadata:
  name: tradersapp
---
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull
  namespace: tradersapp
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: '{"auths":{"ghcr.io":{"auth":"","email":"fxgunit@users.noreply.github.com"}}
---
apiVersion: v1
kind: Secret
metadata:
  name: bff-secrets
  namespace: tradersapp
type: Opaque
stringData:
  JWT_SECRET: dev-jwt-placeholder-change-in-prod
  BFF_API_KEY: dev-bff-api-key-placeholder
---
apiVersion: v1
kind: Secret
metadata:
  name: ml-engine-secrets
  namespace: tradersapp
type: Opaque
stringData:
  KEYCLOAK_CLIENT_SECRET: dev-placeholder
  AWS_SECRET_ACCESS_KEY: dev-placeholder
  ALPHAVANTAGE_API_KEY: dev-placeholder
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bff-config
  namespace: tradersapp
data:
  BFF_PORT: "8788"
  NODE_ENV: production
  ML_ANALYSIS_TRANSPORT: http
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: tradersapp
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
  - port: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: bff
  namespace: tradersapp
spec:
  type: ClusterIP
  selector:
    app: bff
  ports:
  - port: 8788
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: tradersapp
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
  - port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ml-engine
  namespace: tradersapp
spec:
  type: ClusterIP
  selector:
    app: ml-engine
  ports:
  - port: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: tradersapp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      imagePullSecrets:
      - name: ghcr-pull
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-engine
  namespace: tradersapp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ml-engine
  template:
    metadata:
      labels:
        app: ml-engine
    spec:
      imagePullSecrets:
      - name: ghcr-pull
      containers:
      - name: ml-engine
        image: ghcr.io/fxgunit/ml-engine:f07e82af958ebf6a3ac08cdd62e3cba60c85ccfd
        ports:
        - containerPort: 8001
        env:
        - name: KAFKA_ENABLED
          value: "false"
        - name: DATABASE_URL
          value: ""
        envFrom:
        - secretRef:
            name: ml-engine-secrets
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          limits:
            cpu: 1000m
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: tradersapp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bff
  template:
    metadata:
      labels:
        app: bff
    spec:
      imagePullSecrets:
      - name: ghcr-pull
      containers:
      - name: bff
        image: ghcr.io/fxgunit/bff:f07e82af958ebf6a3ac08cdd62e3cba60c85ccfd
        ports:
        - containerPort: 8788
        env:
        - name: BFF_PORT
          value: "8788"
        envFrom:
        - secretRef:
            name: bff-secrets
        readinessProbe:
          httpGet:
            path: /health
            port: 8788
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: tradersapp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
      - name: ghcr-pull
      containers:
      - name: frontend
        image: ghcr.io/fxgunit/frontend:f07e82af958ebf6a3ac08cdd62e3cba60c85ccfd
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi