# k8s/ml-deployment.yaml — Python ML Engine on k3s
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-engine
  namespace: tradersapp
  labels:
    app: ml-engine
    tier: ml
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8001"
    prometheus.io/path: "/metrics"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-engine
  # Zero-downtime: block rollout until new pod is ready
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ml-engine
        tier: ml
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
    spec:
      # Run as non-root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: ml-engine
          image: tradersapp/ml-engine:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
              name: http
            - containerPort: 9091  # Prometheus metrics
              name: metrics
          envFrom:
            - configMapRef:
                name: ml-engine-config
            - configMapRef:
                name: ml-engine-env
          env:
            - name: DB_PATH
              valueFrom:
                configMapKeyRef:
                  key: DB_PATH
                  name: ml-engine-env
                  optional: true
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tradersapp-secrets
                  key: POSTGRES_PASSWORD
                  optional: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          # Startup probe: ML Engine loads models on boot, needs time
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            failureThreshold: 30
            periodSeconds: 10
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            failureThreshold: 3
            periodSeconds: 20
            initialDelaySeconds: 60
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            failureThreshold: 3
            periodSeconds: 10
            initialDelaySeconds: 30
          volumeMounts:
            - name: data
              mountPath: /data
            - name: models
              mountPath: /models
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          lifecycle:
            preStop:
              # Graceful drain: stop accepting new requests before termination
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      volumes:
        - name: data
          emptyDir: {}
        - name: models
          persistentVolumeClaim:
            claimName: ml-models-pvc
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
      # Graceful termination: give in-flight requests time to complete
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: ml-engine
  namespace: tradersapp
  labels:
    app: ml-engine
spec:
  type: ClusterIP
  selector:
    app: ml-engine
  ports:
    - name: http
      port: 8001
      targetPort: 8001
    - name: metrics
      port: 9091
      targetPort: 9091