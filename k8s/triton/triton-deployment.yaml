# ─────────────────────────────────────────────────────────────────────────────
# TradersApp — Triton Inference Server Kubernetes Deployment (GPU)
#
# Deploy:
#   kubectl apply -f k8s/triton/
#
# Prerequisites:
#   - NVIDIA GPU operator installed in cluster (nvidia.com/gpu)
#   - Model repository in MinIO or NFS (update volumes below)
#   - MLflow and Redis already deployed
#
# Auto-deploys ONNX models via model repository sync on startup.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: triton-config
  namespace: tradersapp
data:
  MODEL_REPO_PATH: "/models"
  TRTIS_LOG_VERBOSE: "0"
  TRTIS_LOG_INFO: "true"
  TRTIS_LOG_WARNING: "true"
  TRTIS_LOG_ERROR: "true"
  # Inference timeouts (ms)
  INFERENCE_TIMEOUT_MS: "500"
  # Warmup config
  WARMUP_ENABLED: "true"
  WARMUP_SAMPLES: "10"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton-gpu
  namespace: tradersapp
  labels:
    app: triton
    accelerator: gpu
    role: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triton
      accelerator: gpu
  # Zero-downtime rolling update
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: triton
        accelerator: gpu
        role: inference
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
    spec:
      # GPU node selector
      nodeSelector:
        nvidia.com/gpu: "present"
      # Tolerations: allow scheduling on GPU nodes
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      # GPU resource requests
      containers:
        - name: triton
          image: nvcr.io/nvidia/tritonserver:25.02-py3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: grpc
              containerPort: 8001
              protocol: TCP
            - name: metrics
              containerPort: 8002
              protocol: TCP
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: TRITON_MODEL_REPO
              value: "/models"
            - name: USE_TRITON
              value: "true"
          command:
            - tritonserver
            - "--model-repository=/models"
            - "--http-port=8000"
            - "--grpc-port=8001"
            - "--metrics-port=8002"
            - "--allow-http=true"
            - "--allow-grpc=true"
            - "--allow-metrics=true"
            - "--log-verbose=0"
            - "--model-control-mode=explicit"
            - "--repository-poll-secs=60"
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
              nvidia.com/gpu: 1
            limits:
              memory: "8Gi"
              cpu: "4"
              nvidia.com/gpu: 1
          livenessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # Volume mounts: model repository
          volumeMounts:
            - name: model-repo
              mountPath: /models
            - name: triton-config
              mountPath: /etc/triton
              readOnly: true
          # Init container: download models from MinIO on startup
          initContainers:
            - name: model-sync
              image: minio/mc:latest
              env:
                - name: MINIO_ENDPOINT
                  value: "minio:9000"
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: tradersapp-secrets
                      key: minio-access-key
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: tradersapp-secrets
                      key: minio-secret-key
              command:
                - /bin/sh
                - -c
                - |
                  mc alias set tradersapp http://$MINIO_ENDPOINT $MINIO_ACCESS_KEY $MINIO_SECRET_KEY || true
                  mc cp --recursive tradersapp/triton-models/ /models/ || true
                  ls /models/
              volumeMounts:
                - name: model-repo
                  mountPath: /models
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]   # Graceful drain
      volumes:
        - name: model-repo
          emptyDir: {}   # In production, use PVC or NFS
        - name: triton-config
          configMap:
            name: triton-config
