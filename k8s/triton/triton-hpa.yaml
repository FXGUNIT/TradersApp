# ─────────────────────────────────────────────────────────────────────────────
# TradersApp — Triton Horizontal Pod Autoscaler
#
# Auto-scales Triton CPU deployment based on inference latency and CPU usage.
# Note: GPU HPA requires custom metrics (Triton-specific).
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: triton-cpu-hpa
  namespace: tradersapp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: triton-cpu
  minReplicas: 1
  maxReplicas: 5
  metrics:
    # Scale on CPU utilization
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Scale on memory usage
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  # Stability window — prevent flapping
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # 5 min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 15
      selectPolicy: Max

---
# Custom metrics HPA for GPU deployment (requires prometheus-adapter)
# Scale on Triton queue depth and inference latency
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: triton-gpu-hpa
  namespace: tradersapp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: triton-gpu
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: External
      external:
        metric:
          name: tritoninference_queue_duration_us
          selector:
            matchLabels:
              model: lightgbm_direction
        target:
          type: AverageValue
          averageValue: "5000"   # Scale up if queue > 5ms average
    - type: Resource
      resource:
        name: nvidia.com/gpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
    scaleUp:
      stabilizationWindowSeconds: 30
