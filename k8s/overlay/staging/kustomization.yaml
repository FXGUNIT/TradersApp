# k8s/overlay/staging/kustomization.yaml — Staging overlay
namespace: tradersapp-staging
commonLabels:
  environment: staging
resources:
  - ../../base/namespace.yaml
  - ../../base/storage.yaml
  - ../../base/config.yaml
  - ../../base/pdb.yaml
  - ../../base/network-policies.yaml
  - ../../ml-deployment.yaml
  - ../../bff-deployment.yaml
  - ../../frontend-deployment.yaml
  - ../../hpa-ml-engine.yaml
  - ../../hpa-bff.yaml
patches:
  # ML Engine: staging resources (higher than dev)
  - target:
      kind: Deployment
      name: ml-engine
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
  # BFF: 2 replicas for staging
  - target:
      kind: Deployment
      name: bff
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
images:
  - name: tradersapp/ml-engine
    newTag: staging-latest
  - name: tradersapp/bff
    newTag: staging-latest
  - name: tradersapp/frontend
    newTag: staging-latest