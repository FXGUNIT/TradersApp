# k8s/base/pdb.yaml — PodDisruptionBudgets for safe rolling updates
# Ensures minimum availability during node drains and upgrades.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ml-engine-pdb
  namespace: tradersapp
spec:
  minAvailable: 1  # Always keep at least 1 pod running
  selector:
    matchLabels:
      app: ml-engine
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: bff-pdb
  namespace: tradersapp
spec:
  minAvailable: 2  # BFF at min 2 replicas, keep at least 2
  selector:
    matchLabels:
      app: bff
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: tradersapp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend