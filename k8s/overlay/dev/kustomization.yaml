# k8s/overlay/dev/kustomization.yaml — Development overlay
namespace: tradersapp-dev
commonLabels:
  environment: dev
resources:
  - ../../namespace.yaml
  - ../../storage.yaml
  - ../../base/config.yaml
  - ../../base/pdb.yaml
  - ../../base/network-policies.yaml
  - ../../ml-deployment.yaml
  - ../../bff-deployment.yaml
  - ../../frontend-deployment.yaml
  - ../../hpa-ml-engine.yaml
  - ../../hpa-bff.yaml
patches:
  # ML Engine: dev resources
  - target:
      kind: Deployment
      name: ml-engine
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
  # BFF: dev resources
  - target:
      kind: Deployment
      name: bff
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  # Frontend: dev resources
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
images:
  - name: tradersapp/ml-engine
    newTag: dev-latest
  - name: tradersapp/bff
    newTag: dev-latest
  - name: tradersapp/frontend
    newTag: dev-latest