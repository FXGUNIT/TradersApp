# k8s/base/storage.yaml — PersistentVolumeClaims for TradersApp
# Namespace set by kustomize overlay; storageClassName = local-path for k3s
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-models-pvc
  labels:
    app: ml-engine
    type: models
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-artifacts-pvc
  labels:
    app: mlflow
    type: artifacts
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: local-path
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  labels:
    app: redis
    type: cache
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
