# k8s/overlay/dev/storage.yaml — Dev: only ml-models-pvc needed
# mlflow-artifacts-pvc and redis-pvc removed (no Redis/MLflow in dev, would stay Pending)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-models-pvc
  labels:
    app: ml-engine
    type: models
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
