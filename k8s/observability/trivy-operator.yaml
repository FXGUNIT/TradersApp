# Trivy Operator for Kubernetes Runtime Scanning
# Version: 1.0.0
# Updated: 2026-04-06

---
apiVersion: v1
kind: Namespace
metadata:
  name: trivy-system
  labels:
    owner: security
    environment: production

---
# Trivy Operator Installation
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: trivy-operator
  namespace: trivy-system
spec:
  channel: v0.18
  installPlanApproval: Automatic
  name: trivy-operator
  source: operatorhubio-catalog
  sourceNamespace: olm

---
# VulnerabilityReport CRD
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.11.0
  creationTimestamp: null
  labels:
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: trivy-operator
  name: vulnerabilityreports.aquasecurity.github.io
spec:
  group: aquasecurity.github.io
  names:
    kind: VulnerabilityReport
    listKind: VulnerabilityReportList
    plural: vulnerabilityreports
    shortNames:
      - vulnreport
    singular: vulnerabilityreport
  scope: Namespaced
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: VulnerabilityReport is the Schema for the vulnerabilityreports API
          properties:
            apiVersion:
              description: 'APIVersion defines the versioned schema of this representation of an object.'
              type: string
            kind:
              description: 'Kind is a string value representing the REST resource this object represents.'
              type: string
            metadata:
              type: object
            report:
              description: Report is the actual vulnerability report
              properties:
                artifact:
                  description: Artifact information
                  properties:
                    repository:
                      type: string
                    tag:
                      type: string
                  type: object
                registry:
                  description: Registry information
                  properties:
                    server:
                      type: string
                  type: object
                scanStartedAt:
                  description: Scan start time
                  format: date-time
                  type: string
                scanner:
                  description: Scanner used for this report
                  properties:
                    name:
                      type: string
                    vendor:
                      type: string
                    version:
                      type: string
                  type: object
                summary:
                  description: Summary of vulnerabilities
                  properties:
                    criticalCount:
                      type: integer
                    highCount:
                      type: integer
                    lowCount:
                      type: integer
                    mediumCount:
                      type: integer
                  type: object
                updateAt:
                  description: Report update time
                  format: date-time
                  type: string
                vulnerabilities:
                  items:
                    properties:
                      fixedVersion:
                        type: string
                      installedVersion:
                        type: string
                      lastModified:
                        format: date-time
                        type: string
                      primaryLink:
                        type: string
                      resource:
                        type: string
                      score:
                        type: number
                      severity:
                        type: string
                      title:
                        type: string
                      vulnerabilityID:
                        type: string
                    type: object
                  type: array
              type: object
          type: object
      served: true
      storage: true

---
# ConfigMap for Trivy Operator
apiVersion: v1
kind: ConfigMap
metadata:
  name: trivy-operator
  namespace: trivy-system
data:
  # Vulnerability scanning settings
  vulnerabilityReports.scanning.newImagePattern: "ghcr.io/tradersapp/*"
  vulnerabilityReports.scanning.uploadReports: "true"

  # Scanner settings
  trivy.repository: "ghcr.io/aquasecurity/trivy:latest"
  trivy.tag: "latest"

  # Vulnerability severity thresholds
  # CRITICAL and HIGH will trigger alerts
  trivy.severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"

  # Vulnerability type
  vulnType.list: "os,library"

  # DB settings
  trivy.dbRepository: "ghcr.io/aquasecurity/trivy-db"
  trivy.dbRepositoryInterval: "12h"
  trivy.mode: "Standalone"

  # Cache settings
  trivy.cacheTTLCache: "24h"
  trivy.cacheRedis.ttl: "24h"
  trivy.cache.redis.ttl: "24h"

  # Replicas
  operator.replicas: "2"

  # Exclude images from scanning
  trivy.excludeImages: ""

  # Security sections to check
  security-checks: "vuln,config,secret"

  # Report format
  reportFormat: "JSON"

  # Enable infra assessment
  infraAssessorReports.scanning: "Disabled"

  # Enable config auditor
  configAuditorReports.scanning: "Disabled"

  # Enable RBAC
  serviceAccount.annotations: |
    eks.amazonaws.com/role-arn: ""

---
# ClusterPolicy for auto-scanning
apiVersion: aquasecurity.github.io/v1alpha1
kind: ClusterConfigAuditReport
metadata:
  name: trivy-policies
spec:
  severityThreshold: high
  controls:
    - name: Non-root containers
      description: Containers must run as non-root user
      checks:
        - id: KSV001
    - name: Privilege escalation disabled
      description: Containers must not allow privilege escalation
      checks:
        - id: KSV002
    - name: Read-only root filesystem
      description: Containers should use read-only root filesystem
      checks:
        - id: KSV003
    - name: Drop default capabilities
      description: Containers should drop all default capabilities
      checks:
        - id: KSV004

---
# Vulnerability Scan Job - manual trigger
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vulnerability-scan
  namespace: trivy-system
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: trivy-operator
          restartPolicy: OnFailure
          containers:
            - name: scanner
              image: ghcr.io/aquasecurity/trivy:latest
              args:
                - image
                - --ignorefile
                - /root/.trivyignore
                - --severity
                - HIGH,CRITICAL
                - --format
                - json
                - --output
                - /tmp/vuln-report.json
                - --cache-dir
                - /tmp/trivy-cache
                - ghcr.io/tradersapp/ml-engine:latest
              volumeMounts:
                - name: vuln-report
                  mountPath: /tmp
              resources:
                limits:
                  cpu: 1
                  memory: 1Gi
                requests:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: vuln-report
              emptyDir: {}
          restartPolicy: OnFailure

---
# Alert rule for critical vulnerabilities
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: trivy-alerts
  namespace: trivy-system
spec:
  groups:
    - name: trivy-vulnerability-alerts
      rules:
        - alert: CriticalVulnerabilityFound
          expr: |
            sum by (namespace, name, image) (
              trivy_vulnerabilities_total{severity="CRITICAL"}
            ) > 0
          for: 5m
          labels:
            severity: critical
            team: security
          annotations:
            summary: "Critical vulnerability found in {{ $labels.name }}"
            description: "Container {{ $labels.image }} in namespace {{ $labels.namespace }} has critical vulnerabilities"
            runbook_url: "https://runbooks.tradersapp.com/vuln/critical"

        - alert: HighVulnerabilityFound
          expr: |
            sum by (namespace, name, image) (
              trivy_vulnerabilities_total{severity="HIGH"}
            ) > 5
          for: 1h
          labels:
            severity: warning
            team: security
          annotations:
            summary: "Multiple high vulnerabilities found"
            description: "Container {{ $labels.image }} has more than 5 high severity vulnerabilities"
            runbook_url: "https://runbooks.tradersapp.com/vuln/high"
