# k8s/observability/alerts/recording.rules.yml
# Prometheus recording rules for pre-computed expensive queries
# Improves alert query performance and reduces PromQL load
groups:
  - name: ml_engine_recording_rules
    interval: 30s
    rules:
      # ── Latency Recording Rules ──────────────────────────────────────────
      - record: job:ml_http_request_duration_seconds_p50:rate5m
        expr: |
          histogram_quantile(0.50,
            sum by (job, le) (rate(ml_http_request_duration_seconds_bucket[5m]))
          )

      - record: job:ml_http_request_duration_seconds_p95:rate5m
        expr: |
          histogram_quantile(0.95,
            sum by (job, le) (rate(ml_http_request_duration_seconds_bucket[5m]))
          )

      - record: job:ml_http_request_duration_seconds_p99:rate5m
        expr: |
          histogram_quantile(0.99,
            sum by (job, le) (rate(ml_http_request_duration_seconds_bucket[5m]))
          )

      - record: job:ml_prediction_latency_seconds_p50:rate5m
        expr: |
          histogram_quantile(0.50,
            sum by (job, le) (rate(ml_prediction_latency_seconds_bucket[5m]))
          )

      - record: job:ml_prediction_latency_seconds_p95:rate5m
        expr: |
          histogram_quantile(0.95,
            sum by (job, le) (rate(ml_prediction_latency_seconds_bucket[5m]))
          )

      - record: job:ml_prediction_latency_seconds_p99:rate5m
        expr: |
          histogram_quantile(0.99,
            sum by (job, le) (rate(ml_prediction_latency_seconds_bucket[5m]))
          )

      - record: job:bff_http_request_duration_seconds_p95:rate5m
        expr: |
          histogram_quantile(0.95,
            sum by (job, le) (rate(bff_http_request_duration_seconds_bucket[5m]))
          )

      # ── Drift Score Recording Rules ──────────────────────────────────────
      - record: ml_engine:drift_score_avg_1h
        expr: |
          avg_over_time(ml_feature_drift_psi[1h])

      - record: ml_engine:drift_score_max_1h
        expr: |
          max_over_time(ml_feature_drift_psi[1h])

      - record: ml_engine:concept_drift_win_rate_drop_1h
        expr: |
          avg_over_time(ml_concept_drift_win_rate_drop_pct[1h])

      # ── Cache Recording Rules ────────────────────────────────────────────
      - record: ml_engine:cache_hit_rate_5m
        expr: |
          sum(rate(ml_cache_hits_total[5m]))
          /
          clamp_min(
            sum(rate(ml_cache_hits_total[5m])) + sum(rate(ml_cache_misses_total[5m])),
            1
          )

      - record: ml_engine:cache_hit_rate_1h
        expr: |
          sum(rate(ml_cache_hits_total[1h]))
          /
          clamp_min(
            sum(rate(ml_cache_hits_total[1h])) + sum(rate(ml_cache_misses_total[1h])),
            1
          )

      # ── SLA Recording Rules ───────────────────────────────────────────────
      - record: ml_engine:sla_uptime_percent_1h
        expr: |
          (
            sum(rate(ml_http_requests_total{status=~"2.."}[1h]))
            /
            clamp_min(sum(rate(ml_http_requests_total[1h])), 1)
          ) * 100

      - record: ml_engine:sla_uptime_percent_1d
        expr: |
          (
            sum(rate(ml_http_requests_total{status=~"2.."}[1d]))
            /
            clamp_min(sum(rate(ml_http_requests_total[1d])), 1)
          ) * 100

      # ── Model Age Recording Rules ────────────────────────────────────────
      - record: ml_engine:model_stage_age_seconds
        expr: ml_model_stage_age_seconds

      - record: ml_engine:model_retrain_age_hours
        expr: |
          (time() - ml_retrain_last_success_timestamp) / 3600

      # ── Throughput Recording Rules ──────────────────────────────────────
      - record: ml_engine:requests_per_second_5m
        expr: |
          sum(rate(ml_http_requests_total[5m]))

      - record: ml_engine:predictions_per_second_5m
        expr: |
          sum(rate(ml_prediction_latency_seconds_count[5m]))

      - record: ml_engine:inference_per_second_5m
        expr: |
          sum(rate(ml_inference_requests_total[5m]))

      # ── Error Rate Recording Rules ────────────────────────────────────────
      - record: ml_engine:error_rate_5m
        expr: |
          sum(rate(ml_http_requests_total{status=~"5.."}[5m]))
          /
          clamp_min(sum(rate(ml_http_requests_total[5m])), 1)

      - record: ml_engine:inference_error_rate_5m
        expr: |
          sum(rate(ml_inference_errors_total[5m]))
          /
          clamp_min(sum(rate(ml_inference_requests_total[5m])), 1)

  - name: bff_recording_rules
    interval: 30s
    rules:
      - record: job:bff_http_request_duration_seconds_p95:rate5m
        expr: |
          histogram_quantile(0.95,
            sum by (job, le) (rate(bff_http_request_duration_seconds_bucket[5m]))
          )

      - record: job:bff_http_request_duration_seconds_p99:rate5m
        expr: |
          histogram_quantile(0.99,
            sum by (job, le) (rate(bff_http_request_duration_seconds_bucket[5m]))
          )

      - record: job:bff_ml_engine_latency_seconds_p95:rate5m
        expr: |
          histogram_quantile(0.95,
            sum by (job, le) (rate(bff_ml_engine_latency_seconds_bucket[5m]))
          )

      - record: job:bff_requests_per_second_5m
        expr: |
          sum(rate(bff_http_requests_total[5m]))

      - record: job:bff_error_rate_5m
        expr: |
          sum(rate(bff_http_requests_total{status=~"5.."}[5m]))
          /
          clamp_min(sum(rate(bff_http_requests_total[5m])), 1)

  - name: kafka_recording_rules
    interval: 60s
    rules:
      - record: kafka:consumer_lag_max
        expr: max(ml_kafka_consumer_lag)

      - record: kafka:messages_published_rate_5m
        expr: |
          sum by (topic) (rate(ml_kafka_messages_published_total[5m]))

      - record: kafka:publish_error_rate_5m
        expr: |
          sum(rate(ml_kafka_publish_errors_total[5m]))
          /
          clamp_min(sum(rate(ml_kafka_published_total[5m])), 1)

  - name: mlflow_recording_rules
    interval: 60s
    rules:
      - record: mlflow:models_by_stage
        expr: ml_models_registered

      - record: mlflow:training_runs_per_hour
        expr: |
          sum by (experiment, status) (increase(ml_training_runs_total[1h]))

      - record: mlflow:active_runs_gauge
        expr: ml_active_runs
