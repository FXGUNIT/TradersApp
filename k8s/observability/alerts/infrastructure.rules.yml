# k8s/observability/alerts/infrastructure.rules.yml
# Prometheus alerting rules for TradersApp infrastructure
groups:
  - name: kafka-availability
    interval: 30s
    rules:
      - alert: KafkaDown
        expr: kafka_consumer_group_lag > 10000
        for: 5m
        labels:
          severity: critical
          service: kafka
        annotations:
          summary: "Kafka consumer lag > 10,000 messages"
          description: "Kafka consumer is falling behind — possible broker issue or consumer failure."

      - alert: KafkaProducerErrorRate
        expr: rate(kafka_producer_errors_total[5m]) > 0.01
        for: 3m
        labels:
          severity: warning
          service: kafka
        annotations:
          summary: "Kafka producer error rate elevated"
          description: "Kafka producer is experiencing elevated error rates."

      - alert: KafkaConsumerLagHigh
        expr: ml_kafka_consumer_lag > 500
        for: 5m
        labels:
          severity: warning
          service: kafka
        annotations:
          summary: "ML Engine Kafka consumer lag > 500"
          description: "ML Engine consumer for {{ $labels.topic }} partition {{ $labels.partition }} is lagging behind. Consumer group may be stuck."

      - alert: KafkaPublishFailure
        expr: rate(ml_kafka_publish_errors_total[5m]) > 0
        for: 2m
        labels:
          severity: warning
          service: kafka
        annotations:
          summary: "Kafka message publish failures detected"
          description: "ML Engine failed to publish messages to Kafka topic {{ $labels.topic }}. Events may be lost."

      - alert: KafkaConsumerProcessingStalled
        expr: increase(ml_kafka_consumer_messages_processed_total[10m]) == 0
        for: 10m
        labels:
          severity: warning
          service: kafka
        annotations:
          summary: "ML Engine Kafka consumer stalled"
          description: "No messages processed in the last 10 minutes on topic {{ $labels.topic }}. Consumer may be stuck."

  - name: kafka-event-volume
    interval: 60s
    rules:
      - alert: KafkaConsensusSignalsLow
        expr: increase(ml_kafka_messages_published_total{topic="consensus-signals"}[30m]) < 1
        for: 30m
        labels:
          severity: info
          service: kafka
        annotations:
          summary: "No consensus signals published in 30 minutes"
          description: "ML Engine hasn't published any consensus signals to Kafka. Either the service is idle or the producer is stuck."

      - alert: KafkaCandleDataLow
        expr: increase(ml_kafka_messages_published_total{topic="candle-data"}[15m]) < 1
        for: 15m
        labels:
          severity: warning
          service: kafka
        annotations:
          summary: "No candle data published in 15 minutes"
          description: "No candle data events in the last 15 minutes. Data ingestion pipeline may be stalled."

  - name: redis-availability
    interval: 30s
    rules:
      - alert: RedisDown
        expr: redis_connected_clients == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis has no connected clients"
          description: "Redis may be down or unreachable — ML Engine will use in-memory fallback."

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis memory usage > 90%"
          description: "Redis is approaching its memory limit."

  - name: data-quality
    interval: 60s
    rules:
      - alert: DataQualityCriticalFailures
        expr: max_over_time(ml_dq_critical_failures[5m]) > 0
        for: 2m
        labels:
          severity: critical
          service: ml-engine
        annotations:
          summary: "Data quality critical failures detected"
          description: "Great Expectations has detected critical data quality failures — pipeline may be blocked."

  - name: bff-availability
    interval: 30s
    rules:
      - alert: BFFDown
        expr: up{job="bff"} == 0
        for: 1m
        labels:
          severity: critical
          service: bff
        annotations:
          summary: "BFF is down"
          description: "BFF has been unreachable for more than 1 minute."

      - alert: BFFHighLatency
        expr: histogram_quantile(0.99, sum(rate(bff_http_request_duration_seconds_bucket[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
          service: bff
        annotations:
          summary: "BFF p99 latency > 2 seconds"
          description: "BFF is experiencing high latency — possible backend congestion."

  - name: observability-health
    interval: 60s
    rules:
      - alert: PrometheusTargetDown
        expr: up{job!="prometheus"} == 0
        for: 2m
        labels:
          severity: critical
          service: observability
        annotations:
          summary: "Prometheus scrape target is down"
          description: "A target Prometheus should be scraping is unreachable."

      - alert: GrafanaDown
        expr: up{job="grafana"} == 0
        for: 2m
        labels:
          severity: warning
          service: observability
        annotations:
          summary: "Grafana is down"
          description: "Grafana is unreachable — dashboards unavailable."

  - name: mlflow-mlops
    interval: 60s
    rules:
      - alert: MLflowDown
        expr: up{job="mlflow"} == 0
        for: 2m
        labels:
          severity: critical
          service: mlflow
        annotations:
          summary: "MLflow tracking server is down"
          description: "MLflow has been unreachable for 2+ minutes. Experiment tracking and model registry unavailable."

      - alert: MLflowHighLatency
        expr: histogram_quantile(0.95, sum(rate(ml_http_request_duration_seconds_bucket{endpoint="/api/2.0/mlflow/runs/search"}[5m])) by (le)) > 5
        for: 5m
        labels:
          severity: warning
          service: mlflow
        annotations:
          summary: "MLflow API latency > 5s p95"
          description: "MLflow search runs API is slow. May indicate heavy query or database congestion."

      - alert: MLflowPostgresDown
        expr: up{job="mlflow-postgres"} == 0
        for: 1m
        labels:
          severity: critical
          service: mlflow
        annotations:
          summary: "MLflow PostgreSQL backend is down"
          description: "MLflow cannot store experiment metadata. All new runs will fail."

      - alert: MinIODown
        expr: up{job="minio"} == 0
        for: 2m
        labels:
          severity: warning
          service: mlflow
        annotations:
          summary: "MinIO artifact store is down"
          description: "MinIO S3 store is unreachable. Model artifacts cannot be saved or retrieved."

  - name: triton-inference
    interval: 30s
    rules:
      - alert: TritonDown
        expr: ml_triton_server_up == 0
        for: 1m
        labels:
          severity: critical
          service: triton
        annotations:
          summary: "Triton Inference Server is down"
          description: "Triton server has been unreachable for 1+ minutes. ML Engine will fall back to ONNX Runtime local inference."

      - alert: TritonHighLatency
        expr: histogram_quantile(0.99, sum(rate(ml_inference_triton_roundtrip_seconds_bucket[5m])) by (le)) > 0.1
        for: 5m
        labels:
          severity: warning
          service: triton
        annotations:
          summary: "Triton inference p99 latency > 100ms"
          description: "Triton gRPC round-trip is exceeding 100ms. Check GPU utilization and model batch sizes."

      - alert: TritonLowBatchUtilization
        expr: avg(ml_inference_batch_size_sum / ml_inference_batch_size_count) < 4
        for: 15m
        labels:
          severity: info
          service: triton
        annotations:
          summary: "Triton batch utilization is low"
          description: "Average batch size is below 4. Consider reducing max_wait_ms in the batching layer or disabling batching for latency-sensitive paths."

      - alert: GPUUnderutilized
        expr: ml_gpu_utilization_percent < 20
        for: 15m
        labels:
          severity: warning
          service: triton
        annotations:
          summary: "GPU utilization < 20%"
          description: "GPU is underutilized. Check if Triton is correctly batching requests or if GPU instances are undersubscribed."

      - alert: GPUMemoryHigh
        expr: ml_gpu_memory_used_bytes / ml_gpu_memory_total_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          service: triton
        annotations:
          summary: "GPU memory usage > 90%"
          description: "GPU is running low on memory. Reduce batch sizes or model count per GPU."

      - alert: InferenceErrorRate
        expr: sum(rate(ml_inference_errors_total[5m])) > 0.01
        for: 3m
        labels:
          severity: critical
          service: ml-engine
        annotations:
          summary: "Inference error rate > 1%"
          description: "More than 1% of inference requests are failing. Check Triton logs and model availability."

