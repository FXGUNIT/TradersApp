# Promtail configuration — ships logs to Loki
# Scraps log files from ML Engine and BFF services

server:
  http_listen_port: 9080
  grpc_listen_port: 0

clients:
  - url: http://loki:3100/loki/api/v1/push

positions:
  filename: /tmp/promtail-positions.yaml

target_config:
  sync_period: 10s

scrape_configs:
  # ML Engine logs
  - job_name: ml-engine
    static_configs:
      - targets:
          - localhost
        labels:
          job: ml-engine
          service: ml-engine
          env: production
        __path__: /var/log/ml-engine/*.log

  # BFF logs
  - job_name: bff
    static_configs:
      - targets:
          - localhost
        labels:
          job: bff
          service: bff
          env: production
        __path__: /var/log/bff/*.log

  # System logs
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          service: tradersapp
        __path__: /var/log/syslog
