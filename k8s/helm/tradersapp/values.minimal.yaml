# Minimal production — core 4 services only for E2.1.Micro (945MB RAM)
# All non-core services disabled to prevent k3s API OOM during helm install

global:
  imageTag: aaba273

bff:
  enabled: true
  replicaCount: 1
  strategy:
    type: Recreate
  autoscaling:
    enabled: false
  analysisTransport:
    mode: http
    grpcStrict: false
  envFrom:
  - configMapRef:
      name: bff-config
  - secretRef:
      name: bff-secrets
  image:
    pullPolicy: IfNotPresent
    repository: ghcr.io/fxgunit/tradersapp/bff
    tag: 'aaba273'
  resources:
    limits:
      cpu: 500m
      ephemeral-storage: 256Mi
      memory: 256Mi
    requests:
      cpu: 100m
      ephemeral-storage: 64Mi
      memory: 128Mi
  runtimeTmp:
    sizeLimit: 64Mi
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
  service:
    port: 8788
    type: ClusterIP

frontend:
  enabled: true
  containerPort: 8080
  strategy:
    type: Recreate
  image:
    pullPolicy: IfNotPresent
    repository: ghcr.io/fxgunit/tradersapp/frontend
    tag: 'aaba273'
  ingress:
    enabled: false
  replicaCount: 1
  resources:
    limits:
      cpu: 200m
      ephemeral-storage: 128Mi
      memory: 128Mi
    requests:
      cpu: 50m
      ephemeral-storage: 32Mi
      memory: 64Mi
  runtimeTmp:
    sizeLimit: 32Mi
  service:
    port: 80
    type: ClusterIP

redis:
  enabled: true
  strategy:
    type: Recreate
  image:
    repository: redis
    tag: 7-alpine
  persistence:
    enabled: false
  resources:
    limits:
      cpu: 200m
      ephemeral-storage: 128Mi
      memory: 128Mi
    requests:
      cpu: 50m
      ephemeral-storage: 32Mi
      memory: 64Mi
  runtimeData:
    sizeLimit: 64Mi

mlEngine:
  enabled: true
  replicaCount: 1
  strategy:
    type: Recreate
  kafkaEnabled: false
  requireDatabaseUrl: false
  autoscaling:
    enabled: false
  envFrom:
  - configMapRef:
      name: ml-engine-config
  - configMapRef:
      name: ml-engine-env
  - secretRef:
      name: ml-engine-secrets
  hpaWatcher:
    enabled: false
  image:
    pullPolicy: IfNotPresent
    repository: ghcr.io/fxgunit/tradersapp/ml-engine
    tag: 'aaba273'
  modelRegistrySidecar:
    enabled: false
  persistence:
    enabled: false
  resources:
    limits:
      cpu: 1000m
      ephemeral-storage: 768Mi
      memory: 512Mi
    requests:
      cpu: 250m
      ephemeral-storage: 128Mi
      memory: 256Mi
  runtimeState:
    enabled: false
    sizeLimit: 128Mi
  modelStore:
    sizeLimit: 256Mi
  tmp:
    medium: Memory
    sizeLimit: 128Mi
  securityContext:
    fsGroup: 1000
    runAsNonRoot: true
    runAsUser: 1000
  service:
    port: 8001
    type: ClusterIP

# --- disabled services ---

analysisService:
  enabled: false

certificates:
  enabled: false

featureStorage:
  enabled: false

feast:
  enabled: false

grafana:
  enabled: false

ingress:
  enabled: false

kafka:
  enabled: false

keycloak:
  enabled: false

minio:
  enabled: false

mlflow:
  enabled: false
  trackingUri: ""

monitoringStack:
  enabled: false

postgres:
  enabled: false

security:
  networkPolicies: false
  podDisruptionBudgets: false

triton:
  enabled: false

vllm:
  enabled: false
