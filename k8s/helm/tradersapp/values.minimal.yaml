# Minimal production — core 4 services only for E2.1.Micro (945MB RAM)
# All non-core services disabled to prevent k3s API OOM during helm install

global:
  imageTag: aaba273

bff:
  enabled: true
  replicaCount: 1
  autoscaling:
    enabled: false
  envFrom:
  - configMapRef:
      name: bff-config
  - secretRef:
      name: bff-secrets
  image:
    pullPolicy: IfNotPresent
    repository: ghcr.io/fxgunit/tradersapp/bff
    tag: ''
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
  service:
    port: 8788
    type: ClusterIP

frontend:
  enabled: true
  containerPort: 8080
  image:
    pullPolicy: IfNotPresent
    repository: ghcr.io/fxgunit/tradersapp/frontend
    tag: ''
  ingress:
    enabled: false
  replicaCount: 1
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  service:
    port: 80
    type: ClusterIP

redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
  persistence:
    enabled: false
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

mlEngine:
  enabled: true
  replicaCount: 1
  autoscaling:
    enabled: false
  envFrom:
  - configMapRef:
      name: ml-engine-config
  - configMapRef:
      name: ml-engine-env
  - secretRef:
      name: ml-engine-secrets
  hpaWatcher:
    enabled: false
  image:
    pullPolicy: IfNotPresent
    repository: ghcr.io/fxgunit/tradersapp/ml-engine
    tag: ''
  modelRegistrySidecar:
    enabled: false
  persistence:
    enabled: false
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  runtimeState:
    enabled: false
  securityContext:
    fsGroup: 1000
    runAsNonRoot: true
    runAsUser: 1000
  service:
    port: 8001
    type: ClusterIP

# --- disabled services ---

analysisService:
  enabled: false

certificates:
  enabled: false

featureStorage:
  enabled: false

feast:
  enabled: false

grafana:
  enabled: false

ingress:
  enabled: false

kafka:
  enabled: false

keycloak:
  enabled: false

minio:
  enabled: false

mlflow:
  enabled: false

monitoringStack:
  enabled: false

postgres:
  enabled: false

security:
  enabled: false

triton:
  enabled: false

vllm:
  enabled: false
