# Production Helm values for TradersApp
# Usage: helm upgrade --install tradersapp ./k8s/helm/tradersapp -f values.prod.yaml
#
# IMPORTANT: All secrets are managed via External Secrets Operator.
# See k8s/base/external-secrets.yaml for secret definitions.
# Do NOT put real credentials in this file.

namespace: tradersapp

# ML Engine — production resources
mlEngine:
  enabled: true
  replicaCount: 1
  image:
    repository: tradersapp/ml-engine
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  service:
    port: 8001
    type: ClusterIP
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  dataQuality:
    validateBeforeTrain: true
    blockOnCritical: true
    requireGreatExpectations: true
    lookbackDays: 90
    alertWebhook: ""
    quarantineDir: "/data/dq_quarantine"
  persistence:
    enabled: true
    size: 5Gi
    storageClass: standard  # Use local-path on k3s
  # Security context - managed by OPA policies
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  envFrom:
    - secretRef:
        name: ml-engine-secrets

# BFF — production resources
bff:
  enabled: true
  replicaCount: 3
  image:
    repository: tradersapp/bff
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  service:
    port: 8788
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 60
  analysisTransport:
    mode: grpc
    grpcAddress: analysis-service:50051
    grpcStrict: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
  envFrom:
    - secretRef:
        name: bff-secrets

analysisService:
  enabled: true
  replicaCount: 2
  service:
    port: 50051
    healthPort: 8082
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  securityContext:
    runAsNonRoot: true
    runAsUser: 1002

# Frontend — production resources
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: tradersapp/frontend
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  service:
    port: 80
    type: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  ingress:
    enabled: true
    host: tradersapp.io
    path: /

# Triton — enabled for GPU inference nodes
triton:
  enabled: true
  replicaCount: 1
  cudaVisibleDevices: "0"
  inferenceLatencyTargetMs: 100
  nodeSelector:
    nvidia.com/gpu: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000

# Redis
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  persistence:
    enabled: true
    size: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # Redis AUTH is enabled via external secrets
  # See ml-engine-secrets for Redis password

# MLflow + MinIO
mlflow:
  enabled: true
  replicaCount: 1
  trackingUri: http://mlflow:5000
  # Secrets are managed via External Secrets Operator
  secretRef:
    existingSecret: mlflow-secrets
    postgresDbKey: POSTGRES_DB
    postgresUserKey: POSTGRES_USER
    postgresPasswordKey: POSTGRES_PASSWORD
    # MinIO credentials managed via mlflow-secrets
  gunicornOptions: --workers 2 --timeout=300
  service:
    type: ClusterIP
    port: 5000
  image:
    repository: registry.example.com/example/mlflow
    tag: v2.21.3
    pullPolicy: IfNotPresent
  postgres:
    image:
      repository: postgres
      tag: 16-alpine
      pullPolicy: IfNotPresent
    database: mlflow
    user: mlflow
    # Password managed via mlflow-secrets (key: POSTGRES_PASSWORD)
    password: ""
    persistence:
      enabled: true
      size: 10Gi
      storageClass: standard
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
  minio:
    image:
      repository: minio/minio
      tag: RELEASE.2025-09-07T16-13-09Z
      pullPolicy: IfNotPresent
    clientImage:
      repository: minio/mc
      tag: RELEASE.2025-08-13T08-35-41Z
      pullPolicy: IfNotPresent
    # Credentials managed via mlflow-secrets
    # (keys: MINIO_ROOT_USER, MINIO_ROOT_PASSWORD)
    user: ""
    password: ""
    persistence:
      enabled: true
      size: 50Gi
      storageClass: standard
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
  s3:
    bucket: mlflow-artifacts
    region: us-east-1
    endpointUrl: http://minio:9000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

# Security
security:
  networkPolicies: true
  podDisruptionBudgets: true
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  # Secrets management
  externalSecrets: true
  # Runtime security
  falco: true
  # Vulnerability scanning
  trivyOperator: true
  # OPA policies
  opaPolicies: true

# Observability
observability:
  prometheus: true
  grafana: true
  loki: true
  jaeger: true
  # External secrets for observability
  secretsRef:
    grafanaAdminPassword: observability-secrets/GRAFANA_ADMIN_PASSWORD
    alertmanagerWebhook: observability-secrets/ALERTMANAGER_WEBHOOK_URL
    slackWebhook: observability-secrets/SLACK_WEBHOOK_URL

# Keycloak
keycloak:
  enabled: true
  replicaCount: 3
  # Admin credentials managed via keycloak-admin-secret
  secretRef:
    adminPassword: keycloak-admin-secret/KEYCLOAK_ADMIN_PASSWORD
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

# Certificate management
certificates:
  enabled: true
  # mTLS certificates managed via mtls-certificates
  certSecretRef: mtls-certificates
  caCertRef: mtls-certificates/CA_CERT
  autoRotation: true
  rotationPeriodDays: 90
