# Production Helm values for TradersApp
# Usage: helm upgrade --install tradersapp ./k8s/helm/tradersapp -f values.prod.yaml
#
# IMPORTANT: All secrets are managed via External Secrets Operator.
# See k8s/base/external-secrets.yaml for secret definitions.
# Do NOT put real credentials in this file.

namespace: tradersapp

# ── Global Ingress — TLS, rate limiting, BFF API route (ID 33) ─────────────
ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: tradersapp.io
      paths:
        - path: /
          service: frontend
          port: 80
        - path: /api
          service: bff
          port: 8788
  tls:
    enabled: true
    clusterIssuer: letsencrypt-prod
    hosts:
      - tradersapp.io
      - api.tradersapp.io
    secretName: tradersapp-tls
  rateLimit:
    rps: "50"
    rpm: "500"
    connections: "100"
    burst: "20"
    limitBy: "$remote_addr"
  # BFF public API ingress
  apiIngress:
    enabled: true
    className: nginx
    annotations: {}
    hosts:
      - host: api.tradersapp.io
        paths:
          - path: /
            service: bff
            port: 8788
    rateLimit:
      rps: "200"
      rpm: "2000"
      burst: "50"
    tls:
      clusterIssuer: letsencrypt-prod
      hosts:
        - api.tradersapp.io
    allowedOrigin: "https://tradersapp.io"

# ML Engine — production resources
mlEngine:
  enabled: true
  replicaCount: 1
  image:
    repository: tradersapp/ml-engine
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  service:
    port: 8001
    type: ClusterIP
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
    targetLatencyMs: "200"
  dataQuality:
    validateBeforeTrain: true
    blockOnCritical: true
    requireGreatExpectations: true
    lookbackDays: 90
    alertWebhook: ""
    quarantineDir: "/data/dq_quarantine"
  runtimeState:
    enabled: true
    size: 10Gi
    accessModes: ["ReadWriteMany"]
    storageClass: longhorn
    continualLearningDir: "/data/continual_learning"
    mambaCacheDir: "/data/mamba_cache"
  persistence:
    enabled: true
    size: 5Gi
    accessModes: ["ReadWriteMany"]
    storageClass: longhorn
  modelRegistrySidecar:
    port: 8010
    warmup: true
    maxCachedInstances: 4
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
  # Security context - managed by OPA policies
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  envFrom:
    - configMapRef:
        name: ml-engine-config
    - configMapRef:
        name: ml-engine-env
    - secretRef:
        name: ml-engine-secrets

# BFF — production resources
bff:
  enabled: true
  replicaCount: 3
  image:
    repository: tradersapp/bff
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  service:
    port: 8788
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 80
  analysisTransport:
    mode: grpc
    grpcAddress: analysis-service:50051
    grpcStrict: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
  envFrom:
    - configMapRef:
        name: bff-config
    - secretRef:
        name: bff-secrets

analysisService:
  enabled: true
  replicaCount: 2
  service:
    port: 50051
    healthPort: 8082
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  securityContext:
    runAsNonRoot: true
    runAsUser: 1002

# Frontend — production resources
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: tradersapp/frontend
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  service:
    port: 80
    type: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  ingress:
    enabled: false # Disabled above — use global ingress.* below

# Triton — enabled for GPU inference nodes
triton:
  enabled: true
  replicaCount: 1
  cudaVisibleDevices: "0"
  inferenceLatencyTargetMs: 100
  modelStorage:
    storageClass: longhorn
  nodeSelector:
    nvidia.com/gpu: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000

# Redis
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  persistence:
    enabled: true
    size: 1Gi
    storageClass: longhorn
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # Redis AUTH is enabled via external secrets
  # See ml-engine-secrets for Redis password

# MLflow + MinIO
mlflow:
  enabled: true
  replicaCount: 1
  trackingUri: http://mlflow:5000
  # Secrets are managed via External Secrets Operator
  secretRef:
    existingSecret: mlflow-secrets
    postgresDbKey: POSTGRES_DB
    postgresUserKey: POSTGRES_USER
    postgresPasswordKey: POSTGRES_PASSWORD
    # MinIO credentials managed via mlflow-secrets
  gunicornOptions: --workers 2 --timeout=300
  service:
    type: ClusterIP
    port: 5000
  image:
    repository: registry.example.com/example/mlflow
    tag: v2.21.3
    pullPolicy: IfNotPresent
  postgres:
    image:
      repository: postgres
      tag: 16-alpine
      pullPolicy: IfNotPresent
    database: mlflow
    user: mlflow
    # Password managed via mlflow-secrets (key: POSTGRES_PASSWORD)
    password: ""
    persistence:
      enabled: true
      size: 10Gi
      storageClass: longhorn
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
  minio:
    image:
      repository: minio/minio
      tag: RELEASE.2025-09-07T16-13-09Z
      pullPolicy: IfNotPresent
    clientImage:
      repository: minio/mc
      tag: RELEASE.2025-08-13T08-35-41Z
      pullPolicy: IfNotPresent
    # Credentials managed via mlflow-secrets
    # (keys: MINIO_ROOT_USER, MINIO_ROOT_PASSWORD)
    user: ""
    password: ""
    persistence:
      enabled: true
      size: 50Gi
      storageClass: longhorn
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
  s3:
    bucket: mlflow-artifacts
    region: us-east-1
    endpointUrl: http://minio:9000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

vllm:
  modelStorage:
    storageClass: longhorn

feast:
  featureStorage:
    storageClass: longhorn

kafka:
  persistence:
    storageClass: longhorn

# Security
security:
  networkPolicies: true
  podDisruptionBudgets: true
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  # Secrets management
  externalSecrets: true
  # Runtime security
  falco: true
  # Vulnerability scanning
  trivyOperator: true
  # OPA policies
  opaPolicies: true

# Observability
observability:
  prometheus: true
  grafana: true
  loki: true
  jaeger: true
  # External secrets for observability
  secretsRef:
    grafanaAdminPassword: observability-secrets/GRAFANA_ADMIN_PASSWORD
    alertmanagerWebhook: observability-secrets/ALERTMANAGER_WEBHOOK_URL
    slackWebhook: observability-secrets/SLACK_WEBHOOK_URL
    slackHpaWebhook: observability-secrets/SLACK_HPA_WEBHOOK_URL

# Keycloak
keycloak:
  enabled: true
  replicaCount: 3
  # Admin credentials managed via keycloak-admin-secret
  secretRef:
    adminPassword: keycloak-admin-secret/KEYCLOAK_ADMIN_PASSWORD
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

# Certificate management
certificates:
  enabled: true
  # mTLS certificates managed via mtls-certificates
  certSecretRef: mtls-certificates
  caCertRef: mtls-certificates/CA_CERT
  autoRotation: true
  rotationPeriodDays: 90
