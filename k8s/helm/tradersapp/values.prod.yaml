analysisService:
  enabled: true
  replicaCount: 2
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  securityContext:
    runAsNonRoot: true
    runAsUser: 1002
  service:
    healthPort: 8082
    port: 50051
    type: ClusterIP
bff:
  analysisTransport:
    grpcAddress: analysis-service:50051
    grpcStrict: false
    mode: grpc
  autoscaling:
    enabled: true
    maxReplicas: 10
    minReplicas: 2
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 80
  canary:
    enabled: false
    image:
      tag: ''
    replicaCount: 1
  enabled: true
  envFrom:
  - configMapRef:
      name: bff-config
  - secretRef:
      name: bff-secrets
  image:
    pullPolicy: IfNotPresent
    repository: ghcr.io/fxgunit/tradersapp/bff
    tag: ''
  replicaCount: 3
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
  service:
    port: 8788
    type: ClusterIP
certificates:
  autoRotation: true
  caCertRef: mtls-certificates/CA_CERT
  certSecretRef: mtls-certificates
  enabled: true
  rotationPeriodDays: 90
feast:
  featureStorage:
    storageClass: longhorn
frontend:
  enabled: true
  image:
    pullPolicy: IfNotPresent
    repository: ghcr.io/fxgunit/tradersapp/frontend
    tag: ''
  ingress:
    enabled: false
  replicaCount: 2
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  service:
    port: 80
    type: ClusterIP
grafana:
  enabled: true
ingress:
  annotations: {}
  apiIngress:
    allowedOrigin: https://tradersapp.io
    annotations: {}
    className: nginx
    enabled: true
    hosts:
    - host: api.tradersapp.io
      paths:
      - path: /
        port: 8788
        service: bff
    rateLimit:
      burst: '50'
      rpm: '2000'
      rps: '200'
    tls:
      clusterIssuer: letsencrypt-prod
      hosts:
      - api.tradersapp.io
  className: nginx
  enabled: true
  hosts:
  - host: tradersapp.io
    paths:
    - path: /
      port: 80
      service: frontend
    - path: /api
      port: 8788
      service: bff
  rateLimit:
    burst: '20'
    connections: '100'
    limitBy: $remote_addr
    rpm: '500'
    rps: '50'
  tls:
    clusterIssuer: letsencrypt-prod
    enabled: true
    hosts:
    - tradersapp.io
    secretName: tradersapp-tls
kafka:
  persistence:
    storageClass: longhorn
keycloak:
  enabled: true
  replicaCount: 3
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  secretRef:
    adminPassword: keycloak-admin-secret/KEYCLOAK_ADMIN_PASSWORD
mlEngine:
  autoscaling:
    enabled: true
    maxReplicas: 10
    minReplicas: 1
    targetCPUUtilizationPercentage: 80
    targetLatencyMs: '200'
    targetMemoryUtilizationPercentage: 80
  dataQuality:
    alertWebhook: ''
    blockOnCritical: true
    lookbackDays: 90
    quarantineDir: /data/dq_quarantine
    requireGreatExpectations: true
    validateBeforeTrain: true
  enabled: true
  envFrom:
  - configMapRef:
      name: ml-engine-config
  - configMapRef:
      name: ml-engine-env
  - secretRef:
      name: ml-engine-secrets
  hpaWatcher:
    enabled: false
    lookbackSeconds: 300
    pollIntervalSeconds: 30
    slackWebhookSecretRef: observability-secrets/SLACK_HPA_WEBHOOK_URL
  image:
    pullPolicy: IfNotPresent
    repository: ghcr.io/fxgunit/tradersapp/ml-engine
    tag: ''
  modelRegistrySidecar:
    enabled: true
    maxCachedInstances: 4
    port: 8010
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 256Mi
    warmup: true
  persistence:
    accessModes:
    - ReadWriteMany
    enabled: true
    size: 5Gi
    storageClass: longhorn
  replicaCount: 1
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 512Mi
  runtimeState:
    accessModes:
    - ReadWriteMany
    continualLearningDir: /data/continual_learning
    enabled: true
    mambaCacheDir: /data/mamba_cache
    size: 10Gi
    storageClass: longhorn
  securityContext:
    fsGroup: 1000
    runAsNonRoot: true
    runAsUser: 1000
  service:
    port: 8001
    type: ClusterIP
mlflow:
  enabled: true
  gunicornOptions: --workers 2 --timeout=300
  image:
    pullPolicy: IfNotPresent
    repository: registry.example.com/example/mlflow
    tag: v2.21.3
  minio:
    clientImage:
      pullPolicy: IfNotPresent
      repository: minio/mc
      tag: RELEASE.2025-08-13T08-35-41Z
    image:
      pullPolicy: IfNotPresent
      repository: minio/minio
      tag: RELEASE.2025-09-07T16-13-09Z
    password: ''
    persistence:
      enabled: true
      size: 50Gi
      storageClass: longhorn
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 256Mi
    user: ''
  postgres:
    database: mlflow
    image:
      pullPolicy: IfNotPresent
      repository: postgres
      tag: 16-alpine
    password: ''
    persistence:
      enabled: true
      size: 10Gi
      storageClass: longhorn
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 256Mi
    user: mlflow
  replicaCount: 1
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 512Mi
  s3:
    bucket: mlflow-artifacts
    endpointUrl: http://minio:9000
    region: us-east-1
  secretRef:
    existingSecret: mlflow-runtime-secret
    postgresDbKey: POSTGRES_DB
    postgresPasswordKey: POSTGRES_PASSWORD
    postgresUserKey: POSTGRES_USER
  service:
    port: 5000
    type: ClusterIP
  trackingUri: http://mlflow:5000
monitoringStack:
  enabled: false
  grafana:
    persistence:
      storageClassName: longhorn
  prometheus:
    prometheusSpec:
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: longhorn
namespace: tradersapp
observability:
  grafana: true
  jaeger: true
  loki: true
  prometheus: true
  secretsRef:
    alertmanagerWebhook: observability-secrets/ALERTMANAGER_WEBHOOK_URL
    grafanaAdminPassword: observability-secrets/GRAFANA_ADMIN_PASSWORD
    slackHpaWebhook: observability-secrets/SLACK_HPA_WEBHOOK_URL
    slackWebhook: observability-secrets/SLACK_WEBHOOK_URL
redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
  persistence:
    enabled: true
    size: 1Gi
    storageClass: longhorn
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi
security:
  externalSecrets: true
  falco: true
  networkPolicies: true
  opaPolicies: true
  podDisruptionBudgets: true
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  trivyOperator: true
triton:
  cudaVisibleDevices: '0'
  enabled: true
  inferenceLatencyTargetMs: 100
  modelStorage:
    storageClass: longhorn
  nodeSelector:
    nvidia.com/gpu: 'true'
  replicaCount: 1
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
  tolerations:
  - effect: NoSchedule
    key: nvidia.com/gpu
    operator: Exists
vllm:
  modelStorage:
    storageClass: longhorn
