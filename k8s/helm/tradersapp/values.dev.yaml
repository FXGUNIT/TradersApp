# Dev overrides for Helm deployments.
# Usage: helm upgrade --install tradersapp ./k8s/helm/tradersapp -f values.yaml -f values.dev.yaml
namespace: tradersapp-dev

mlEngine:
  image:
    tag: dev-latest
  kafkaEnabled: false
  requireDatabaseUrl: true
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
    targetLatencyMs: null

bff:
  replicaCount: 2
  image:
    tag: dev-latest
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: null
  analysisTransport:
    mode: http

analysisService:
  enabled: false
  replicaCount: 1

frontend:
  enabled: false
  # Use the local Vite dev server during workstation development.
  replicaCount: 1
  image:
    tag: dev-latest

redis:
  persistence:
    enabled: false

postgresql:
  enabled: true
  persistence:
    enabled: false

kafka:
  enabled: false

mlflow:
  enabled: false
  trackingUri: disabled
  image:
    repository: ghcr.io/mlflow/mlflow
    tag: v2.21.3
  minio:
    persistence:
      enabled: false
