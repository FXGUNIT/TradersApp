# Default values for TradersApp Helm chart.
# Override with: helm install -f values.prod.yaml tradersapp ./k8s/helm/tradersapp

# Global defaults
namespace: tradersapp
imagePullSecrets: []

# ML Engine
mlEngine:
  enabled: true
  replicaCount: 1
  image:
    repository: tradersapp/ml-engine
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8001
    type: ClusterIP
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  dataQuality:
    validateBeforeTrain: true
    blockOnCritical: true
    requireGreatExpectations: true
    lookbackDays: 90
    alertWebhook: ""
  persistence:
    enabled: true
    size: 5Gi
    storageClass: standard

# BFF
bff:
  enabled: true
  replicaCount: 2
  image:
    repository: tradersapp/bff
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8788
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 60

# Frontend
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: tradersapp/frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 80
    type: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  ingress:
    enabled: true
    host: tradersapp.local
    path: /

# Triton Inference Server — GPU-accelerated ONNX model serving
# Set enabled=true and configure nodeSelector + tolerations for GPU nodes
triton:
  enabled: false  # Requires GPU node, set to true if GPU available
  replicaCount: 1
  image:
    repository: nvcr.io/nvidia/tritonserver
    tag: "24.04-py3"
    pullPolicy: IfNotPresent
  # Node selector for GPU nodes (uncomment when GPU nodes available)
  nodeSelector:
    # nvidia.com/gpu: "true"
  tolerations:
    # - key: nvidia.com/gpu
    #   operator: Exists
    #   effect: NoSchedule
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
      nvidia.com/gpu: 1
    limits:
      cpu: 2000m
      memory: 4Gi
      nvidia.com/gpu: 1
  service:
    ports:
      http: 8000
      grpc: 8001
      metrics: 8002
  # PVC for ONNX model artifacts
  modelStorage:
    size: 2Gi
    storageClass: standard  # Change to 'local-path' or 'nfs' in prod
  # tmpfs for GPU memory spill
  tmpStorageSize: 1Gi
  # Graceful shutdown (allow in-flight requests to complete)
  gracefulShutdownSeconds: 5
  # Inference warmup (load models before accepting traffic)
  inferenceStagingSeconds: 30
  # Model config defaults
  strictModelConfig: false
  logging:
    verbose: false
  prometheusMetrics: true
  # Autoscaling (GPU-based HPA — requires Prometheus Adapter for queue depth metric)
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    targetGPUUtilization: 80  # %
  # Rolling update strategy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  # Per-model tuning (keyed by model name)
  models:
    lightgbm_direction:
      nFeatures: 50
      maxBatchSize: 64
      preferredBatchSizes: [1, 8, 16, 32, 64]
      maxQueueDelayUs: 100
      instanceCount: 2  # 2 GPU instances for parallel inference
      version: 1
      versionPolicy: specific  # specific | latest | all
      inputDims: [50]
      eagerBatching: false
    random_forest:
      nFeatures: 50
      maxBatchSize: 64
      preferredBatchSizes: [1, 8, 16, 32, 64]
      maxQueueDelayUs: 100
      instanceCount: 1
      version: 1
      versionPolicy: specific
      inputDims: [50]
      eagerBatching: false
    xgboost_direction:
      nFeatures: 50
      maxBatchSize: 64
      preferredBatchSizes: [1, 8, 16, 32, 64]
      maxQueueDelayUs: 100
      instanceCount: 1
      version: 1
      versionPolicy: specific
      inputDims: [50]
      eagerBatching: false

# Redis (in-cluster)
redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
  persistence:
    enabled: true
    size: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Kafka (event-driven inter-service communication)
kafka:
  enabled: true
  replicaCount: 1
  image:
    repository: apache/kafka
    tag: 3.7.0
  persistence:
    enabled: true
    size: 10Gi
    storageClass: standard
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  config:
    KAFKA_LOG_RETENTION_HOURS: "168"
    KAFKA_LOG_SEGMENT_BYTES: "1073741824"
    KAFKA_MESSAGE_MAX_BYTES: "1048576"
  topics:
    - name: candle-data
      partitions: 6
      replicationFactor: 1
    - name: consensus-signals
      partitions: 6
      replicationFactor: 1
    - name: model-predictions
      partitions: 6
      replicationFactor: 1
    - name: feedback-loop
      partitions: 3
      replicationFactor: 1
    - name: drift-alerts
      partitions: 3
      replicationFactor: 1

# Observability (Prometheus + Grafana via kube-prometheus-stack)
# Note: enable via kube-prometheus-stack Helm chart, not this chart
# observability:
#   enabled: false

# MLflow (self-hosted MLOps: experiment tracking + model registry)
mlflow:
  enabled: true
  replicaCount: 1
  trackingUri: http://mlflow:5000
  # Optional pre-created Kubernetes Secret for MLflow credentials.
  # If empty, this chart will create a secret from values below.
  # Recommended for production: set this to a secret managed via Infisical/External Secrets.
  secretRef:
    existingSecret: ""
    postgresDbKey: POSTGRES_DB
    postgresUserKey: POSTGRES_USER
    postgresPasswordKey: POSTGRES_PASSWORD
    minioUserKey: MINIO_ROOT_USER
    minioPasswordKey: MINIO_ROOT_PASSWORD
  gunicornOptions: --workers 2 --timeout=300
  service:
    type: ClusterIP
    port: 5000
  image:
    repository: tradersapp/mlflow
    tag: v2.21.3
    pullPolicy: IfNotPresent
  postgres:
    image:
      repository: postgres
      tag: 16-alpine
      pullPolicy: IfNotPresent
    database: mlflow
    user: mlflow
    password: mlflow123
    persistence:
      enabled: true
      size: 10Gi
      storageClass: standard
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 1Gi
  minio:
    image:
      repository: minio/minio
      tag: RELEASE.2025-09-07T16-13-09Z
      pullPolicy: IfNotPresent
    clientImage:
      repository: minio/mc
      tag: RELEASE.2025-08-13T08-35-41Z
      pullPolicy: IfNotPresent
    user: minioadmin
    password: minioadmin123
    persistence:
      enabled: true
      size: 20Gi
      storageClass: standard
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
  s3:
    bucket: mlflow-artifacts
    region: us-east-1
    endpointUrl: http://minio:9000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

# Security
security:
  networkPolicies: true
  podDisruptionBudgets: true
  runAsNonRoot: true
  readOnlyRootFilesystem: true

# Pod annotations for Prometheus
podAnnotations:
  prometheus.io/scrape: "true"

# Pod tolerations (for mixed node pools)
tolerations: []
# Example GPU toleration:
# - key: nvidia.com/gpu
#   operator: Exists
#   effect: NoSchedule

# Node selector (for specific node pools)
nodeSelector: {}
# Example GPU node:
# nvidia.com/gpu: "true"
