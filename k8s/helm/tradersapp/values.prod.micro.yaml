# Minimal production profile for free-tier single-node k3s.
# Applied as an override on top of values.prod.yaml.

namespace: tradersapp

analysisService:
  enabled: false

bff:
  replicaCount: 1
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 1
  analysisTransport:
    mode: http
    grpcAddress: analysis-service:50051
    grpcStrict: false
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 300m
      memory: 384Mi

frontend:
  replicaCount: 1
  resources:
    requests:
      cpu: 30m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 192Mi

mlEngine:
  replicaCount: 1
  kafkaEnabled: false
  requireDatabaseUrl: false
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 1
  persistence:
    enabled: false
  runtimeState:
    enabled: false
  modelRegistrySidecar:
    warmup: false
    maxCachedInstances: 1
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 150m
        memory: 256Mi
  resources:
    requests:
      cpu: 75m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 768Mi

redis:
  enabled: true
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 30m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 192Mi

feast:
  enabled: false

kafka:
  enabled: false

mlflow:
  enabled: false

triton:
  enabled: false

vllm:
  enabled: false

monitoringStack:
  enabled: false

observability:
  prometheus: false
  grafana: false
  jaeger: false
  loki: false

security:
  networkPolicies: false
  podDisruptionBudgets: false

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: traders.app
      paths:
        - path: /
          service: frontend
          port: 80
        - path: /api
          service: bff
          port: 8788
  tls:
    enabled: true
    clusterIssuer: letsencrypt-prod
    hosts:
      - traders.app
      - api.traders.app
    secretName: tradersapp-tls
  apiIngress:
    enabled: true
    className: nginx
    hosts:
      - host: api.traders.app
        paths:
          - path: /
            service: bff
            port: 8788
    tls:
      clusterIssuer: letsencrypt-prod
      hosts:
        - api.traders.app
    allowedOrigin: https://traders.app
