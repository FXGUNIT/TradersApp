{{- /*
HPA watcher: namespace-scoped event delivery to Slack for TradersApp.
Runs a single Deployment that polls HPA events and posts to Slack when
configured. RBAC is limited to events and HPAs in the release namespace.
*/ -}}
{{- if .Values.mlEngine.hpaWatcher.enabled -}}
{{- $namespace := include "tradersapp.namespace" . -}}
{{- $name := printf "%s-hpa-watcher" (include "tradersapp.fullname" .) -}}
{{- $scriptName := printf "%s-script" $name -}}
{{- $stateVolumeName := printf "%s-state" $name -}}
{{- $kubectlVolumeName := printf "%s-kubectl" $name -}}
{{- $watcherImage := .Values.mlEngine.hpaWatcher.image -}}
{{- $slackSecretRef := default "" .Values.mlEngine.hpaWatcher.slackWebhookSecretRef -}}
{{- $slackSecretParts := splitList "/" $slackSecretRef -}}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $scriptName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "tradersapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: hpa-watcher
data:
  watch-hpa-events.sh: |-
    #!/usr/bin/env sh
    set -eu

    K8S_NAMESPACE="${K8S_NAMESPACE:-{{ $namespace }}}"
    POLL_INTERVAL="${POLL_INTERVAL:-{{ .Values.mlEngine.hpaWatcher.pollIntervalSeconds | default 30 }}}"
    LOOKBACK_SECONDS="${LOOKBACK_SECONDS:-{{ .Values.mlEngine.hpaWatcher.lookbackSeconds | default 300 }}}"
    RUN_ONCE="${RUN_ONCE:-0}"
    KUBECTL_BIN="${KUBECTL_BIN:-/kubectl-bin/kubectl}"
    SEEN_EVENTS_FILE="${SEEN_EVENTS_FILE:-/state/seen-events.txt}"
    SLACK_WEBHOOK_URL="${SLACK_HPA_WEBHOOK_URL:-${SLACK_WEBHOOK_URL:-}}"

    json_escape() {
      printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
    }

    send_slack() {
      payload="$1"
      if [ -z "$SLACK_WEBHOOK_URL" ]; then
        echo "[watch-hpa-events] Slack webhook not configured; skipping send."
        return 0
      fi
      if ! command -v curl >/dev/null 2>&1; then
        echo "[watch-hpa-events] ERROR: curl not found in PATH." >&2
        return 1
      fi
      if response="$(curl -fsS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL" 2>&1)"; then
        [ -z "$response" ] || echo "[watch-hpa-events] Slack webhook response: $response"
      else
        echo "[watch-hpa-events] WARNING: Slack webhook request failed." >&2
        return 1
      fi
    }

    format_slack_message() {
      event_reason="$1"
      hpa_name="$2"
      namespace="$3"
      first_timestamp="$4"
      message="$5"
      involved_object="$6"
      count="${7:-1}"

      emoji=":gear:"
      colour="#E01E5A"
      case "$message" in
        *"scaling up"*|*"scale up"*|*"increased"*|*"desired replica count is larger"*)
          emoji=":arrow_up:"
          colour="#2EB67D"
          ;;
        *"scaling down"*|*"scale down"*|*"decreased"*|*"desired replica count is smaller"*)
          emoji=":arrow_down:"
          colour="#ECB22E"
          ;;
      esac
      escaped_reason="$(json_escape "$event_reason")"
      escaped_hpa="$(json_escape "$hpa_name")"
      escaped_namespace="$(json_escape "$namespace")"
      escaped_first_seen="$(json_escape "$first_timestamp")"
      escaped_message="$(json_escape "$message")"
      escaped_object="$(json_escape "$involved_object")"
      now_utc="$(date -u +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || printf '%s' 'unknown')"

      cat <<EOF
{
  "attachments": [
    {
      "color": "$colour",
      "blocks": [
        {
          "type": "header",
          "text": {
            "type": "plain_text",
            "text": "$emoji HPA Scaling Event: $escaped_hpa",
            "emoji": true
          }
        },
        {
          "type": "section",
          "fields": [
            {"type": "mrkdwn", "text": "*Reason:*\n\`$escaped_reason\`"},
            {"type": "mrkdwn", "text": "*Namespace:*\n\`$escaped_namespace\`"},
            {"type": "mrkdwn", "text": "*Involved Object:*\n\`$escaped_object\`"},
            {"type": "mrkdwn", "text": "*First Seen:*\n\`$escaped_first_seen\`"},
            {"type": "mrkdwn", "text": "*Event Count:*\n$count"},
            {"type": "mrkdwn", "text": "*Message:*\n\`\`\`$escaped_message\`\`\`"}
          ]
        },
        {
          "type": "context",
          "elements": [
            {"type": "mrkdwn", "text": "TradersApp HPA watcher | namespace=$escaped_namespace | observed_at=$now_utc"}
          ]
        }
      ]
    }
  ]
}
EOF
    }

    event_already_seen() {
      event_key="$1"
      grep -Fxq "$event_key" "$SEEN_EVENTS_FILE"
    }

    mark_event_seen() {
      event_key="$1"
      printf '%s\n' "$event_key" >> "$SEEN_EVENTS_FILE"
    }

    scan_hpa_events() {
      cutoff=""
      case "$LOOKBACK_SECONDS" in
        ''|*[!0-9]*)
          LOOKBACK_SECONDS=0
          ;;
      esac
      if [ "$LOOKBACK_SECONDS" -gt 0 ]; then
        cutoff="$(date -u -d "-${LOOKBACK_SECONDS} seconds" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || true)"
      fi

      "$KUBECTL_BIN" get events \
        --namespace "$K8S_NAMESPACE" \
        --field-selector involvedObject.kind=HorizontalPodAutoscaler \
        --sort-by=.lastTimestamp \
        -o custom-columns=LAST_SEEN:.lastTimestamp,UID:.metadata.uid,TYPE:.type,REASON:.reason,COUNT:.count,KIND:.involvedObject.kind,NAME:.involvedObject.name,MESSAGE:.message \
        --no-headers 2>/dev/null |
      while IFS= read -r line; do
        [ -n "$line" ] || continue

        last_seen="$(printf '%s\n' "$line" | awk '{print $1}')"
        event_uid="$(printf '%s\n' "$line" | awk '{print $2}')"
        event_type="$(printf '%s\n' "$line" | awk '{print $3}')"
        event_reason="$(printf '%s\n' "$line" | awk '{print $4}')"
        count="$(printf '%s\n' "$line" | awk '{print $5}')"
        kind="$(printf '%s\n' "$line" | awk '{print $6}')"
        name="$(printf '%s\n' "$line" | awk '{print $7}')"
        message="$(printf '%s\n' "$line" | cut -d' ' -f8-)"

        if [ -n "$cutoff" ] && [ -n "$last_seen" ] && [ "$last_seen" < "$cutoff" ]; then
          continue
        fi

        event_key="${event_uid:-${event_reason}:${name}:${last_seen}:${count}}"
        if event_already_seen "$event_key"; then
          echo "[watch-hpa-events] Skipping already-reported event: $event_key"
          continue
        fi

        payload="$(format_slack_message \
          "$event_reason" \
          "$name" \
          "$K8S_NAMESPACE" \
          "$last_seen" \
          "$message" \
          "${kind}/${name}" \
          "$count")"

        echo "[watch-hpa-events] HPA event detected: ${name} (${event_reason}, type=${event_type}, count=${count})"
        send_slack "$payload"
        mark_event_seen "$event_key"
      done
    }

    if [ ! -x "$KUBECTL_BIN" ] && ! command -v "$KUBECTL_BIN" >/dev/null 2>&1; then
      echo "[watch-hpa-events] ERROR: kubectl not found at '$KUBECTL_BIN'." >&2
      exit 1
    fi

    if [ ! -f "$SEEN_EVENTS_FILE" ]; then
      : > "$SEEN_EVENTS_FILE"
    fi

    echo "[watch-hpa-events] Starting HPA event watcher (namespace=$K8S_NAMESPACE, poll_interval=${POLL_INTERVAL}s, lookback=${LOOKBACK_SECONDS}s)"
    if [ -n "$SLACK_WEBHOOK_URL" ]; then
      echo "[watch-hpa-events] Slack webhook: configured"
    else
      echo "[watch-hpa-events] Slack webhook: not configured"
    fi

    while :; do
      scan_hpa_events
      if [ "$RUN_ONCE" = "1" ]; then
        exit 0
      fi
      sleep "$POLL_INTERVAL"
    done

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ $namespace }}
  labels:
    {{- include "tradersapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: hpa-watcher

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}
  namespace: {{ $namespace }}
  labels:
    {{- include "tradersapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: hpa-watcher
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}
  namespace: {{ $namespace }}
  labels:
    {{- include "tradersapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: hpa-watcher
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ $namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $namespace }}
  labels:
    {{- include "tradersapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: hpa-watcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: hpa-watcher
      app.kubernetes.io/name: {{ include "tradersapp.name" . }}
  template:
    metadata:
      labels:
        {{- include "tradersapp.labels" . | nindent 8 }}
        app.kubernetes.io/component: hpa-watcher
    spec:
      serviceAccountName: {{ $name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: kubectl
          image: registry.k8s.io/kubectl:v1.30.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - cp "$(command -v kubectl)" /kubectl-bin/kubectl && chmod 0555 /kubectl-bin/kubectl
          volumeMounts:
            - name: kubectl-bin
              mountPath: /kubectl-bin
      containers:
        - name: hpa-watcher
          image: "{{ $watcherImage.repository }}:{{ $watcherImage.tag }}"
          imagePullPolicy: {{ include "tradersapp.imagePullPolicy" $watcherImage }}
          command:
            - /bin/sh
            - /opt/watch-hpa-events/watch-hpa-events.sh
          env:
            - name: K8S_NAMESPACE
              value: {{ $namespace | quote }}
            - name: POLL_INTERVAL
              value: {{ .Values.mlEngine.hpaWatcher.pollIntervalSeconds | quote }}
            - name: LOOKBACK_SECONDS
              value: {{ .Values.mlEngine.hpaWatcher.lookbackSeconds | quote }}
            - name: KUBECTL_BIN
              value: /kubectl-bin/kubectl
            - name: SEEN_EVENTS_FILE
              value: /state/seen-events.txt
            {{- if eq (len $slackSecretParts) 2 }}
            - name: SLACK_HPA_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ index $slackSecretParts 0 | quote }}
                  key: {{ index $slackSecretParts 1 | quote }}
            {{- else }}
            - name: SLACK_HPA_WEBHOOK_URL
              value: {{ .Values.mlEngine.hpaWatcher.slackWebhook | default "" | quote }}
            {{- end }}
          volumeMounts:
            - name: script
              mountPath: /opt/watch-hpa-events
              readOnly: true
            - name: state
              mountPath: /state
            - name: kubectl-bin
              mountPath: /kubectl-bin
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: script
          configMap:
            name: {{ $scriptName }}
            defaultMode: 0555
        - name: state
          emptyDir: {}
        - name: kubectl-bin
          emptyDir: {}
{{- end }}
