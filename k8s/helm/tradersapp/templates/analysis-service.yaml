{{- if .Values.analysisService.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analysis-service
  namespace: {{ include "tradersapp.namespace" . }}
  labels:
    {{- include "tradersapp.labels" . | nindent 4 }}
    tier: analysis
spec:
  replicas: {{ .Values.analysisService.replicaCount }}
  selector:
    matchLabels:
      app: analysis-service
  template:
    metadata:
      labels:
        app: analysis-service
        tier: analysis
        {{- include "tradersapp.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: analysis-service
          image: "{{ .Values.bff.image.repository }}:{{ .Values.bff.image.tag }}"
          imagePullPolicy: {{ include "tradersapp.imagePullPolicy" .Values.bff.image }}
          command: ["node", "analysis-server.mjs"]
          ports:
            - name: grpc
              containerPort: {{ .Values.analysisService.service.port }}
            - name: health
              containerPort: {{ .Values.analysisService.service.healthPort }}
          env:
            - name: ML_ENGINE_URL
              value: "http://ml-engine:8001"
            - name: ANALYSIS_SERVICE_GRPC_PORT
              value: {{ .Values.analysisService.service.port | quote }}
            - name: ANALYSIS_SERVICE_HEALTH_PORT
              value: {{ .Values.analysisService.service.healthPort | quote }}
            - name: NODE_ENV
              value: "production"
          {{- with .Values.analysisService.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.analysisService.service.healthPort }}
            failureThreshold: 20
            periodSeconds: 10
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.analysisService.service.healthPort }}
            failureThreshold: 3
            periodSeconds: 20
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.analysisService.service.healthPort }}
            failureThreshold: 3
            periodSeconds: 10
            initialDelaySeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: analysis-service
  namespace: {{ include "tradersapp.namespace" . }}
spec:
  type: {{ .Values.analysisService.service.type }}
  selector:
    app: analysis-service
  ports:
    - name: grpc
      port: {{ .Values.analysisService.service.port }}
      targetPort: {{ .Values.analysisService.service.port }}
{{- end }}

