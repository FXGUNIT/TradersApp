{{- /* Frontend Deployment + Service */ -}}
{{- if .Values.frontend.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ include "tradersapp.namespace" . }}
  labels:
    {{- include "tradersapp.labels" . | nindent 4 }}
    tier: web
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: {{ default "RollingUpdate" .Values.frontend.strategy.type }}
    {{- if eq (default "RollingUpdate" .Values.frontend.strategy.type) "RollingUpdate" }}
    {{- with .Values.frontend.strategy.rollingUpdate }}
    rollingUpdate:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- end }}
  template:
    metadata:
      labels:
        app: frontend
        tier: web
        {{- include "tradersapp.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
      # Soft pod anti-affinity — prefer spreading frontend pods across nodes.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: frontend
                topologyKey: kubernetes.io/hostname
      # Topology spread — ensure pods are distributed evenly across zones/nodes.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: frontend
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ include "tradersapp.imagePullPolicy" .Values.frontend.image }}
          ports:
            - name: http
              containerPort: {{ default 8080 .Values.frontend.containerPort }}
          {{- with .Values.frontend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 3
            periodSeconds: 15
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 3
            periodSeconds: 10
            initialDelaySeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: frontend-tmp
              mountPath: /tmp
      volumes:
        - name: frontend-tmp
          emptyDir:
            {{- with .Values.frontend.runtimeTmp.medium }}
            medium: {{ . }}
            {{- end }}
            {{- with .Values.frontend.runtimeTmp.sizeLimit }}
            sizeLimit: {{ . }}
            {{- end }}
      terminationGracePeriodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ include "tradersapp.namespace" . }}
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    app: frontend
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
{{- end }}
