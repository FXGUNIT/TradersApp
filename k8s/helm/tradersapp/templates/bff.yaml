{{- /* BFF Deployment + Service */ -}}
{{- if .Values.bff.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: {{ include "tradersapp.namespace" . }}
  labels:
    {{- include "tradersapp.labels" . | nindent 4 }}
    tier: api
spec:
  replicas: {{ .Values.bff.replicaCount }}
  selector:
    matchLabels:
      app: bff
  strategy:
    type: {{ default "RollingUpdate" .Values.bff.strategy.type }}
    {{- if eq (default "RollingUpdate" .Values.bff.strategy.type) "RollingUpdate" }}
    {{- with .Values.bff.strategy.rollingUpdate }}
    rollingUpdate:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- end }}
  template:
    metadata:
      labels:
        app: bff
        tier: api
        {{- include "tradersapp.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.bff.service.port }}"
        prometheus.io/path: "/metrics"
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      # Soft pod anti-affinity — prefer spreading bff pods across nodes.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: bff
                topologyKey: kubernetes.io/hostname
      # Topology spread — ensure pods are distributed evenly across zones/nodes.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: bff
      containers:
        - name: bff
          image: "{{ .Values.bff.image.repository }}:{{ .Values.bff.image.tag }}"
          imagePullPolicy: {{ include "tradersapp.imagePullPolicy" .Values.bff.image }}
          ports:
            - name: http
              containerPort: {{ .Values.bff.service.port }}
          {{- with .Values.bff.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: ML_ENGINE_URL
              value: "http://ml-engine:8001"
            - name: BFF_PORT
              value: {{ .Values.bff.service.port | quote }}
            - name: BFF_HOST
              value: "0.0.0.0"
            - name: ML_ANALYSIS_TRANSPORT
              value: "{{ .Values.bff.analysisTransport.mode }}"
            - name: ML_ANALYSIS_GRPC_ADDR
              value: "{{ .Values.bff.analysisTransport.grpcAddress }}"
            - name: ML_ANALYSIS_GRPC_STRICT
              value: "{{ .Values.bff.analysisTransport.grpcStrict }}"
            - name: REDIS_HOST
              value: "redis"
            - name: NODE_ENV
              value: "production"
            # Pod identity — used in logs and distributed traces
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MY_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: OTEL_SERVICE_NAME
              value: "bff"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger.monitoring:4317"
          {{- with .Values.bff.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /live
              port: {{ .Values.bff.service.port }}
            failureThreshold: 30
            periodSeconds: 10
            initialDelaySeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /live
              port: {{ .Values.bff.service.port }}
            failureThreshold: 3
            periodSeconds: 15
            initialDelaySeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.bff.service.port }}
            failureThreshold: 3
            periodSeconds: 10
            initialDelaySeconds: 10
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          {{- with .Values.bff.runtimeTmp }}
          volumeMounts:
            - name: bff-tmp
              mountPath: /tmp
          {{- end }}
      {{- with .Values.bff.runtimeTmp }}
      volumes:
        - name: bff-tmp
          emptyDir:
            {{- if .medium }}
            medium: {{ .medium }}
            {{- end }}
            {{- if .sizeLimit }}
            sizeLimit: {{ .sizeLimit }}
            {{- end }}
      {{- end }}
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: bff
  namespace: {{ include "tradersapp.namespace" . }}
spec:
  type: {{ .Values.bff.service.type }}
  selector:
    app: bff
  ports:
    - name: http
      port: {{ .Values.bff.service.port }}
      targetPort: {{ .Values.bff.service.port }}
{{- end }}

{{- /* ------------------------------------------------------------------
     BFF Canary Deployment (H04)
     Enabled via: helm upgrade --set bff.canary.enabled=true bff.canary.image.tag=<sha>
     Traffic split is pod-count weighted: 1 canary + N stable pods → ~1/(N+1) canary traffic.
     No service mesh required; works with the existing bff Service (app: bff selector).
     ------------------------------------------------------------------ */ -}}
{{- if and .Values.bff.enabled .Values.bff.canary.enabled -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff-canary
  namespace: {{ include "tradersapp.namespace" . }}
  labels:
    {{- include "tradersapp.labels" . | nindent 4 }}
    tier: api
    track: canary
  annotations:
    tradersapp/canary-weight: {{ .Values.bff.canary.replicaCount | quote }}
spec:
  replicas: {{ .Values.bff.canary.replicaCount }}
  selector:
    matchLabels:
      app: bff
      track: canary
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bff
        tier: api
        track: canary
        {{- include "tradersapp.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.bff.service.port }}"
        prometheus.io/path: "/metrics"
        tradersapp/canary: "true"
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: bff
          image: "{{ .Values.bff.image.repository }}:{{ .Values.bff.canary.image.tag | default .Values.bff.image.tag }}"
          imagePullPolicy: {{ include "tradersapp.imagePullPolicy" .Values.bff.image }}
          ports:
            - name: http
              containerPort: {{ .Values.bff.service.port }}
          {{- with .Values.bff.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: ML_ENGINE_URL
              value: "http://ml-engine:8001"
            - name: BFF_PORT
              value: {{ .Values.bff.service.port | quote }}
            - name: BFF_HOST
              value: "0.0.0.0"
            - name: ML_ANALYSIS_TRANSPORT
              value: "{{ .Values.bff.analysisTransport.mode }}"
            - name: ML_ANALYSIS_GRPC_ADDR
              value: "{{ .Values.bff.analysisTransport.grpcAddress }}"
            - name: ML_ANALYSIS_GRPC_STRICT
              value: "{{ .Values.bff.analysisTransport.grpcStrict }}"
            - name: REDIS_HOST
              value: "redis"
            - name: NODE_ENV
              value: "production"
            - name: CANARY
              value: "true"
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MY_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: OTEL_SERVICE_NAME
              value: "bff-canary"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger.monitoring:4317"
          {{- with .Values.bff.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /live
              port: {{ .Values.bff.service.port }}
            failureThreshold: 30
            periodSeconds: 10
            initialDelaySeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /live
              port: {{ .Values.bff.service.port }}
            failureThreshold: 3
            periodSeconds: 15
            initialDelaySeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.bff.service.port }}
            failureThreshold: 3
            periodSeconds: 10
            initialDelaySeconds: 10
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      terminationGracePeriodSeconds: 30
{{- end }}
