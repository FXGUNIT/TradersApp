{{- /* BFF Deployment + Service */ -}}
{{- if .Values.bff.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: {{ include "tradersapp.namespace" . }}
  labels:
    {{- include "tradersapp.labels" . | nindent 4 }}
    tier: api
spec:
  replicas: {{ .Values.bff.replicaCount }}
  selector:
    matchLabels:
      app: bff
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bff
        tier: api
        {{- include "tradersapp.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.bff.service.port }}"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: bff
          image: "{{ .Values.bff.image.repository }}:{{ .Values.bff.image.tag }}"
          imagePullPolicy: {{ include "tradersapp.imagePullPolicy" .Values.bff.image }}
          ports:
            - name: http
              containerPort: {{ .Values.bff.service.port }}
          env:
            - name: ML_ENGINE_URL
              value: "http://ml-engine:8001"
            - name: REDIS_HOST
              value: "redis"
            - name: NODE_ENV
              value: "production"
          {{- with .Values.bff.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.bff.service.port }}
            failureThreshold: 30
            periodSeconds: 10
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.bff.service.port }}
            failureThreshold: 3
            periodSeconds: 15
            initialDelaySeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.bff.service.port }}
            failureThreshold: 3
            periodSeconds: 10
            initialDelaySeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: bff
  namespace: {{ include "tradersapp.namespace" . }}
spec:
  type: {{ .Values.bff.service.type }}
  selector:
    app: bff
  ports:
    - name: http
      port: {{ .Values.bff.service.port }}
      targetPort: {{ .Values.bff.service.port }}
{{- end }}