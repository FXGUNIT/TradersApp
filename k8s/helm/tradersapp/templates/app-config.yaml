{{- /* Helm-managed ConfigMaps for non-secret runtime configuration (ID 70) */ -}}
{{- $ns := include "tradersapp.namespace" . -}}

{{- if .Values.mlEngine.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-engine-config
  namespace: {{ $ns }}
  labels:
    {{- include "tradersapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: ml-engine-config
data:
  MODEL_STORE: "/models/store"
  MODEL_STORE_READ_ONLY: "true"
  MODEL_REGISTRY_MODE: {{ ternary "sidecar" "direct" .Values.mlEngine.modelRegistrySidecar.enabled | quote }}
  MODEL_REGISTRY_URL: "http://127.0.0.1:{{ .Values.mlEngine.modelRegistrySidecar.port }}"
  MODEL_REGISTRY_PORT: {{ .Values.mlEngine.modelRegistrySidecar.port | quote }}
  MODEL_REGISTRY_MAX_CACHED_INSTANCES: {{ .Values.mlEngine.modelRegistrySidecar.maxCachedInstances | quote }}
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
  KAFKA_ENABLE: {{ ternary "true" "false" .Values.mlEngine.kafkaEnabled | quote }}
  MLFLOW_TRACKING_URI: {{ .Values.mlflow.trackingUri | quote }}
  OTEL_ENABLED: "true"
  OTEL_SERVICE_NAME: "ml-engine"
  OTEL_EXPORTER_JAEGER_AGENT_HOST_NAME: "jaeger"
  OTEL_EXPORTER_JAEGER_AGENT_PORT: "6831"
  LOG_LEVEL: "INFO"
  CACHE_TTL_SECONDS: "60"
  REGIME_CACHE_TTL_SECONDS: "300"
  DQ_QUARANTINE_DIR: "/data/dq_quarantine"
  CONTINUAL_LEARNING_DIR: {{ .Values.mlEngine.runtimeState.continualLearningDir | quote }}
  MAMBA_CACHE_DIR: {{ .Values.mlEngine.runtimeState.mambaCacheDir | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-engine-env
  namespace: {{ $ns }}
  labels:
    {{- include "tradersapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: ml-engine-env
data:
  APP_PORT: {{ .Values.mlEngine.service.port | quote }}
  DB_PATH: "/data/trading_data.db"
  REQUIRE_DATABASE_URL: {{ ternary "true" "false" .Values.mlEngine.requireDatabaseUrl | quote }}
  CORS_ALLOWED_ORIGINS: "http://tradersapp.local"
  KAFKA_GROUP_ID: "ml-engine-consumers"
  KAFKA_CONSUMER_GROUP: "ml-engine-consumers"
  KAFKA_AUTO_OFFSET_RESET: "earliest"
  MAX_CANDLES_PER_REQUEST: "10000"
{{- end }}

{{- if .Values.bff.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bff-config
  namespace: {{ $ns }}
  labels:
    {{- include "tradersapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: bff-config
data:
  ML_ENGINE_URL: "http://ml-engine:{{ .Values.mlEngine.service.port }}"
  BFF_PORT: {{ .Values.bff.service.port | quote }}
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  CACHE_TTL_MS: "60000"
  CIRCUIT_BREAKER_FAILURE_THRESHOLD: "5"
  CIRCUIT_BREAKER_TIMEOUT_SECONDS: "30"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "120"
  REQUEST_TIMEOUT_MS: "5000"
  ML_ANALYSIS_TRANSPORT: {{ .Values.bff.analysisTransport.mode | quote }}
  ML_ANALYSIS_GRPC_ADDR: {{ .Values.bff.analysisTransport.grpcAddress | quote }}
  ML_ANALYSIS_GRPC_STRICT: {{ ternary "true" "false" .Values.bff.analysisTransport.grpcStrict | quote }}
{{- end }}
