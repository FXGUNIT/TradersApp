{{- if .Values.mlflow.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-postgres-secret
  namespace: {{ include "tradersapp.namespace" . }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.mlflow.postgres.database | quote }}
  POSTGRES_USER: {{ .Values.mlflow.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.mlflow.postgres.password | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-postgres
  namespace: {{ include "tradersapp.namespace" . }}
  labels:
    app: mlflow-postgres
    tier: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-postgres
  template:
    metadata:
      labels:
        app: mlflow-postgres
        tier: data
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.mlflow.postgres.image.repository }}:{{ .Values.mlflow.postgres.image.tag }}"
          imagePullPolicy: {{ include "tradersapp.imagePullPolicy" .Values.mlflow.postgres.image }}
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: mlflow-postgres-secret
          {{- with .Values.mlflow.postgres.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.mlflow.postgres.user }}", "-d", "{{ .Values.mlflow.postgres.database }}"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.mlflow.postgres.user }}", "-d", "{{ .Values.mlflow.postgres.database }}"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          {{- if .Values.mlflow.postgres.persistence.enabled }}
          persistentVolumeClaim:
            claimName: mlflow-postgres-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}
---
{{- if .Values.mlflow.postgres.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-postgres-pvc
  namespace: {{ include "tradersapp.namespace" . }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- with .Values.mlflow.postgres.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.mlflow.postgres.persistence.size | quote }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: mlflow-postgres
  namespace: {{ include "tradersapp.namespace" . }}
spec:
  type: ClusterIP
  selector:
    app: mlflow-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: {{ include "tradersapp.namespace" . }}
type: Opaque
stringData:
  MINIO_ROOT_USER: {{ .Values.mlflow.minio.user | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.mlflow.minio.password | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: {{ include "tradersapp.namespace" . }}
  labels:
    app: minio
    tier: storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
        tier: storage
    spec:
      containers:
        - name: minio
          image: "{{ .Values.mlflow.minio.image.repository }}:{{ .Values.mlflow.minio.image.tag }}"
          imagePullPolicy: {{ include "tradersapp.imagePullPolicy" .Values.mlflow.minio.image }}
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
          {{- with .Values.mlflow.minio.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: minio-data
              mountPath: /data
      volumes:
        - name: minio-data
          {{- if .Values.mlflow.minio.persistence.enabled }}
          persistentVolumeClaim:
            claimName: minio-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}
---
{{- if .Values.mlflow.minio.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: {{ include "tradersapp.namespace" . }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- with .Values.mlflow.minio.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.mlflow.minio.persistence.size | quote }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: {{ include "tradersapp.namespace" . }}
spec:
  type: ClusterIP
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup
  namespace: {{ include "tradersapp.namespace" . }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: minio-setup
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: "{{ .Values.mlflow.minio.clientImage.repository }}:{{ .Values.mlflow.minio.clientImage.tag }}"
          imagePullPolicy: {{ include "tradersapp.imagePullPolicy" .Values.mlflow.minio.clientImage }}
          env:
            - name: MINIO_ENDPOINT
              value: {{ .Values.mlflow.s3.endpointUrl | quote }}
            - name: MLFLOW_BUCKET
              value: {{ .Values.mlflow.s3.bucket | quote }}
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
          command: ["/bin/sh", "-c"]
          args:
            - |
              until mc alias set local "${MINIO_ENDPOINT}" "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"; do
                echo "waiting for minio..."
                sleep 3
              done
              mc mb --ignore-existing "local/${MLFLOW_BUCKET}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: {{ include "tradersapp.namespace" . }}
  labels:
    app: mlflow
    tier: mlops
spec:
  replicas: {{ .Values.mlflow.replicaCount }}
  selector:
    matchLabels:
      app: mlflow
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: mlflow
        tier: mlops
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.mlflow.service.port }}"
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mlflow
          image: "{{ .Values.mlflow.image.repository }}:{{ .Values.mlflow.image.tag }}"
          imagePullPolicy: {{ include "tradersapp.imagePullPolicy" .Values.mlflow.image }}
          args:
            - mlflow
            - server
            - --host
            - 0.0.0.0
            - --port
            - {{ .Values.mlflow.service.port | quote }}
            - --backend-store-uri
            - postgresql://{{ .Values.mlflow.postgres.user }}:{{ .Values.mlflow.postgres.password }}@mlflow-postgres:5432/{{ .Values.mlflow.postgres.database }}
            - --artifacts-destination
            - s3://{{ .Values.mlflow.s3.bucket }}/
            - --serve-artifacts
            - --gunicorn-opts
            - {{ .Values.mlflow.gunicornOptions | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.mlflow.service.port }}
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.mlflow.s3.region | quote }}
            - name: MLFLOW_S3_ENDPOINT_URL
              value: {{ .Values.mlflow.s3.endpointUrl | quote }}
            - name: MLFLOW_TRACKING_URI
              value: {{ .Values.mlflow.trackingUri | quote }}
          {{- with .Values.mlflow.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.mlflow.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.mlflow.service.port }}
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.mlflow.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: {{ include "tradersapp.namespace" . }}
spec:
  type: {{ .Values.mlflow.service.type }}
  selector:
    app: mlflow
  ports:
    - name: http
      port: {{ .Values.mlflow.service.port }}
      targetPort: {{ .Values.mlflow.service.port }}
{{- end }}
