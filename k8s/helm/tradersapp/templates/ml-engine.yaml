{{- /* ML Engine Deployment + Service + HPA + PDB */ -}}
{{- if .Values.mlEngine.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-engine
  namespace: {{ include "tradersapp.namespace" . }}
  labels:
    {{- include "tradersapp.labels" . | nindent 4 }}
    tier: ml
spec:
  replicas: {{ .Values.mlEngine.replicaCount }}
  selector:
    matchLabels:
      app: ml-engine
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ml-engine
        tier: ml
        {{- include "tradersapp.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.mlEngine.service.port }}"
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      {{- if .Values.mlEngine.persistence.enabled }}
      # Init container: pre-loads the latest MLflow Production model into the
      # shared PVC before the main container starts. All pods see the same model.
      initContainers:
        - name: model-sync
          image: "{{ .Values.mlEngine.image.repository }}:{{ .Values.mlEngine.image.tag }}"
          imagePullPolicy: {{ include "tradersapp.imagePullPolicy" .Values.mlEngine.image }}
          command:
            - python
            - -c
            - |
              import os, sys
              sys.path.insert(0, '/app')
              from training.model_store import ModelStore
              from infrastructure.mlflow_client import get_mlflow_client
              store = ModelStore()
              ml_client = get_mlflow_client("direction")
              if ml_client:
                  for model_name in store.list_all_models():
                      try:
                          prod = ml_client.get_production_model(model_name)
                          if prod and prod.get("version"):
                              import mlflow
                              ver = str(prod["version"])
                              print(f"Pre-loading {model_name}@{ver} into PVC...")
                              pipeline = mlflow.sklearn.load_model(f"models:/{model_name}/{ver}")
                              store.save(model_name, pipeline, prod.get("metrics", {}),
                                         prod.get("feature_cols", []), version=ver,
                                         extra={"source": "init_sync", "run_id": prod.get("run_id")})
                              print(f"  {model_name}@{ver} synced to PVC")
                      except Exception as e:
                          print(f"  Skipped {model_name}: {e}")
              print("Model sync complete.")
          env:
            - name: MLFLOW_USE_REGISTRY
              value: "true"
            - name: MODEL_STORE_PVC_MOUNT
              value: /models/store
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      {{- end }}
      containers:
        - name: ml-engine
          image: "{{ .Values.mlEngine.image.repository }}:{{ .Values.mlEngine.image.tag }}"
          imagePullPolicy: {{ include "tradersapp.imagePullPolicy" .Values.mlEngine.image }}
          ports:
            - name: http
              containerPort: {{ .Values.mlEngine.service.port }}
          envFrom:
            - secretRef:
                name: ml-engine-secrets
          env:
            - name: DB_PATH
              value: "/data/trading_data.db"
            # Shared PVC mount for model store — all pods see the same model artifacts
            - name: MODEL_STORE_PVC_MOUNT
              value: "/models/store"
            # Enable MLflow registry: pods consult Production stage and hot-reload
            - name: MLFLOW_USE_REGISTRY
              value: "true"
            - name: MLFLOW_TRACKING_URI
              value: {{ .Values.mlflow.trackingUri | quote }}
            - name: REDIS_HOST
              value: "redis"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
            - name: OTEL_SERVICE_NAME
              value: "ml-engine"
            - name: DQ_VALIDATE_BEFORE_TRAIN
              value: {{ ternary "true" "false" .Values.mlEngine.dataQuality.validateBeforeTrain | quote }}
            - name: DQ_VALIDATE_BEFORE_PREDICT
              value: "true"
            - name: DQ_BLOCK_ON_CRITICAL
              value: {{ ternary "true" "false" .Values.mlEngine.dataQuality.blockOnCritical | quote }}
            - name: DQ_REQUIRE_GX
              value: {{ ternary "true" "false" .Values.mlEngine.dataQuality.requireGreatExpectations | quote }}
            - name: DQ_VALIDATE_DAYS
              value: {{ .Values.mlEngine.dataQuality.lookbackDays | quote }}
            - name: INFERENCE_P99_TARGET_MS
              value: {{ .Values.triton.inferenceLatencyTargetMs | default 100 | quote }}
            - name: DQ_ALERT_WEBHOOK
              value: {{ .Values.mlEngine.dataQuality.alertWebhook | default "" | quote }}
            - name: DQ_QUARANTINE_DIR
              value: {{ .Values.mlEngine.dataQuality.quarantineDir | default "/data/dq_quarantine" | quote }}
          {{- with .Values.mlEngine.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.mlEngine.service.port }}
            failureThreshold: 30
            periodSeconds: 10
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.mlEngine.service.port }}
            failureThreshold: 3
            periodSeconds: 20
            initialDelaySeconds: 60
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.mlEngine.service.port }}
            failureThreshold: 3
            periodSeconds: 10
            initialDelaySeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: models
              mountPath: /models
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          emptyDir: {}
        - name: models
          {{- if .Values.mlEngine.persistence.enabled }}
          persistentVolumeClaim:
            claimName: ml-models-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
      terminationGracePeriodSeconds: 60
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: ml-engine
  namespace: {{ include "tradersapp.namespace" . }}
spec:
  type: {{ .Values.mlEngine.service.type }}
  selector:
    app: ml-engine
  ports:
    - name: http
      port: {{ .Values.mlEngine.service.port }}
      targetPort: {{ .Values.mlEngine.service.port }}
{{- end }}
