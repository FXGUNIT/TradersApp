{{- /* ML Engine Deployment + Service + HPA + PDB */ -}}
{{- if .Values.mlEngine.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-engine
  namespace: {{ include "tradersapp.namespace" . }}
  labels:
    {{- include "tradersapp.labels" . | nindent 4 }}
    tier: ml
spec:
  replicas: {{ .Values.mlEngine.replicaCount }}
  selector:
    matchLabels:
      app: ml-engine
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ml-engine
        tier: ml
        {{- include "tradersapp.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.mlEngine.service.metricsPort }}"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: ml-engine
          image: "{{ .Values.mlEngine.image.repository }}:{{ .Values.mlEngine.image.tag }}"
          imagePullPolicy: {{ include "tradersapp.imagePullPolicy" .Values.mlEngine.image }}
          ports:
            - name: http
              containerPort: {{ .Values.mlEngine.service.port }}
            - name: metrics
              containerPort: {{ .Values.mlEngine.service.metricsPort }}
          env:
            - name: DB_PATH
              value: "/data/trading_data.db"
            - name: MODEL_STORE
              value: "/models/store"
            - name: REDIS_HOST
              value: "redis"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
            - name: OTEL_SERVICE_NAME
              value: "ml-engine"
          {{- with .Values.mlEngine.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.mlEngine.service.port }}
            failureThreshold: 30
            periodSeconds: 10
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.mlEngine.service.port }}
            failureThreshold: 3
            periodSeconds: 20
            initialDelaySeconds: 60
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.mlEngine.service.port }}
            failureThreshold: 3
            periodSeconds: 10
            initialDelaySeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: models
              mountPath: /models
      volumes:
        - name: data
          emptyDir: {}
        - name: models
          {{- if .Values.mlEngine.persistence.enabled }}
          persistentVolumeClaim:
            claimName: ml-models-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}
      terminationGracePeriodSeconds: 60
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: ml-engine
  namespace: {{ include "tradersapp.namespace" . }}
spec:
  type: {{ .Values.mlEngine.service.type }}
  selector:
    app: ml-engine
  ports:
    - name: http
      port: {{ .Values.mlEngine.service.port }}
      targetPort: {{ .Values.mlEngine.service.port }}
    - name: metrics
      port: {{ .Values.mlEngine.service.metricsPort }}
      targetPort: {{ .Values.mlEngine.service.metricsPort }}
{{- end }}