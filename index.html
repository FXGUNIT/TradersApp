<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0"
    />
    <title>TradersApp</title>

    <!-- RULE #308: PWA Manifest and Native App Configuration -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme & Branding Colors -->
    <meta name="theme-color" content="#0A0A0F" />
    <meta name="color-scheme" content="dark light" />

    <!-- Apple Mobile Web App Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="TradersApp" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Microsoft Application Support -->
    <meta name="msapplication-navbutton-color" content="#0A0A0F" />
    <meta name="msapplication-TileColor" content="#0A0A0F" />
    <meta name="msapplication-TileImage" content="/favicon.svg" />

    <!-- Splash Screen & Standalone Display -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="full-screen" content="yes" />
    <meta name="browsermode" content="application" />

    <!-- Description for App Stores -->
    <meta
      name="description"
      content="Professional trading platform with real-time user management, fraud detection, and institutional admin controls"
    />
    <meta name="keywords" content="trading,admin,dashboard,terminal" />
    <meta name="author" content="TradersApp" />

    <!-- RULE #165: DNS Prefetching for external API services -->
    <!-- Resolves DNS for Firebase services (Auth, Database, Storage) -->
    <link rel="dns-prefetch" href="//identitytoolkit.googleapis.com" />
    <link rel="dns-prefetch" href="//firebasedatabase.app" />
    <link rel="dns-prefetch" href="//firebaseio.com" />
    <link rel="dns-prefetch" href="//googleapis.com" />

    <!-- Resolves DNS for Telegram Bot API -->
    <link rel="dns-prefetch" href="//api.telegram.org" />

    <!-- Resolves DNS for EmailJS service -->
    <link rel="dns-prefetch" href="//api.emailjs.com" />

    <!-- Resolves DNS for Anthropic Claude API -->
    <link rel="dns-prefetch" href="//api.anthropic.com" />
  </head>
  <body>
    <div id="root"></div>

    <!-- AURA SMART LATTICE NAVIGATION - DIAMOND NAVIGATION LATTICE -->
    <!-- Patent Black Shine, Liquid Chrome, Minimalist High-Gloss -->
    <div
      id="aura-navigation-lattice"
      class="aura-navigation-lattice"
      style="display: none"
    >
      <!-- Diamond Core: Central Navigation Hub -->
      <div class="aura-lattice-core">
        <!-- Back Arrow (Left) - Intelligent Back Logic -->
        <button
          class="aura-smart-arrow aura-arrow-back"
          aria-label="Smart Back Navigation"
          title="Intelligent Back (Session-Aware)"
          onclick="window.AuraNavigation?.handleSmartBack()"
        >
          <svg class="aura-arrow-icon" viewBox="0 0 24 24" fill="none">
            <path
              d="M15 18L9 12L15 6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span class="aura-arrow-label">BACK</span>
          <div class="aura-arrow-glow"></div>
        </button>

        <!-- Forward Arrow (Right) - Contextual Forward -->
        <button
          class="aura-smart-arrow aura-arrow-forward"
          aria-label="Forward Navigation"
          title="Contextual Forward"
          onclick="window.history.forward()"
        >
          <svg class="aura-arrow-icon" viewBox="0 0 24 24" fill="none">
            <path
              d="M9 18L15 12L9 6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span class="aura-arrow-label">FWD</span>
          <div class="aura-arrow-glow"></div>
        </button>

        <!-- Up Arrow (Top) - Scroll to Top -->
        <button
          class="aura-smart-arrow aura-arrow-up"
          aria-label="Scroll to Top"
          title="Smooth Scroll to Top"
          onclick="window.scrollTo({ top: 0, behavior: 'smooth' })"
        >
          <svg class="aura-arrow-icon" viewBox="0 0 24 24" fill="none">
            <path
              d="M12 19V5M12 5L5 12M12 5L19 12"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span class="aura-arrow-label">TOP</span>
          <div class="aura-arrow-glow"></div>
        </button>

        <!-- Down Arrow (Bottom) - Scroll to Bottom -->
        <button
          class="aura-smart-arrow aura-arrow-down"
          aria-label="Scroll to Bottom"
          title="Smooth Scroll to Bottom"
          onclick="
            window.scrollTo({
              top: document.body.scrollHeight,
              behavior: 'smooth',
            })
          "
        >
          <svg class="aura-arrow-icon" viewBox="0 0 24 24" fill="none">
            <path
              d="M12 5V19M12 19L5 12M12 19L19 12"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span class="aura-arrow-label">BOT</span>
          <div class="aura-arrow-glow"></div>
        </button>

        <!-- Center Diamond: Vitality Orb -->
        <div class="aura-diamond-center">
          <div class="aura-diamond-inner">
            <div class="aura-diamond-sparkle"></div>
            <div class="aura-diamond-sparkle"></div>
            <div class="aura-diamond-sparkle"></div>
          </div>
        </div>
      </div>

      <!-- Connection Lines: Diamond Lattice Structure -->
      <svg class="aura-lattice-lines" width="100%" height="100%">
        <defs>
          <linearGradient
            id="aura-line-gradient"
            x1="0%"
            y1="0%"
            x2="100%"
            y2="100%"
          >
            <stop
              offset="0%"
              stop-color="var(--aura-accent-primary)"
              stop-opacity="0.8"
            />
            <stop
              offset="100%"
              stop-color="var(--aura-accent-success)"
              stop-opacity="0.4"
            />
          </linearGradient>
          <filter id="aura-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
        <line
          class="aura-lattice-line"
          x1="50%"
          y1="50%"
          x2="20%"
          y2="20%"
          filter="url(#aura-glow)"
        />
        <line
          class="aura-lattice-line"
          x1="50%"
          y1="50%"
          x2="80%"
          y2="20%"
          filter="url(#aura-glow)"
        />
        <line
          class="aura-lattice-line"
          x1="50%"
          y1="50%"
          x2="20%"
          y2="80%"
          filter="url(#aura-glow)"
        />
        <line
          class="aura-lattice-line"
          x1="50%"
          y1="50%"
          x2="80%"
          y2="80%"
          filter="url(#aura-glow)"
        />
      </svg>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
