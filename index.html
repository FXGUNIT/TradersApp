  <head>

    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:title" content="TradersApp — Algorithmic Trading Signals Platform" />
    <meta property="og:description" content="Real-time algorithmic trading signals, session probability analysis, and AI market regime detection. Built for active intraday traders." />

    <!-- Structured Data — WebApplication Schema -->
