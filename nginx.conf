server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to BFF
    # Resolver directive must be present; nginx resolves variable-based upstream at runtime
    resolver 10.43.0.10 valid=10s ipv6=off;
    set $bff_backend http://bff:8788;
    location /api/ {
        proxy_pass $bff_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # WebSocket support
    location /ws {
        proxy_pass $bff_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Also proxy root "/" to BFF for non-API calls (fallback)
    location = / {
        proxy_pass $bff_backend;
    }

    location /health {
        add_header Content-Type text/plain;
        return 200 "ok";
    }
}
