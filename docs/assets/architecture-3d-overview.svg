<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">TradersApp - Current Runtime Overview</title>
  <desc id="desc">Current runtime topology showing the live request path, support planes, deployment modes, and extraction status.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#ea580c"/>
    </marker>
    <style>
      .bg { fill: #f4f7fb; }
      .title { font: 700 38px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .section { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .body { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .small { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .card-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .pill { font: 700 11px 'Segoe UI', Arial, sans-serif; fill: #ffffff; letter-spacing: 0.6px; }
      .status { font: 700 11px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="980"/>

  <text x="72" y="70" class="title">Current runtime overview</text>
  <text x="72" y="102" class="subtitle">Source of truth for what runs now, what is partial, and where the contracts actually sit.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="140" width="1480" height="260" rx="28" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <rect x="60" y="432" width="460" height="250" rx="28" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="570" y="432" width="460" height="250" rx="28" fill="#eefbf3" stroke="#bbf7d0" stroke-width="2"/>
    <rect x="1080" y="432" width="460" height="250" rx="28" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
    <rect x="60" y="714" width="1480" height="206" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  </g>

  <rect x="90" y="166" width="170" height="28" rx="14" fill="#ea580c"/>
  <text x="114" y="184" class="pill">LIVE REQUEST PATH</text>
  <text x="90" y="232" class="section">Serving topology</text>
  <text x="90" y="258" class="body">This is the path the user actually hits. The only extracted runtime seam is analysis-service.</text>
  <text x="90" y="280" class="small">Current baseline: document the consensus path as less than 200ms P95 until tighter numbers are re-ratified.</text>

  <g filter="url(#shadow)">
    <rect x="108" y="308" width="250" height="68" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="428" y="308" width="250" height="68" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="748" y="308" width="250" height="68" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="1068" y="308" width="250" height="68" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  </g>
  <text x="138" y="337" class="card-title">Frontend</text>
  <text x="138" y="358" class="body">React + Vite user interface</text>
  <text x="458" y="337" class="card-title">BFF</text>
  <text x="458" y="358" class="body">Node.js edge, auth, orchestration</text>
  <text x="778" y="337" class="card-title">analysis-service</text>
  <text x="778" y="358" class="body">gRPC seam on the hot path</text>
  <text x="1098" y="337" class="card-title">ML Engine</text>
  <text x="1098" y="358" class="body">Python inference and training runtime</text>

  <line x1="358" y1="342" x2="426" y2="342" stroke="#ea580c" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="678" y1="342" x2="746" y2="342" stroke="#ea580c" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="998" y1="342" x2="1066" y2="342" stroke="#ea580c" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="374" y="330" class="small">HTTP</text>
  <text x="694" y="330" class="small">gRPC</text>
  <text x="1014" y="330" class="small">HTTP /predict</text>

  <rect x="90" y="458" width="138" height="28" rx="14" fill="#334155"/>
  <text x="114" y="476" class="pill">DATA PLANE</text>
  <text x="90" y="524" class="section">Fast reads and event flow</text>
  <text x="90" y="552" class="body">Redis and Feast support low-latency feature access. Kafka exists in-repo and is partially proven in live ops.</text>
  <text x="90" y="578" class="small">Use this box for state and event ownership, not for deployment truth.</text>
  <text x="90" y="622" class="body">Current / partial:</text>
  <text x="210" y="622" class="body">Redis, Feast, Kafka</text>
  <rect x="366" y="608" width="104" height="24" rx="12" fill="#e2e8f0"/>
  <text x="388" y="624" class="status">CURRENT+</text>

  <rect x="600" y="458" width="176" height="28" rx="14" fill="#15803d"/>
  <text x="624" y="476" class="pill">LEARNING + CONTROL</text>
  <text x="600" y="524" class="section">Training, quality, registry</text>
  <text x="600" y="552" class="body">Airflow, Great Expectations, MLflow, MinIO, and PostgreSQL are present, but validation maturity still differs by environment.</text>
  <text x="600" y="578" class="small">Learning is still mostly implemented inside ml-engine modules and Airflow workflows.</text>
  <text x="600" y="622" class="body">Current / partial:</text>
  <text x="720" y="622" class="body">Airflow, GE, MLflow, MinIO, PostgreSQL</text>
  <rect x="908" y="608" width="94" height="24" rx="12" fill="#dcfce7"/>
  <text x="932" y="624" class="status">PARTIAL</text>

  <rect x="1110" y="458" width="194" height="28" rx="14" fill="#2563eb"/>
  <text x="1134" y="476" class="pill">OBSERVE + DELIVER</text>
  <text x="1110" y="524" class="section">Visibility and release reality</text>
  <text x="1110" y="552" class="body">Prometheus, Grafana, Loki, and Jaeger exist. Delivery is mixed: GitHub Actions plus Railway/Vercel are still current docs, while Gitea/Woodpecker plus Helm/k3s remain partial.</text>
  <text x="1110" y="578" class="small">Infisical is the intended secret source. External Secrets and some control-plane pieces are not uniformly live.</text>
  <text x="1110" y="622" class="body">Mixed:</text>
  <text x="1160" y="622" class="body">public cloud path current, self-hosted path partial</text>
  <rect x="1436" y="608" width="82" height="24" rx="12" fill="#dbeafe"/>
  <text x="1458" y="624" class="status">MIXED</text>

  <rect x="90" y="740" width="170" height="28" rx="14" fill="#0f172a"/>
  <text x="114" y="758" class="pill">BOUNDARY STATUS</text>
  <text x="90" y="806" class="section">What is actually extracted today</text>
  <text x="90" y="836" class="body">Current:</text>
  <text x="180" y="836" class="body">BFF orchestration runtime, analysis-service seam, ML Engine runtime</text>
  <text x="90" y="866" class="body">Logical only:</text>
  <text x="180" y="866" class="body">ingestion and learning are bounded contexts before they are separate deployables</text>
  <text x="90" y="896" class="body">Important nuance:</text>
  <text x="260" y="896" class="body">analysis-service is live, but still proxies ML Engine HTTP internals for consensus work</text>
</svg>
