<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1180" role="img" aria-labelledby="title desc">
  <title id="title">TradersApp - System Design Board</title>
  <desc id="desc">Detailed topology board showing current runtime services, support systems, controls, and delivery modes with explicit maturity labels.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f4f7fb; }
      .title { font: 700 38px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .group { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .body { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .small { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .box { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .pill { font: 700 11px 'Segoe UI', Arial, sans-serif; fill: #ffffff; letter-spacing: 0.6px; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1180"/>
  <text x="60" y="66" class="title">System design board</text>
  <text x="60" y="96" class="subtitle">Topology and capability inventory. This board is current-state aware and uses explicit maturity labels instead of implied production truth.</text>

  <g filter="url(#shadow)">
    <rect x="50" y="132" width="1700" height="296" rx="28" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <rect x="50" y="456" width="1120" height="310" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="1200" y="456" width="550" height="310" rx="28" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
    <rect x="50" y="794" width="820" height="320" rx="28" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="2"/>
    <rect x="900" y="794" width="850" height="320" rx="28" fill="#eefbf3" stroke="#bbf7d0" stroke-width="2"/>
  </g>

  <rect x="80" y="156" width="160" height="28" rx="14" fill="#ea580c"/>
  <text x="104" y="174" class="pill">REQUEST TOPOLOGY</text>
  <text x="80" y="222" class="group">Live runtime path</text>
  <text x="80" y="248" class="body">This section is about actual traffic flow, not aspirational protocols.</text>
  <text x="80" y="270" class="small">Current seam: BFF -> analysis-service over gRPC, then analysis-service -> ML Engine over HTTP /predict.</text>

  <g filter="url(#shadow)">
    <rect x="120" y="316" width="210" height="72" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="410" y="316" width="210" height="72" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="700" y="316" width="240" height="72" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="1020" y="316" width="240" height="72" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="1330" y="316" width="170" height="72" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  </g>
  <text x="150" y="346" class="box">Frontend</text>
  <text x="150" y="367" class="body">React + Vite</text>
  <text x="440" y="346" class="box">BFF</text>
  <text x="440" y="367" class="body">Node.js orchestration</text>
  <text x="730" y="346" class="box">analysis-service</text>
  <text x="730" y="367" class="body">gRPC hot-path seam</text>
  <text x="1050" y="346" class="box">ML Engine</text>
  <text x="1050" y="367" class="body">Python runtime</text>
  <text x="1360" y="346" class="box">Users</text>
  <text x="1360" y="367" class="body">trader + operator</text>

  <line x1="330" y1="350" x2="408" y2="350" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="620" y1="350" x2="698" y2="350" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="940" y1="350" x2="1018" y2="350" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1416" y1="316" x2="1416" y2="210" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="348" y="338" class="small">HTTP</text>
  <text x="638" y="338" class="small">gRPC</text>
  <text x="958" y="338" class="small">HTTP /predict</text>

  <rect x="80" y="480" width="186" height="28" rx="14" fill="#1e293b"/>
  <text x="104" y="498" class="pill">STATE + CONTROL</text>
  <text x="80" y="546" class="group">Shared systems behind the path</text>
  <text x="80" y="572" class="body">These capabilities exist in the repo, but some are only partially validated in live operations.</text>

  <g filter="url(#shadow)">
    <rect x="100" y="618" width="160" height="76" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="282" y="618" width="160" height="76" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="464" y="618" width="160" height="76" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="646" y="618" width="160" height="76" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="828" y="618" width="160" height="76" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="1010" y="618" width="130" height="76" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  </g>
  <text x="130" y="650" class="box">Redis</text>
  <text x="130" y="671" class="body">cache and sessions</text>
  <text x="312" y="650" class="box">Feast</text>
  <text x="312" y="671" class="body">online features</text>
  <text x="494" y="650" class="box">Kafka</text>
  <text x="494" y="671" class="body">event plane</text>
  <text x="676" y="650" class="box">Airflow + GE</text>
  <text x="676" y="671" class="body">retrain and DQ</text>
  <text x="858" y="650" class="box">MLflow + MinIO</text>
  <text x="858" y="671" class="body">registry and artifacts</text>
  <text x="1040" y="650" class="box">PostgreSQL</text>
  <text x="1040" y="671" class="body">metadata and state</text>

  <rect x="1228" y="480" width="176" height="28" rx="14" fill="#2563eb"/>
  <text x="1252" y="498" class="pill">OBSERVABILITY</text>
  <text x="1228" y="546" class="group">Visibility stack</text>
  <text x="1228" y="572" class="body">Defined in-repo and partly proven live. Keep descriptions at current or partial maturity, not blanket-live.</text>

  <g filter="url(#shadow)">
    <rect x="1248" y="622" width="144" height="76" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="1410" y="622" width="144" height="76" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="1572" y="622" width="144" height="76" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="1330" y="708" width="144" height="40" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
  </g>
  <text x="1278" y="653" class="box">Prometheus</text>
  <text x="1278" y="674" class="body">rules and scraping</text>
  <text x="1440" y="653" class="box">Grafana</text>
  <text x="1440" y="674" class="body">dashboards</text>
  <text x="1602" y="653" class="box">Loki + Jaeger</text>
  <text x="1602" y="674" class="body">logs and traces</text>
  <text x="1360" y="733" class="body">OTEL wiring and alerts</text>

  <rect x="80" y="818" width="178" height="28" rx="14" fill="#7c3aed"/>
  <text x="104" y="836" class="pill">CONTROLS + POLICY</text>
  <text x="80" y="884" class="group">Platform controls</text>
  <text x="80" y="910" class="body">Keycloak, External Secrets, Trivy operator, OPA, and Falco should be described individually by maturity.</text>
  <text x="80" y="932" class="small">Do not collapse them into one implied production-ready security plane.</text>

  <g filter="url(#shadow)">
    <rect x="100" y="972" width="142" height="66" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="262" y="972" width="142" height="66" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="424" y="972" width="142" height="66" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="586" y="972" width="142" height="66" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  </g>
  <text x="130" y="1000" class="box">Keycloak</text>
  <text x="130" y="1021" class="body">partial</text>
  <text x="292" y="1000" class="box">External Secrets</text>
  <text x="292" y="1021" class="body">partial</text>
  <text x="454" y="1000" class="box">OPA + Falco</text>
  <text x="454" y="1021" class="body">partial</text>
  <text x="616" y="1000" class="box">Trivy runtime</text>
  <text x="616" y="1021" class="body">planned or partial</text>

  <rect x="930" y="818" width="156" height="28" rx="14" fill="#15803d"/>
  <text x="954" y="836" class="pill">DELIVERY MODES</text>
  <text x="930" y="884" class="group">Mixed release reality</text>
  <text x="930" y="910" class="body">The repo still documents two operating paths. Mark them separately instead of pretending the choice is already settled.</text>

  <g filter="url(#shadow)">
    <rect x="950" y="958" width="350" height="66" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="1330" y="958" width="350" height="66" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  </g>
  <text x="980" y="987" class="box">Current / documented path</text>
  <text x="980" y="1008" class="body">GitHub Actions + Railway + Vercel</text>
  <text x="1360" y="987" class="box">Partial self-hosted path</text>
  <text x="1360" y="1008" class="body">Gitea + Woodpecker + Helm + k3s + Infisical</text>
</svg>
