<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">TradersApp architecture overview</title>
  <desc id="desc">Aligned architecture diagram showing the request path, supporting systems, and current extraction status.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#10233d" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef8d28"/>
    </marker>
    <style>
      .bg { fill: #f8fbff; }
      .title { font: 700 44px 'Segoe UI', Arial, sans-serif; fill: #10233d; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #516b88; }
      .section-title { font: 700 26px 'Segoe UI', Arial, sans-serif; fill: #10233d; }
      .section-copy { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #5a748f; }
      .tag { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #ffffff; letter-spacing: 0.6px; }
      .box-title { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #10233d; }
      .box-copy { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #5a748f; }
      .note-title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #10233d; }
      .note-copy { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #425d7b; }
      .mini-copy { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #6b839d; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1120"/>

  <text x="80" y="84" class="title">TradersApp architecture</text>
  <text x="80" y="118" class="subtitle">Read top to bottom: request path, support systems, then what is actually extracted today</text>

  <g filter="url(#shadow)">
    <rect x="80" y="150" width="1440" height="250" rx="26" fill="#fff7ea" stroke="#f1c27a" stroke-width="2"/>
    <rect x="80" y="450" width="456" height="430" rx="26" fill="#f6f2ff" stroke="#d4c7ff" stroke-width="2"/>
    <rect x="572" y="450" width="456" height="430" rx="26" fill="#eef9f0" stroke="#b8dfc1" stroke-width="2"/>
    <rect x="1064" y="450" width="456" height="430" rx="26" fill="#eef8fc" stroke="#b8dceb" stroke-width="2"/>
    <rect x="80" y="920" width="1440" height="160" rx="24" fill="#ffffff" stroke="#d9e2eb" stroke-width="2"/>
  </g>

  <g>
    <rect x="110" y="176" width="166" height="30" rx="15" fill="#ef8d28"/>
    <text x="135" y="196" class="tag">1. REQUEST PATH</text>
    <text x="110" y="244" class="section-title">Critical serving path</text>
    <text x="110" y="272" class="section-copy">This is the live user-facing path. Keep this under the 50ms SLA target.</text>
    <text x="110" y="296" class="mini-copy">Only one extracted runtime sits here today: analysis-service.</text>

    <rect x="145" y="320" width="250" height="90" rx="18" fill="#ffffff" stroke="#d9e2eb"/>
    <text x="175" y="370" class="box-title">Frontend</text>
    <text x="175" y="394" class="box-copy">React + Vite trading UI</text>

    <rect x="475" y="320" width="250" height="90" rx="18" fill="#ffffff" stroke="#d9e2eb"/>
    <text x="505" y="370" class="box-title">BFF</text>
    <text x="505" y="394" class="box-copy">Node.js edge, auth, orchestration</text>

    <rect x="805" y="320" width="250" height="90" rx="18" fill="#ffffff" stroke="#d9e2eb"/>
    <text x="835" y="370" class="box-title">analysis-service</text>
    <text x="835" y="394" class="box-copy">gRPC consensus service boundary</text>

    <rect x="1135" y="320" width="250" height="90" rx="18" fill="#ffffff" stroke="#d9e2eb"/>
    <text x="1165" y="370" class="box-title">ML Engine</text>
    <text x="1165" y="394" class="box-copy">inference, drift, feedback, training</text>

    <line x1="395" y1="365" x2="473" y2="365" stroke="#ef8d28" stroke-width="6" marker-end="url(#arrow-orange)"/>
    <line x1="725" y1="365" x2="803" y2="365" stroke="#ef8d28" stroke-width="6" marker-end="url(#arrow-orange)"/>
    <line x1="1055" y1="365" x2="1133" y2="365" stroke="#ef8d28" stroke-width="6" marker-end="url(#arrow-orange)"/>
  </g>

  <g>
    <rect x="110" y="476" width="196" height="30" rx="15" fill="#7b61d8"/>
    <text x="135" y="496" class="tag">2. DELIVERY + SECRETS</text>
    <text x="110" y="544" class="section-title">Delivery and secrets</text>
    <text x="110" y="572" class="section-copy">Build, configure, and deploy the platform.</text>

    <rect x="126" y="604" width="364" height="70" rx="18" fill="#ffffff" stroke="#d9e2eb"/>
    <text x="156" y="648" class="box-title">Gitea + Woodpecker</text>

    <rect x="126" y="694" width="364" height="70" rx="18" fill="#ffffff" stroke="#d9e2eb"/>
    <text x="156" y="738" class="box-title">Helm on k3s</text>

    <rect x="126" y="784" width="364" height="70" rx="18" fill="#ffffff" stroke="#d9e2eb"/>
    <text x="156" y="828" class="box-title">Infisical</text>
  </g>

  <g>
    <rect x="605" y="476" width="190" height="30" rx="15" fill="#2f9d62"/>
    <text x="630" y="496" class="tag">3. LEARNING + DATA</text>
    <text x="605" y="544" class="section-title">Learning and model lifecycle</text>
    <text x="605" y="572" class="section-copy">Supports retraining and model management.</text>
    <text x="605" y="594" class="mini-copy">These systems are not the live request path.</text>

    <rect x="610" y="620" width="185" height="104" rx="18" fill="#ffffff" stroke="#d9e2eb"/>
    <text x="638" y="668" class="box-title">Redis + Feast</text>
    <text x="638" y="692" class="box-copy">online features + cache</text>

    <rect x="820" y="620" width="185" height="104" rx="18" fill="#ffffff" stroke="#d9e2eb"/>
    <text x="848" y="668" class="box-title">Kafka</text>
    <text x="848" y="692" class="box-copy">events + feedback bus</text>

    <rect x="610" y="748" width="185" height="104" rx="18" fill="#ffffff" stroke="#d9e2eb"/>
    <text x="638" y="796" class="box-title">Airflow + GE</text>
    <text x="638" y="820" class="box-copy">DQ gates + retrain DAGs</text>

    <rect x="820" y="748" width="185" height="104" rx="18" fill="#ffffff" stroke="#d9e2eb"/>
    <text x="848" y="790" class="box-title">MLflow + MinIO</text>
    <text x="848" y="814" class="box-copy">registry + artifacts</text>
    <text x="848" y="836" class="box-copy">Postgres metadata</text>
  </g>

  <g>
    <rect x="1100" y="476" width="170" height="30" rx="15" fill="#167e91"/>
    <text x="1125" y="496" class="tag">4. OBSERVABILITY</text>
    <text x="1100" y="544" class="section-title">Observe the system</text>
    <text x="1100" y="572" class="section-copy">Metrics, logs, traces, dashboards, alerts.</text>

    <rect x="1105" y="620" width="185" height="104" rx="18" fill="#ffffff" stroke="#d9e2eb"/>
    <text x="1140" y="668" class="box-title">Prometheus</text>

    <rect x="1300" y="620" width="185" height="104" rx="18" fill="#ffffff" stroke="#d9e2eb"/>
    <text x="1370" y="668" class="box-title">Loki</text>

    <rect x="1105" y="748" width="185" height="104" rx="18" fill="#ffffff" stroke="#d9e2eb"/>
    <text x="1160" y="796" class="box-title">Grafana</text>

    <rect x="1300" y="748" width="185" height="104" rx="18" fill="#ffffff" stroke="#d9e2eb"/>
    <text x="1358" y="796" class="box-title">Jaeger</text>
  </g>

  <g>
    <text x="110" y="966" class="note-title">Current reality</text>
    <text x="110" y="1006" class="note-copy">1. analysis-service is the only extracted domain runtime on the live request path.</text>
    <text x="110" y="1038" class="note-copy">2. Ingestion and learning still run mostly inside the ML Engine and Airflow layer.</text>
    <text x="820" y="1006" class="note-copy">3. MLflow, observability, and CI/CD are already self-hosted and wired.</text>
    <text x="820" y="1038" class="note-copy">4. If needed next, split this into runtime architecture and MLOps architecture.</text>
  </g>
</svg>