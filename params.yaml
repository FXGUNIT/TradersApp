# TradersApp — DVC Parameters
# These values are used in dvc.yaml pipeline stages

data:
  csv_path: ml-engine/data/ninjatrader_export.csv
  db_path: ml-engine/data/trading_data.db
  symbol: MNQ

features:
  window_size: 14
  indicators:
    - sma_20
    - sma_50
    - ema_12
    - rsi_14
    - atr_14
    - volume_sma_20

regime:
  n_states: 3
  test_size: 0.2
  random_state: 42

direction:
  test_size: 0.2
  model_type: lightgbm
  random_state: 42

train:
  mode: incremental
  min_trades: 100
  random_state: 42

evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - sharpe_ratio
    - win_rate
