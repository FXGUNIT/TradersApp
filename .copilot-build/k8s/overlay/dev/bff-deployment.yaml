# k8s/bff-deployment.yaml — Node.js BFF on k3s
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: tradersapp
  labels:
    app: bff
    tier: api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8788"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bff
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bff
        tier: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8788"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: bff
          image: docker.io/tradersapp/bff:dev-latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8788
              name: http
          envFrom:
            - configMapRef:
                name: bff-config
          env:
            - name: ML_ENGINE_URL
              value: "http://ml-engine:8001"
            - name: REDIS_HOST
              value: ""
            - name: REDIS_URL
              value: "redis://localhost:9999"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tradersapp-secrets
                  key: JWT_SECRET
                  optional: true
            - name: BFF_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tradersapp-secrets
                  key: BFF_API_KEY
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /live
              port: 8788
            failureThreshold: 30
            periodSeconds: 10
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /live
              port: 8788
            failureThreshold: 3
            periodSeconds: 15
            initialDelaySeconds: 20
          readinessProbe:
            httpGet:
              path: /live
              port: 8788
            failureThreshold: 3
            periodSeconds: 10
            initialDelaySeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 3"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: bff
  namespace: tradersapp
  labels:
    app: bff
spec:
  type: ClusterIP
  selector:
    app: bff
  ports:
    - name: http
      port: 8788
      targetPort: 8788