{{- /*
k8s/helm/tradersapp/templates/prometheus-rules.yaml
Helm-rendered PrometheusRule resources for TradersApp observability.
Compatible with kube-prometheus-stack when `monitoringStack.enabled` or the legacy observability gate is enabled.
*/ -}}
{{- $observability := .Values.observability | default dict -}}
{{- $monitoringStack := .Values.monitoringStack | default dict -}}
{{- $prometheusRulesEnabled := or ($observability.prometheus | default false) ($observability.enabled | default false) ($monitoringStack.enabled | default false) -}}
{{- if $prometheusRulesEnabled }}
{{- if .Values.mlEngine.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "tradersapp.fullname" . }}-ml-engine-alerts
  namespace: {{ include "tradersapp.namespace" . }}
  labels:
    app.kubernetes.io/name: tradersapp
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: tradersapp
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    release: "prometheus"
spec:
  groups:
    - name: ml-engine-availability
      interval: 30s
      rules:
        - alert: MLEngineDown
          expr: sum(up{job=~"ml-engine($|-k8s$)"}) < 1
          for: 1m
          labels:
            severity: critical
            service: ml-engine
          annotations:
            summary: "ML Engine is down"
            description: "ML Engine has been unreachable for more than 1 minute."
        - alert: MLEngineHighErrorRate
          expr: sum(rate(ml_http_requests_total{status=~"5.."}[5m])) / clamp_min(sum(rate(ml_http_requests_total[5m])), 1) > 0.05
          for: 3m
          labels:
            severity: critical
            service: ml-engine
          annotations:
            summary: "ML Engine error rate > 5%"
            description: "ML Engine is returning 5%+ errors over the last 5 minutes."

    - name: ml-engine-latency
      interval: 30s
      rules:
        - alert: MLPredictCriticalPathBreach
          expr: histogram_quantile(0.95, sum(rate(ml_http_request_duration_seconds_bucket{endpoint="/predict"}[5m])) by (le)) > 0.050
          for: 10m
          labels:
            severity: warning
            service: ml-engine
            sla: "50ms"
          annotations:
            summary: "Predict endpoint p95 > 50ms"
            description: "ML Engine /predict has exceeded the 50ms p95 target."
        - alert: MLPredictionLatencyHigh
          expr: histogram_quantile(0.99, sum(rate(ml_prediction_latency_seconds_bucket[5m])) by (le)) > 0.2
          for: 5m
          labels:
            severity: warning
            service: ml-engine
          annotations:
            summary: "Prediction latency p99 > 200ms"
            description: "Model prediction latency has exceeded 200ms over the last 5 minutes."
        - alert: MLPredictionLatencyCritical
          expr: histogram_quantile(0.99, sum(rate(ml_prediction_latency_seconds_bucket[5m])) by (le)) > 0.5
          for: 2m
          labels:
            severity: critical
            service: ml-engine
          annotations:
            summary: "Prediction latency p99 > 500ms"
            description: "Model prediction latency has exceeded 500ms over the last 2 minutes."
        - alert: MLPredictionP50High
          expr: histogram_quantile(0.50, sum(rate(ml_prediction_latency_seconds_bucket[5m])) by (le)) > 0.050
          for: 10m
          labels:
            severity: warning
            service: ml-engine
          annotations:
            summary: "Prediction p50 > 50ms"
            description: "Prediction latency p50 has exceeded 50ms."

    - name: ml-engine-drift
      interval: 60s
      rules:
        - alert: MLFeatureDriftDetected
          expr: ml_feature_drift_psi > 0.2
          for: 10m
          labels:
            severity: warning
            service: ml-engine
          annotations:
            summary: "Feature drift detected (PSI > 0.2)"
            description: "Feature distribution has drifted enough to require review."
        - alert: MLConceptDriftDetected
          expr: ml_concept_drift_win_rate_drop_pct > 0.05
          for: 15m
          labels:
            severity: warning
            service: ml-engine
          annotations:
            summary: "Concept drift detected (accuracy drop > 5%)"
            description: "The rolling win-rate degradation exceeds the retrain threshold."
        - alert: MLOverallDriftAlert
          expr: ml_drift_status{detector="overall"} >= 2
          for: 10m
          labels:
            severity: critical
            service: ml-engine
          annotations:
            summary: "Overall drift monitor is in alert/critical state"
            description: "The unified drift monitor recommends retraining based on production data."
        - alert: MLAutoRetrainRecommended
          expr: ml_drift_should_retrain == 1
          for: 15m
          labels:
            severity: warning
            service: ml-engine
          annotations:
            summary: "Automatic retraining is recommended"
            description: "The monitoring snapshot indicates drift thresholds have been breached."
        - alert: MLMonitoringStale
          expr: time() - ml_monitoring_last_check_timestamp > 900
          for: 10m
          labels:
            severity: critical
            service: ml-engine
          annotations:
            summary: "Model monitoring snapshot is stale"
            description: "The monitoring DAG or endpoint has not refreshed model health metrics in the last 15 minutes."
        - alert: MLDriftAlertStorm
          expr: increase(ml_concept_drift_detected_total[15m]) + increase(ml_feature_drift_detected_total[15m]) + increase(ml_regime_drift_detected_total[15m]) > 5
          for: 5m
          labels:
            severity: critical
            service: ml-engine
          annotations:
            summary: "Drift alert storm - 5+ alerts in 15 minutes"
            description: "Multiple drift alerts were recorded in a short window. This often points to regime change or data corruption."

    - name: ml-engine-training
      interval: 60s
      rules:
        - alert: MLRetrainingTriggered
          expr: increase(ml_retrain_triggered_total[30m]) > 0
          for: 1m
          labels:
            severity: info
            service: ml-engine
          annotations:
            summary: "ML model retraining triggered"
            description: "An automatic retraining workflow has started."
        - alert: MLRetrainingStuck
          expr: ml_retrain_in_progress == 1
          for: 30m
          labels:
            severity: warning
            service: ml-engine
          annotations:
            summary: "ML retraining is taking too long (>30min)"
            description: "A retrain run has been in progress for longer than 30 minutes."
        - alert: MLRetrainingFailedRecently
          expr: ml_retrain_last_failure_timestamp > 0 and (time() - ml_retrain_last_failure_timestamp) < 3600
          for: 5m
          labels:
            severity: critical
            service: ml-engine
          annotations:
            summary: "Recent retraining failure detected"
            description: "The most recent retrain attempt failed within the last hour."
        - alert: MLRetrainNotTriggeredAfterDrift
          expr: ml_drift_should_retrain == 1 and increase(ml_retrain_triggered_total[1h]) == 0
          for: 30m
          labels:
            severity: warning
            service: ml-engine
          annotations:
            summary: "Drift recommends retraining but no retrain has started"
            description: "Monitoring recommends retraining, but no retrain trigger has been observed in the last hour."

    - name: ml-engine-cache
      interval: 60s
      rules:
        - alert: MLCacheHitRatioLow
          expr: ml_cache_hits_total / clamp_min(ml_cache_hits_total + ml_cache_misses_total, 1) < 0.3
          for: 15m
          labels:
            severity: warning
            service: ml-engine
          annotations:
            summary: "Cache hit ratio < 30%"
            description: "Cache efficiency is too low and may be impacting inference latency."

    - name: ml-engine-circuit-breaker
      interval: 30s
      rules:
        - alert: MLCircuitBreakerOpen
          expr: ml_circuit_breaker_state == 2
          for: 1m
          labels:
            severity: critical
            service: ml-engine
          annotations:
            summary: "Circuit breaker OPEN - ML Engine rejecting requests"
            description: "The circuit breaker is open due to repeated downstream failures."
        - alert: MLCircuitBreakerHalfOpen
          expr: ml_circuit_breaker_state == 1
          for: 2m
          labels:
            severity: warning
            service: ml-engine
          annotations:
            summary: "Circuit breaker HALF-OPEN - testing recovery"
            description: "The circuit breaker is probing whether the service has recovered."

    - name: ml-engine-resilience
      interval: 30s
      rules:
        - alert: DataQualityCriticalFailures
          expr: max_over_time(ml_dq_critical_failures[5m]) > 0
          for: 2m
          labels:
            severity: critical
            service: ml-engine
          annotations:
            summary: "Data quality critical failures detected"
            description: "Great Expectations has detected critical data quality failures - pipeline may be blocked."
{{- end }}

{{- if .Values.bff.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "tradersapp.fullname" . }}-bff-alerts
  namespace: {{ include "tradersapp.namespace" . }}
  labels:
    app.kubernetes.io/name: tradersapp
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: tradersapp
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    release: "prometheus"
spec:
  groups:
    - name: bff-availability
      interval: 30s
      rules:
        - alert: BFFDown
          expr: sum(up{job=~"bff($|-k8s$)"}) < 1
          for: 1m
          labels:
            severity: critical
            service: bff
          annotations:
            summary: "BFF is down"
            description: "BFF has been unreachable for more than 1 minute."
        - alert: BFFHighLatency
          expr: histogram_quantile(0.99, sum(rate(bff_http_request_duration_seconds_bucket[5m])) by (le)) > 2
          for: 5m
          labels:
            severity: warning
            service: bff
          annotations:
            summary: "BFF p99 latency > 2 seconds"
            description: "BFF is experiencing high latency - possible backend congestion."

{{- if .Values.mlEngine.enabled }}
    - name: bff-ml-engine-dependency
      interval: 30s
      rules:
        - alert: BFFCannotReachMLEngine
          expr: sum(rate(bff_ml_engine_errors_total[5m])) > 0
          for: 2m
          labels:
            severity: warning
            service: bff
          annotations:
            summary: "BFF cannot reach ML Engine"
            description: "The BFF is observing outbound failures while calling the ML Engine."
        - alert: MLSLACriticalPathBreach
          expr: histogram_quantile(0.95, sum(rate(bff_http_request_duration_seconds_bucket{route="/api/consensus"}[5m])) by (le)) > 0.050
          for: 5m
          labels:
            severity: critical
            service: bff
            sla: "50ms"
          annotations:
            summary: "Consensus SLA breach - /api/consensus p95 > 50ms"
            description: "The BFF consensus critical path has exceeded the 50ms target for 5 minutes."
        - alert: BFFToMLEngineLatencyHigh
          expr: histogram_quantile(0.95, sum(rate(bff_ml_engine_latency_seconds_bucket{endpoint="/predict"}[5m])) by (le)) > 0.25
          for: 5m
          labels:
            severity: warning
            service: bff
          annotations:
            summary: "BFF -> ML Engine latency p95 > 250ms"
            description: "The BFF is observing elevated ML Engine round-trip latency on /predict."
    {{- end }}
{{- end }}

{{- if .Values.kafka.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "tradersapp.fullname" . }}-kafka-alerts
  namespace: {{ include "tradersapp.namespace" . }}
  labels:
    app.kubernetes.io/name: tradersapp
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: tradersapp
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    release: "prometheus"
spec:
  groups:
    - name: kafka-availability
      interval: 30s
      rules:
        - alert: KafkaDown
          expr: kafka_consumer_group_lag > 10000
          for: 5m
          labels:
            severity: critical
            service: kafka
          annotations:
            summary: "Kafka consumer lag > 10,000 messages"
            description: "Kafka consumer is falling behind - possible broker issue or consumer failure."
        - alert: KafkaProducerErrorRate
          expr: rate(kafka_producer_errors_total[5m]) > 0.01
          for: 3m
          labels:
            severity: warning
            service: kafka
          annotations:
            summary: "Kafka producer error rate elevated"
            description: "Kafka producer is experiencing elevated error rates."
        - alert: KafkaConsumerLagHigh
          expr: ml_kafka_consumer_lag > 500
          for: 5m
          labels:
            severity: warning
            service: kafka
          annotations:
            summary: "ML Engine Kafka consumer lag > 500"
            description: "ML Engine consumer for {{ "{{ $labels.topic }}" }} partition {{ "{{ $labels.partition }}" }} is lagging behind. Consumer group may be stuck."
        - alert: KafkaPublishFailure
          expr: rate(ml_kafka_publish_errors_total[5m]) > 0
          for: 2m
          labels:
            severity: warning
            service: kafka
          annotations:
            summary: "Kafka message publish failures detected"
            description: "ML Engine failed to publish messages to Kafka topic {{ "{{ $labels.topic }}" }}. Events may be lost."
        - alert: KafkaConsumerProcessingStalled
          expr: increase(ml_kafka_consumer_messages_processed_total[10m]) == 0
          for: 10m
          labels:
            severity: warning
            service: kafka
          annotations:
            summary: "ML Engine Kafka consumer stalled"
            description: "No messages processed in the last 10 minutes on topic {{ "{{ $labels.topic }}" }}. Consumer may be stuck."

    - name: kafka-event-volume
      interval: 60s
      rules:
        - alert: KafkaConsensusSignalsLow
          expr: increase(ml_kafka_messages_published_total{topic="consensus-signals"}[30m]) < 1
          for: 30m
          labels:
            severity: info
            service: kafka
          annotations:
            summary: "No consensus signals published in 30 minutes"
            description: "ML Engine hasn't published any consensus signals to Kafka. Either the service is idle or the producer is stuck."
        - alert: KafkaCandleDataLow
          expr: increase(ml_kafka_messages_published_total{topic="candle-data"}[15m]) < 1
          for: 15m
          labels:
            severity: warning
            service: kafka
          annotations:
            summary: "No candle data published in 15 minutes"
            description: "No candle data events in the last 15 minutes. Data ingestion pipeline may be stalled."

    - name: kafka-dlq
      interval: 60s
      rules:
        - alert: KafkaDLQMessageRate
          expr: rate(ml_kafka_messages_published_total{topic="dead-letter-queue"}[5m]) > 0
          for: 2m
          labels:
            severity: warning
            service: kafka
          annotations:
            summary: "Messages forwarded to Kafka DLQ"
            description: "ML Engine is forwarding messages to the dead-letter-queue. Handler is failing after {{ "{{ .topic }}" }} retries."
{{- end }}

{{- if .Values.redis.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "tradersapp.fullname" . }}-redis-alerts
  namespace: {{ include "tradersapp.namespace" . }}
  labels:
    app.kubernetes.io/name: tradersapp
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: tradersapp
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    release: "prometheus"
spec:
  groups:
    - name: redis-availability
      interval: 30s
      rules:
        - alert: RedisDown
          expr: redis_connected_clients == 0
          for: 1m
          labels:
            severity: warning
            service: redis
          annotations:
            summary: "Redis has no connected clients"
            description: "Redis may be down or unreachable - ML Engine will use in-memory fallback."
        - alert: RedisMemoryHigh
          expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
          for: 5m
          labels:
            severity: warning
            service: redis
          annotations:
            summary: "Redis memory usage > 90%"
            description: "Redis is approaching its memory limit."
{{- end }}

{{- if .Values.mlflow.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "tradersapp.fullname" . }}-mlflow-alerts
  namespace: {{ include "tradersapp.namespace" . }}
  labels:
    app.kubernetes.io/name: tradersapp
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: tradersapp
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    release: "prometheus"
spec:
  groups:
    - name: mlflow-mlops
      interval: 60s
      rules:
        - alert: MLflowDown
          expr: sum(up{job=~"mlflow($|-k8s$)"}) < 1
          for: 2m
          labels:
            severity: critical
            service: mlflow
          annotations:
            summary: "MLflow tracking server is down"
            description: "MLflow has been unreachable for 2+ minutes. Experiment tracking and model registry unavailable."
        - alert: MLflowActiveRunsBacklog
          expr: ml_active_runs > 10
          for: 15m
          labels:
            severity: warning
            service: mlflow
          annotations:
            summary: "MLflow active run backlog is high"
            description: "More than 10 MLflow runs are active. Tracking storage may be congested or jobs may be stuck."
        - alert: MLflowNoProductionModel
          expr: sum(ml_models_registered{stage="Production"}) == 0
          for: 1h
          labels:
            severity: warning
            service: mlflow
          annotations:
            summary: "No models in MLflow Production stage"
            description: "No model has been promoted to Production for over an hour. Verify the retrain pipeline is running and models are being validated."
        - alert: MLflowStaleProductionModel
          expr: max(ml_model_stage_age_seconds{stage="Production"}) > 604800
          for: 10m
          labels:
            severity: warning
            service: mlflow
          annotations:
            summary: "Production model may be stale"
            description: "The newest production model is older than 7 days. Review drift state and retrain cadence."
        - alert: MLflowExperimentsOverflow
          expr: ml_mlflow_experiments > 50
          for: 5m
          labels:
            severity: info
            service: mlflow
          annotations:
            summary: "MLflow has >50 experiments"
            description: "Consider archiving old experiments to keep MLflow clean. Use: mlflow gc or cleanup experiments."
        - alert: MLflowPostgresDown
          expr: sum(up{job=~"mlflow-postgres($|-k8s$)"}) < 1
          for: 1m
          labels:
            severity: critical
            service: mlflow
          annotations:
            summary: "MLflow PostgreSQL backend is down"
            description: "MLflow cannot store experiment metadata. All new runs will fail."
        - alert: MinIODown
          expr: sum(up{job=~"minio($|-k8s$)"}) < 1
          for: 2m
          labels:
            severity: warning
            service: mlflow
          annotations:
            summary: "MinIO artifact store is down"
            description: "MinIO S3 store is unreachable. Model artifacts cannot be saved or retrieved."
{{- end }}

{{- if .Values.triton.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "tradersapp.fullname" . }}-triton-alerts
  namespace: {{ include "tradersapp.namespace" . }}
  labels:
    app.kubernetes.io/name: tradersapp
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: tradersapp
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    release: "prometheus"
spec:
  groups:
    - name: triton-inference
      interval: 30s
      rules:
        - alert: TritonDown
          expr: ml_triton_server_up == 0
          for: 1m
          labels:
            severity: critical
            service: triton
          annotations:
            summary: "Triton Inference Server is down"
            description: "Triton server has been unreachable for 1+ minutes. ML Engine will fall back to ONNX Runtime local inference."
        - alert: TritonHighLatency
          expr: histogram_quantile(0.99, sum(rate(ml_inference_triton_roundtrip_seconds_bucket[5m])) by (le)) > 0.1
          for: 5m
          labels:
            severity: warning
            service: triton
          annotations:
            summary: "Triton inference p99 latency > 100ms"
            description: "Triton gRPC round-trip is exceeding 100ms. Check GPU utilization and model batch sizes."
        - alert: TritonLowBatchUtilization
          expr: avg(ml_inference_batch_size_sum / ml_inference_batch_size_count) < 4
          for: 15m
          labels:
            severity: info
            service: triton
          annotations:
            summary: "Triton batch utilization is low"
            description: "Average batch size is below 4. Consider reducing max_wait_ms in the batching layer or disabling batching for latency-sensitive paths."
        - alert: GPUUnderutilized
          expr: ml_gpu_utilization_percent < 20
          for: 15m
          labels:
            severity: warning
            service: triton
          annotations:
            summary: "GPU utilization < 20%"
            description: "GPU is underutilized. Check if Triton is correctly batching requests or if GPU instances are undersubscribed."
        - alert: GPUMemoryHigh
          expr: ml_gpu_memory_used_bytes / ml_gpu_memory_total_bytes > 0.9
          for: 5m
          labels:
            severity: warning
            service: triton
          annotations:
            summary: "GPU memory usage > 90%"
            description: "GPU is running low on memory. Reduce batch sizes or model count per GPU."
        - alert: InferenceErrorRate
          expr: sum(rate(ml_inference_errors_total[5m])) > 0.01
          for: 3m
          labels:
            severity: critical
            service: ml-engine
          annotations:
            summary: "Inference error rate > 1%"
            description: "More than 1% of inference requests are failing. Check Triton logs and model availability."
{{- end }}

{{- if or .Values.mlEngine.enabled .Values.bff.enabled .Values.kafka.enabled .Values.redis.enabled .Values.mlflow.enabled .Values.triton.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "tradersapp.fullname" . }}-observability-health
  namespace: {{ include "tradersapp.namespace" . }}
  labels:
    app.kubernetes.io/name: tradersapp
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: tradersapp
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    release: "prometheus"
spec:
  groups:
    - name: observability-health
      interval: 60s
      rules:
        - alert: PrometheusTargetDown
          expr: up{job!="prometheus"} == 0
          for: 2m
          labels:
            severity: critical
            service: observability
          annotations:
            summary: "Prometheus scrape target is down"
            description: "A target Prometheus should be scraping is unreachable."
        - alert: GrafanaDown
          expr: up{job="grafana"} == 0
          for: 2m
          labels:
            severity: warning
            service: observability
          annotations:
            summary: "Grafana is down"
            description: "Grafana is unreachable - dashboards unavailable."

    - name: autoscaling-health
      interval: 60s
      rules:
        - alert: HPANearMaxReplicas
          expr: kube_horizontalpodautoscaler_status_current_replicas{namespace=~"tradersapp.*"} / clamp_min(kube_horizontalpodautoscaler_spec_max_replicas{namespace=~"tradersapp.*"}, 1) > 0.9
          for: 10m
          labels:
            severity: warning
            service: kubernetes
          annotations:
            summary: "HPA {{ "{{ $labels.horizontalpodautoscaler }}" }} is near max replicas"
            description: "The HPA {{ "{{ $labels.horizontalpodautoscaler }}" }} in namespace {{ "{{ $labels.namespace }}" }} has been above 90% of its max replicas for 10 minutes. Capacity may be exhausted soon."
        - alert: HPAReplicaFlapping
          expr: changes(kube_horizontalpodautoscaler_status_current_replicas{namespace=~"tradersapp.*"}[15m]) > 6
          for: 5m
          labels:
            severity: warning
            service: kubernetes
          annotations:
            summary: "HPA {{ "{{ $labels.horizontalpodautoscaler }}" }} is scaling frequently"
            description: "The HPA {{ "{{ $labels.horizontalpodautoscaler }}" }} changed replica count more than 6 times in 15 minutes. Investigate load spikes, noisy metrics, or unstable thresholds."

    - name: pod-health
      interval: 60s
      rules:
        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total{namespace=~"tradersapp.*"}[15m]) > 3
          for: 5m
          labels:
            severity: critical
            service: kubernetes
          annotations:
            summary: "Pod {{ "{{ $labels.pod }}" }} is crash-looping"
            description: "Container {{ "{{ $labels.container }}" }} in pod {{ "{{ $labels.pod }}" }} has restarted more than 3 times in 15 minutes."
        - alert: PodNotReady
          expr: kube_pod_status_ready{condition="true", namespace=~"tradersapp.*"} == 0
          for: 5m
          labels:
            severity: warning
            service: kubernetes
          annotations:
            summary: "Pod {{ "{{ $labels.pod }}" }} is not ready"
            description: "Pod {{ "{{ $labels.pod }}" }} in namespace {{ "{{ $labels.namespace }}" }} has been in not-ready state for 5+ minutes."
{{- end }}
{{- end }}
