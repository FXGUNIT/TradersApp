{{- /*
Feast Feature Store — Kubernetes CronJobs for feature materialization.

Architecture:
  - Online store: Redis (shared with cache)
  - Source of truth: trading database via DATABASE_URL from Infisical
  - Offline store: database → Parquet export → Redis materialization

The ML Engine uses Feast SDK directly to retrieve features from Redis
(get_online_features). No dedicated Feast server needed.

CronJob schedule: daily at 05:00 UTC (before trading day begins).
*/ -}}
{{- $namespace := include "tradersapp.namespace" . }}
{{- $feast := .Values.feast -}}

{{- if $feast.enabled }}
---
# PVC for Parquet feature files (offline store)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "tradersapp.fullname" . }}-feast-features
  namespace: {{ $namespace }}
  labels:
    app: feast
    tier: features
    {{- include "tradersapp.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ $feast.featureStorage.size | default "2Gi" }}
  {{- if $feast.featureStorage.storageClass }}
  storageClassName: {{ $feast.featureStorage.storageClass }}
  {{- end }}
{{- end }}

{{- if and $feast.enabled $feast.materialization.enabled }}
---
# CronJob: nightly feature materialization (database → Parquet → Redis)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "tradersapp.fullname" . }}-feast-materialize
  namespace: {{ $namespace }}
  labels:
    app: feast
    tier: features
    {{- include "tradersapp.labels" . | nindent 4 }}
  annotations:
    # Prevent overlapping runs
    cronjob.kubernetes.io/inhibit-hook: "true"
spec:
  schedule: {{ $feast.materialization.schedule | default "0 5 * * *" | quote }}
  concurrencyPolicy: {{ $feast.materialization.concurrencyPolicy | default "Forbid" }}
  successfulJobsHistoryLimit: {{ $feast.materialization.successfulJobsHistoryLimit | default 3 }}
  failedJobsHistoryLimit: {{ $feast.materialization.failedJobsHistoryLimit | default 3 }}
  startingDeadlineSeconds: {{ $feast.materialization.startingDeadlineSeconds | default 300 }}
  jobTemplate:
    spec:
      backoffLimit: {{ $feast.materialization.backoffLimit | default 2 }}
      ttlSecondsAfterFinished: 3600  # Clean up after 1 hour
      template:
        metadata:
          labels:
            app: feast
            tier: features
            job: materialize
          annotations:
            prometheus.io/scrape: "false"
        spec:
          restartPolicy: OnFailure
          {{- include "tradersapp.imagePullSecrets" . | nindent 8 }}
          {{- include "tradersapp.tolerations" . | nindent 8 }}
          {{- include "tradersapp.nodeSelector" . | nindent 8 }}
          initContainers:
            # Step 1: Export database → Parquet (offline feature computation)
            - name: export-parquet
              image: "{{ .Values.mlEngine.image.repository }}:{{ .Values.mlEngine.image.tag }}"
              imagePullPolicy: {{ include "tradersapp.imagePullPolicy" .Values.mlEngine.image }}
              command: ["python", "-m", "ml_engine.features.export_features_parquet"]
              envFrom:
                - secretRef:
                    name: ml-engine-secrets
                {{- if and $feast.secretRef.existingSecret (ne $feast.secretRef.existingSecret "ml-engine-secrets") }}
                - secretRef:
                    name: {{ $feast.secretRef.existingSecret }}
                {{- end }}
              env:
                - name: REQUIRE_DATABASE_URL
                  value: "true"
                - name: FEAST_SYMBOL
                  value: {{ $feast.symbol | default "MNQ" }}
                - name: PYTHONPATH
                  value: /app
              volumeMounts:
                - name: feast-features
                  mountPath: /app/ml_engine/data/feast_features
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              {{- if $feast.materialization.initContainerSecurityContext | default true }}
              securityContext:
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              {{- end }}
          containers:
            # Step 2: Materialize to Redis (feast materialize)
            - name: materialize
              image: "{{ .Values.mlEngine.image.repository }}:{{ .Values.mlEngine.image.tag }}"
              imagePullPolicy: {{ include "tradersapp.imagePullPolicy" .Values.mlEngine.image }}
              command: ["python", "-c"]
              args:
                - |
                  import sys
                  sys.path.insert(0, '/app')
                  from ml_engine.features.feast_repo import *
                  from ml_engine.features.feast_client import get_feature_info
                  import feast

                  repo_path = "/app/ml_engine/features/feast_repo"
                  print(f"[Feast] Initializing feature store at {repo_path}")
                  fs = feast.FeatureStore(repo_path=repo_path)

                  # Apply registry changes (register new feature views)
                  print("[Feast] Applying registry...")
                  fs.apply()

                  # Full materialization: latest timestamp to now
                  print("[Feast] Materializing candle_features...")
                  fs.materialize_incremental(
                      end_date=feast.EntityTimestamp("now"),
                      feature_views=["candle_features"],
                  )

                  print("[Feast] Materializing historical_features...")
                  fs.materialize_incremental(
                      end_date=feast.EntityTimestamp("now"),
                      feature_views=["historical_features"],
                  )

                  print("[Feast] Materializing session_features...")
                  fs.materialize_incremental(
                      end_date=feast.EntityTimestamp("now"),
                      feature_views=["session_features"],
                  )

                  print("[Feast] Materialization complete!")
                  info = get_feature_info()
                  print(f"[Feast] Features: {len(info['candle_features'])} candle, {len(info['historical_features'])} historical, {len(info['session_features'])} session")
              env:
                - name: FEAST_REDIS_URL
                  value: {{ $feast.redis.url | default "redis://redis:6379" }}
                - name: REQUIRE_DATABASE_URL
                  value: "true"
                - name: PYTHONPATH
                  value: /app
              envFrom:
                - secretRef:
                    name: ml-engine-secrets
                {{- if and $feast.secretRef.existingSecret (ne $feast.secretRef.existingSecret "ml-engine-secrets") }}
                - secretRef:
                    name: {{ $feast.secretRef.existingSecret }}
                {{- end }}
              volumeMounts:
                - name: feast-features
                  mountPath: /app/ml_engine/data/feast_features
                {{- if $feast.volumeMounts }}
                {{- toYaml $feast.volumeMounts | nindent 16 }}
                {{- end }}
              resources:
                requests:
                  cpu: {{ $feast.materialization.resources.requests.cpu | default "250m" }}
                  memory: {{ $feast.materialization.resources.requests.memory | default "512Mi" }}
                limits:
                  cpu: {{ $feast.materialization.resources.limits.cpu | default "1000m" }}
                  memory: {{ $feast.materialization.resources.limits.memory | default "1Gi" }}
              {{- if $feast.materialization.containerSecurityContext | default true }}
              securityContext:
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              {{- end }}
              {{- with $feast.materialization.startupProbe }}
              startupProbe:
                {{- toYaml . | nindent 16 }}
              {{- end }}
          volumes:
            - name: feast-features
              persistentVolumeClaim:
                claimName: {{ include "tradersapp.fullname" . }}-feast-features
{{- end }}

{{- if and $feast.enabled $feast.streaming.enabled }}
---
# CronJob: incremental feature refresh (database → Redis, every 5 min)
# Keeps the Feast online store warm between nightly full materializations.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "tradersapp.fullname" . }}-feast-stream-materialize
  namespace: {{ $namespace }}
  labels:
    app: feast
    tier: features
    component: stream
    {{- include "tradersapp.labels" . | nindent 4 }}
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: {{ $feast.streaming.concurrencyPolicy | default "Replace" }}
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 60
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 300
      template:
        metadata:
          labels:
            app: feast
            tier: features
            component: stream
        spec:
          restartPolicy: OnFailure
          {{- include "tradersapp.imagePullSecrets" . | nindent 8 }}
          containers:
            - name: stream-materialize
              image: "{{ .Values.mlEngine.image.repository }}:{{ .Values.mlEngine.image.tag }}"
              imagePullPolicy: {{ include "tradersapp.imagePullPolicy" .Values.mlEngine.image }}
              command: ["python", "-c"]
              args:
                - |
                  import sys, os
                  sys.path.insert(0, '/app')

                  # Read the latest candle window from the primary database and
                  # refresh the Redis-backed Feast features for the newest bar.
                  try:
                      from ml_engine.features.feast_repo import candle_features
                      from ml_engine.data.candle_db import CandleDatabase
                      from ml_engine.features.feast_client import get_candle_features
                      import pandas as pd

                      db = CandleDatabase(
                          db_path=os.environ.get("FEAST_DB_PATH", "/app/ml_engine/data/trading_data.db"),
                          database_url=os.environ.get("DATABASE_URL") or None,
                      )
                      candles = db.get_candles(
                          start=pd.Timestamp.now(tz="UTC").floor("5min").isoformat(),
                          end=pd.Timestamp.now(tz="UTC").ceil("5min").isoformat(),
                          symbol=os.environ.get("FEAST_SYMBOL", "MNQ"),
                          limit=5,
                      )

                      if not candles.empty:
                          latest = candles.iloc[-1]
                          ts = pd.Timestamp(latest["timestamp"])
                          features = get_candle_features(
                              symbol=os.environ.get("FEAST_SYMBOL", "MNQ"),
                              timestamp=ts.isoformat(),
                          )
                          print(f"[Feast Stream] Materialized candle features at {ts}: {len(features)} features")
                      else:
                          print("[Feast Stream] No new candles to materialize")
                  except Exception as e:
                      print(f"[Feast Stream] Warning: {e}")
              envFrom:
                - secretRef:
                    name: ml-engine-secrets
                {{- if and $feast.secretRef.existingSecret (ne $feast.secretRef.existingSecret "ml-engine-secrets") }}
                - secretRef:
                    name: {{ $feast.secretRef.existingSecret }}
                {{- end }}
              env:
                - name: FEAST_REDIS_URL
                  value: {{ $feast.redis.url | default "redis://redis:6379" }}
                - name: REQUIRE_DATABASE_URL
                  value: "true"
                - name: FEAST_SYMBOL
                  value: {{ $feast.symbol | default "MNQ" }}
                - name: PYTHONPATH
                  value: /app
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
{{- end }}

{{- if $feast.enabled }}
---
# ConfigMap: Feast feature store configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tradersapp.fullname" . }}-feast-config
  namespace: {{ $namespace }}
  labels:
    app: feast
    tier: features
    {{- include "tradersapp.labels" . | nindent 4 }}
data:
  feature_store.yaml: |
    project: tradersapp
    registry: .registry
    provider: custom
    custom_provider: ml_engine.features.feast_repo.custom_provider:TradersProvider
    offline_store:
      type: sqlite
      path: ${FEAST_DB_PATH:/app/ml_engine/data/trading_data.db}
    online_store:
      type: redis
      connection_string: ${FEAST_REDIS_URL:redis://redis:6379}
      ttl: {{ $feast.onlineTtlSeconds | default 86400 }}
    entity_key_serialization_version: 2
{{- end }}
