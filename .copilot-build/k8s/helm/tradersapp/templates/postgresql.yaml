{{- /* Dedicated PostgreSQL runtime DB for ml-engine (Stage B / C cutover) */ -}}
{{- if .Values.postgresql.enabled -}}
{{- $ns := include "tradersapp.namespace" . -}}
{{- $secretName := .Values.postgresql.existingSecret | default "tradersapp-secrets" -}}
{{- $passwordKey := .Values.postgresql.passwordKey | default "POSTGRES_PASSWORD" -}}

{{- if .Values.postgresql.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tradersapp-postgres-pvc
  namespace: {{ $ns }}
  labels:
    {{- include "tradersapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  accessModes:
    {{- toYaml .Values.postgresql.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.postgresql.persistence.size | quote }}
  {{- with .Values.postgresql.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tradersapp-postgres
  namespace: {{ $ns }}
  labels:
    {{- include "tradersapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tradersapp-postgres
  template:
    metadata:
      labels:
        app: tradersapp-postgres
        app.kubernetes.io/component: postgresql
        {{- include "tradersapp.labels" . | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ include "tradersapp.imagePullPolicy" .Values.postgresql.image }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName | quote }}
                  key: {{ $passwordKey | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          {{- with .Values.postgresql.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          startupProbe:
            exec:
              command: ["/bin/sh", "-ec", "pg_isready -h 127.0.0.1 -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["/bin/sh", "-ec", "pg_isready -h 127.0.0.1 -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["/bin/sh", "-ec", "pg_isready -h 127.0.0.1 -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: postgres-data
          {{- if .Values.postgresql.persistence.enabled }}
          persistentVolumeClaim:
            claimName: tradersapp-postgres-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: tradersapp-postgres
  namespace: {{ $ns }}
  labels:
    {{- include "tradersapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: {{ .Values.postgresql.service.type | default "ClusterIP" }}
  selector:
    app: tradersapp-postgres
  ports:
    - name: postgres
      port: {{ .Values.postgresql.service.port | default 5432 }}
      targetPort: 5432
{{- end }}
