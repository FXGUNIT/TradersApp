{{- /*
Helm-rendered PodMonitor resources for kube-prometheus-stack.
Enable via `monitoringStack.enabled=true` or the legacy observability gate.
These mirror the base PodMonitor intent for frontend, bff, and ml-engine.
*/ -}}

{{- $observability := .Values.observability | default dict -}}
{{- $frontend := .Values.frontend | default dict -}}
{{- $bff := .Values.bff | default dict -}}
{{- $mlEngine := .Values.mlEngine | default dict -}}
{{- $monitoringStack := .Values.monitoringStack | default dict -}}
{{- $monitoringEnabled := or ($observability.prometheus | default false) ($observability.enabled | default false) ($monitoringStack.enabled | default false) -}}
{{- $namespace := include "tradersapp.namespace" . -}}

{{- if and $monitoringEnabled ($frontend.enabled | default false) }}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: frontend-monitor
  namespace: {{ $namespace }}
  labels:
    {{- include "tradersapp.labels" . | nindent 4 }}
    app: frontend
spec:
  selector:
    matchLabels:
      app: frontend
  podMetricsEndpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod_name
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: pod_namespace
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node_name
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_pod_label_app]
          targetLabel: app
{{- end }}

