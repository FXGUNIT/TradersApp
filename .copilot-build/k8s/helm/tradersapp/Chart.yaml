# k8s/helm/tradersapp/Chart.yaml
apiVersion: v2
name: tradersapp
description: TradersApp — Algorithmic Trading ML Platform
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - algorithmic-trading
  - ml
  - ensemble
  - futures
maintainers:
  - name: FXGUNIT
    email: support@tradersapp.io
sources:
  - https://github.com/FXGUNIT/TradersApp
icon: https://tradersapp.io/icon.png
dependencies:
  - name: kube-prometheus-stack
    alias: monitoringStack
    version: 80.13.3
    repository: https://prometheus-community.github.io/helm-charts
    condition: monitoringStack.enabled
