# ─────────────────────────────────────────────────────────────────────────────
# TradersApp — Triton Inference Server Kubernetes Deployment (CPU)
#
# For clusters without GPU nodes. Use instead of triton-deployment.yaml.
# Auto-scales horizontally based on CPU load.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton-cpu
  namespace: tradersapp
  labels:
    app: triton
    accelerator: cpu
    role: inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: triton
      accelerator: cpu
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: triton
        accelerator: cpu
        role: inference
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: triton
          image: nvcr.io/nvidia/tritonserver:25.02-py3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: grpc
              containerPort: 8001
              protocol: TCP
            - name: metrics
              containerPort: 8002
              protocol: TCP
          env:
            - name: TRITON_MODEL_REPO
              value: "/models"
            - name: USE_TRITON
              value: "true"
          command:
            - tritonserver
            - "--model-repository=/models"
            - "--http-port=8000"
            - "--grpc-port=8001"
            - "--metrics-port=8002"
            - "--allow-http=true"
            - "--allow-grpc=true"
            - "--allow-metrics=true"
            - "--log-verbose=0"
            - "--model-control-mode=explicit"
            - "--repository-poll-secs=60"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              cpu: "4"
          livenessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: model-repo
              mountPath: /models
      volumes:
        - name: model-repo
          emptyDir: {}
