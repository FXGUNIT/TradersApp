# ─────────────────────────────────────────────────────────────────────────────
# TradersApp — Triton Inference Server Kubernetes Services
# ─────────────────────────────────────────────────────────────────────────────

# ClusterIP service — internal access from ML Engine
apiVersion: v1
kind: Service
metadata:
  name: triton-grpc
  namespace: tradersapp
  labels:
    app: triton
    role: inference
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 8001
      targetPort: 8001
      protocol: TCP
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
    - name: metrics
      port: 8002
      targetPort: 8002
      protocol: TCP
  selector:
    app: triton

---
# NodePort service — for debugging from outside the cluster
apiVersion: v1
kind: Service
metadata:
  name: triton-nodeport
  namespace: tradersapp
  labels:
    app: triton
    role: inference
spec:
  type: NodePort
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30080
      protocol: TCP
    - name: grpc
      port: 8001
      targetPort: 8001
      nodePort: 30081
      protocol: TCP
  selector:
    app: triton
