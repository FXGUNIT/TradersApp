# k8s/base/storage.yaml — PersistentVolumeClaims for TradersApp
#
# ML model store needs persistent storage (survives pod restarts).
# Runtime state PVC backs /data for DQ quarantine + continual-learning artifacts.
# Base k3s/local-path remains single-node ReadWriteOnce. Production shared-storage
# overrides belong in overlay/prod or Helm values.prod.yaml.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-models-pvc
  labels:
    app: ml-engine
    type: models
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-state-pvc
  labels:
    app: ml-engine
    type: state
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-path
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-artifacts-pvc
  namespace: tradersapp
  labels:
    app: mlflow
    type: artifacts
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: local-path
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: tradersapp
  labels:
    app: redis
    type: cache
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
