<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1000" role="img" aria-labelledby="title desc">
  <title id="title">TradersApp What How Why Where Whom map</title>
  <desc id="desc">Single-chart operating map showing what, how, why, where, and whom for each major part of the TradersApp architecture.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#10233d" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #10233d; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #536f8c; }
      .header { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #10233d; }
      .rowtitle { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #10233d; }
      .cell { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #425d7b; }
      .mini { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #6b839d; }
    </style>
  </defs>

  <rect width="1800" height="1000" fill="#f8fbff"/>
  <text x="70" y="74" class="title">Architecture operating map</text>
  <text x="70" y="106" class="subtitle">One chart that answers what / how / why / where / whom for the system as it exists today</text>

  <g filter="url(#shadow)">
    <rect x="70" y="150" width="1660" height="776" rx="28" fill="#ffffff" stroke="#d9e2eb" stroke-width="2"/>
  </g>

  <g>
    <rect x="70" y="150" width="250" height="86" fill="#f2f6fb" stroke="#d9e2eb" stroke-width="2"/>
    <text x="98" y="204" class="header">Lane</text>
    <rect x="320" y="150" width="282" height="86" fill="#f2f6fb" stroke="#d9e2eb" stroke-width="2"/>
    <text x="348" y="204" class="header">What</text>
    <rect x="602" y="150" width="282" height="86" fill="#f2f6fb" stroke="#d9e2eb" stroke-width="2"/>
    <text x="630" y="204" class="header">How</text>
    <rect x="884" y="150" width="282" height="86" fill="#f2f6fb" stroke="#d9e2eb" stroke-width="2"/>
    <text x="912" y="204" class="header">Why</text>
    <rect x="1166" y="150" width="282" height="86" fill="#f2f6fb" stroke="#d9e2eb" stroke-width="2"/>
    <text x="1194" y="204" class="header">Where</text>
    <rect x="1448" y="150" width="282" height="86" fill="#f2f6fb" stroke="#d9e2eb" stroke-width="2"/>
    <text x="1476" y="204" class="header">Whom</text>
    <rect x="70" y="236" width="1660" height="138" fill="#fff7ea" stroke="#f1c27a" stroke-width="2"/>
    <line x1="320" y1="236" x2="320" y2="374" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="602" y1="236" x2="602" y2="374" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="884" y1="236" x2="884" y2="374" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="1166" y1="236" x2="1166" y2="374" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="1448" y1="236" x2="1448" y2="374" stroke="#d9e2eb" stroke-width="2"/>
    <text x="98" y="290" class="rowtitle">Request path</text>
    <text x="342" y="284" class="cell">Frontend -&gt; BFF -&gt;</text>
    <text x="342" y="310" class="cell">analysis-service -&gt; ML Engine</text>
    <text x="624" y="284" class="cell">HTTP at the edge; gRPC</text>
    <text x="624" y="310" class="cell">at the extracted service seam</text>
    <text x="906" y="284" class="cell">Keep live trading latency</text>
    <text x="906" y="310" class="cell">under the critical SLA</text>
    <text x="1188" y="284" class="cell">Browser, BFF, analysis-service,</text>
    <text x="1188" y="310" class="cell">ML Engine, Redis, Feast</text>
    <text x="1470" y="284" class="cell">Trader depends on it;</text>
    <text x="1470" y="310" class="cell">BFF + analysis owners keep it stable</text>
    <rect x="70" y="374" width="1660" height="138" fill="#eef9f0" stroke="#b8dfc1" stroke-width="2"/>
    <line x1="320" y1="374" x2="320" y2="512" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="602" y1="374" x2="602" y2="512" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="884" y1="374" x2="884" y2="512" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="1166" y1="374" x2="1166" y2="512" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="1448" y1="374" x2="1448" y2="512" stroke="#d9e2eb" stroke-width="2"/>
    <text x="98" y="428" class="rowtitle">Learning loop</text>
    <text x="342" y="422" class="cell">Retraining, data quality,</text>
    <text x="342" y="448" class="cell">registry, artifacts, feedback</text>
    <text x="624" y="422" class="cell">Airflow DAGs, Great Expectations,</text>
    <text x="624" y="448" class="cell">MLflow, Kafka, MinIO</text>
    <text x="906" y="422" class="cell">Stop drift and promote</text>
    <text x="906" y="448" class="cell">only validated model versions</text>
    <text x="1188" y="422" class="cell">ML Engine internals, Airflow,</text>
    <text x="1188" y="448" class="cell">MLflow, MinIO, Postgres</text>
    <text x="1470" y="422" class="cell">ML owner / operator</text>
    <text x="1470" y="448" class="cell">reviews and promotes versions</text>
    <rect x="70" y="512" width="1660" height="138" fill="#eef8fc" stroke="#b8dceb" stroke-width="2"/>
    <line x1="320" y1="512" x2="320" y2="650" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="602" y1="512" x2="602" y2="650" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="884" y1="512" x2="884" y2="650" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="1166" y1="512" x2="1166" y2="650" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="1448" y1="512" x2="1448" y2="650" stroke="#d9e2eb" stroke-width="2"/>
    <text x="98" y="566" class="rowtitle">Observability</text>
    <text x="342" y="560" class="cell">Metrics, logs, traces,</text>
    <text x="342" y="586" class="cell">dashboards, alerts</text>
    <text x="624" y="560" class="cell">Prometheus scrapes, Grafana</text>
    <text x="624" y="586" class="cell">visualizes, Loki + Jaeger collect</text>
    <text x="906" y="560" class="cell">Catch latency, drift, retrain,</text>
    <text x="906" y="586" class="cell">and infra failures early</text>
    <text x="1188" y="560" class="cell">Every runtime service</text>
    <text x="1188" y="586" class="cell">across the stack</text>
    <text x="1470" y="560" class="cell">Platform / operator team</text>
    <text x="1470" y="586" class="cell">responds and tunes alerts</text>
    <rect x="70" y="650" width="1660" height="138" fill="#f6f2ff" stroke="#d4c7ff" stroke-width="2"/>
    <line x1="320" y1="650" x2="320" y2="788" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="602" y1="650" x2="602" y2="788" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="884" y1="650" x2="884" y2="788" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="1166" y1="650" x2="1166" y2="788" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="1448" y1="650" x2="1448" y2="788" stroke="#d9e2eb" stroke-width="2"/>
    <text x="98" y="704" class="rowtitle">Delivery + secrets</text>
    <text x="342" y="698" class="cell">Build, test, deploy,</text>
    <text x="342" y="724" class="cell">and inject runtime secrets</text>
    <text x="624" y="698" class="cell">Gitea, Woodpecker, Helm,</text>
    <text x="624" y="724" class="cell">k3s, Infisical</text>
    <text x="906" y="698" class="cell">Ship changes safely without</text>
    <text x="906" y="724" class="cell">manual drift</text>
    <text x="1188" y="698" class="cell">CI/CD pipeline, cluster release,</text>
    <text x="1188" y="724" class="cell">runtime environments</text>
    <text x="1470" y="698" class="cell">Developer pushes; pipeline</text>
    <text x="1470" y="724" class="cell">and platform own execution</text>
    <rect x="70" y="788" width="1660" height="138" fill="#ffffff" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="320" y1="788" x2="320" y2="926" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="602" y1="788" x2="602" y2="926" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="884" y1="788" x2="884" y2="926" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="1166" y1="788" x2="1166" y2="926" stroke="#d9e2eb" stroke-width="2"/>
    <line x1="1448" y1="788" x2="1448" y2="926" stroke="#d9e2eb" stroke-width="2"/>
    <text x="98" y="842" class="rowtitle">Reality check</text>
    <text x="98" y="870" class="mini">current state only</text>
    <text x="342" y="836" class="cell">Only analysis is extracted;</text>
    <text x="342" y="862" class="cell">learning mostly stays internal</text>
    <text x="624" y="836" class="cell">Incremental extraction behind</text>
    <text x="624" y="862" class="cell">stable contracts</text>
    <text x="906" y="836" class="cell">Lower risk than forcing</text>
    <text x="906" y="862" class="cell">premature microservices</text>
    <text x="1188" y="836" class="cell">analysis-service is live;</text>
    <text x="1188" y="862" class="cell">ingestion + learning still sit</text>
    <text x="1188" y="888" class="cell">mostly inside ML Engine</text>
    <text x="1470" y="836" class="cell">Architecture owner chooses</text>
    <text x="1470" y="862" class="cell">the next extraction slice</text>
  </g>
</svg>
