<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1080" role="img" aria-labelledby="title desc">
  <title id="title">TradersApp — Architecture Overview</title>
  <desc id="desc">High-level architecture showing the TradersApp request path, supporting systems, and extraction status.</desc>

  <defs>
    <!-- ── Gradients ── -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f4fa"/>
      <stop offset="100%" stop-color="#e8edf5"/>
    </linearGradient>

    <linearGradient id="requestGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff8c00" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff8c00" stop-opacity="0.04"/>
    </linearGradient>

    <linearGradient id="delivGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.06"/>
    </linearGradient>

    <linearGradient id="learnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.06"/>
    </linearGradient>

    <linearGradient id="observeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0.06"/>
    </linearGradient>

    <linearGradient id="footerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0.02"/>
    </linearGradient>

    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>

    <!-- ── Filters ── -->
    <filter id="card" x="-8%" y="-6%" width="116%" height="118%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#1e3a5f" flood-opacity="0.08"/>
    </filter>
    <filter id="boxShadow" x="-4%" y="-4%" width="108%" height="114%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1e3a5f" flood-opacity="0.10"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ── Markers ── -->
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#e07010"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#4f8ef7"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#10b981"/>
    </marker>

    <!-- ── Clip paths ── -->
    <clipPath id="header-clip">
      <rect x="0" y="0" width="1600" height="130" rx="0"/>
    </clipPath>

    <style>
      .bg { fill: url(#bgGrad); }
      .title { font: 700 38px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #0f1e35; }
      .subtitle { font: 400 16px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .pill { font: 700 11px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #fff; letter-spacing: 0.8px; }
      .sec-title { font: 700 22px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #0f1e35; }
      .sec-sub { font: 400 14px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .sec-note { font: 400 12px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
      .box-title { font: 700 18px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #0f1e35; }
      .box-sub { font: 400 13px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .box-tag { font: 700 10px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #94a3b8; letter-spacing: 0.5px; }
      .footer-title { font: 700 20px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #0f1e35; }
      .footer-body { font: 400 14px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .divider { fill: #e2e8f0; }
      .lane-badge { font: 700 10px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #fff; letter-spacing: 0.8px; }
    </style>
  </defs>

  <!-- ── Background ── -->
  <rect class="bg" width="1600" height="1080"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.4">
    <line x1="0" y1="200" x2="1600" y2="200" stroke="#cbd5e1" stroke-width="0.5" stroke-dasharray="6 6"/>
    <line x1="0" y1="450" x2="1600" y2="450" stroke="#cbd5e1" stroke-width="0.5" stroke-dasharray="6 6"/>
    <line x1="0" y1="880" x2="1600" y2="880" stroke="#cbd5e1" stroke-width="0.5" stroke-dasharray="6 6"/>
  </g>

  <!-- ── Title ── -->
  <text x="72" y="60" class="title">TradersApp</text>
  <text x="72" y="88" class="subtitle">Architecture overview — request path, supporting systems, and extraction status</text>

  <!-- ══════════════════════════════════════════
       SECTION 1 — REQUEST PATH
       ══════════════════════════════════════════ -->

  <!-- Section background -->
  <rect x="56" y="118" width="1488" height="310" rx="22" fill="url(#requestGrad)" filter="url(#card)"/>
  <rect x="56" y="118" width="1488" height="50" rx="22" fill="#ff8c00" fill-opacity="0.85"/>
  <rect x="56" y="144" width="1488" height="24" fill="#ff8c00" fill-opacity="0.85"/>
  <rect x="56" y="140" width="1488" height="28" fill="none"/>
  <!-- badge -->
  <rect x="80" y="126" width="158" height="26" rx="13" fill="#fff" fill-opacity="0.25"/>
  <text x="102" y="143" class="pill">1 · REQUEST PATH</text>

  <!-- Intro text -->
  <text x="80" y="188" class="sec-title">Critical serving path</text>
  <text x="80" y="208" class="sec-sub">Live user-facing flow — keep under the 50ms SLA target.</text>
  <text x="80" y="226" class="sec-note">Only analysis-service is extracted today. Everything else sits inside the ML Engine.</text>

  <!-- Service boxes (horizontal flow) -->
  <!-- Frontend -->
  <g filter="url(#boxShadow)">
    <rect x="80" y="252" width="280" height="120" rx="18" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="80" y="252" width="280" height="8" rx="8" fill="#4f8ef7" fill-opacity="0.9"/>
  </g>
  <text x="108" y="290" class="box-tag">FRONTEND</text>
  <text x="108" y="316" class="box-title">React + Vite</text>
  <text x="108" y="336" class="box-sub">Trading UI · Vite HMR</text>

  <!-- Arrow 1 -->
  <line x1="360" y1="312" x2="435" y2="312" stroke="#e07010" stroke-width="4" marker-end="url(#arr-orange)"/>

  <!-- BFF -->
  <g filter="url(#boxShadow)">
    <rect x="443" y="252" width="280" height="120" rx="18" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="443" y="252" width="280" height="8" rx="8" fill="#7c3aed" fill-opacity="0.85"/>
  </g>
  <text x="471" y="290" class="box-tag">EDGE + ORCHESTRATION</text>
  <text x="471" y="316" class="box-title">BFF</text>
  <text x="471" y="336" class="box-sub">Node.js · Auth · Rate limit · Cache</text>

  <!-- Arrow 2 -->
  <line x1="723" y1="312" x2="798" y2="312" stroke="#e07010" stroke-width="4" marker-end="url(#arr-orange)"/>

  <!-- analysis-service -->
  <g filter="url(#boxShadow)">
    <rect x="806" y="252" width="280" height="120" rx="18" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="806" y="252" width="280" height="8" rx="8" fill="#e07010" fill-opacity="0.9"/>
    <text x="1086" y="272" class="lane-badge" fill="#fff" font-size="9" font-family="Inter,sans-serif" font-weight="700" letter-spacing="0.5">EXTRACTED</text>
  </g>
  <text x="834" y="290" class="box-tag">SERVICE BOUNDARY</text>
  <text x="834" y="316" class="box-title">analysis-service</text>
  <text x="834" y="336" class="box-sub">gRPC consensus · extraction seam</text>

  <!-- Arrow 3 -->
  <line x1="1086" y1="312" x2="1161" y2="312" stroke="#e07010" stroke-width="4" marker-end="url(#arr-orange)"/>

  <!-- ML Engine -->
  <g filter="url(#boxShadow)">
    <rect x="1169" y="252" width="280" height="120" rx="18" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="1169" y="252" width="280" height="8" rx="8" fill="#059669" fill-opacity="0.85"/>
  </g>
  <text x="1197" y="290" class="box-tag">ML RUNTIME</text>
  <text x="1197" y="316" class="box-title">ML Engine</text>
  <text x="1197" y="336" class="box-sub">Inference · Drift · Feedback · Training</text>

  <!-- Data-plane connectors (below) -->
  <line x1="1210" y1="372" x2="1210" y2="395" stroke="#10b981" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arr-green)"/>
  <line x1="1320" y1="372" x2="1320" y2="395" stroke="#10b981" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arr-green)"/>
  <text x="1169" y="410" class="box-tag" fill="#10b981">Redis + Feast · features + cache</text>

  <!-- ══════════════════════════════════════════
       SECTION 2–4 — SUPPORTING SYSTEMS (3 cols)
       ══════════════════════════════════════════ -->
  <g transform="translate(0, 436)">

    <!-- ── 2. Delivery + Secrets ── -->
    <rect x="56" y="0" width="460" height="412" rx="22" fill="url(#delivGrad)" filter="url(#card)"/>
    <rect x="56" y="0" width="460" height="50" rx="22" fill="#7c3aed" fill-opacity="0.85"/>
    <rect x="56" y="26" width="460" height="24" fill="#7c3aed" fill-opacity="0.85"/>
    <rect x="80" y="8" width="196" height="26" rx="13" fill="#fff" fill-opacity="0.2"/>
    <text x="102" y="25" class="pill">2 · DELIVERY + SECRETS</text>

    <text x="80" y="82" class="sec-title">Build, deploy, and runtime secrets</text>
    <text x="80" y="102" class="sec-sub">CI/CD pipeline, cluster rollout, secrets injection.</text>

    <!-- Cards -->
    <g filter="url(#boxShadow)">
      <rect x="80" y="124" width="412" height="74" rx="16" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect x="80" y="124" width="6" height="74" rx="3" fill="#7c3aed"/>
    </g>
    <text x="104" y="154" class="box-title">Gitea + Woodpecker</text>
    <text x="104" y="174" class="box-sub">Source hosting · CI/CD · Chaos testing</text>

    <g filter="url(#boxShadow)">
      <rect x="80" y="212" width="412" height="74" rx="16" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect x="80" y="212" width="6" height="74" rx="3" fill="#4f46e5"/>
    </g>
    <text x="104" y="242" class="box-title">Helm on k3s</text>
    <text x="104" y="262" class="box-sub">Container orchestration · Helm charts</text>

    <g filter="url(#boxShadow)">
      <rect x="80" y="300" width="412" height="74" rx="16" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect x="80" y="300" width="6" height="74" rx="3" fill="#6366f1"/>
    </g>
    <text x="104" y="330" class="box-title">Infisical</text>
    <text x="104" y="350" class="box-sub">Secrets vault · Zero-trust · Env sync</text>

    <!-- ── 3. Learning + Data ── -->
    <rect x="532" y="0" width="530" height="412" rx="22" fill="url(#learnGrad)" filter="url(#card)"/>
    <rect x="532" y="0" width="530" height="50" rx="22" fill="#059669" fill-opacity="0.85"/>
    <rect x="532" y="26" width="530" height="24" fill="#059669" fill-opacity="0.85"/>
    <rect x="556" y="8" width="190" height="26" rx="13" fill="#fff" fill-opacity="0.2"/>
    <text x="578" y="25" class="pill">3 · LEARNING + DATA</text>

    <text x="556" y="82" class="sec-title">Model lifecycle and data quality</text>
    <text x="556" y="102" class="sec-sub">Retraining, registry, DQ gates, feedback bus.</text>

    <!-- Top row -->
    <g filter="url(#boxShadow)">
      <rect x="556" y="124" width="238" height="74" rx="16" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect x="556" y="124" width="6" height="74" rx="3" fill="#0d9488"/>
    </g>
    <text x="580" y="154" class="box-title">Redis + Feast</text>
    <text x="580" y="174" class="box-sub">Online features · &lt;10ms</text>

    <g filter="url(#boxShadow)">
      <rect x="808" y="124" width="238" height="74" rx="16" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect x="808" y="124" width="6" height="74" rx="3" fill="#e11d48"/>
    </g>
    <text x="832" y="154" class="box-title">Kafka</text>
    <text x="832" y="174" class="box-sub">Events · Feedback bus</text>

    <!-- Bottom row -->
    <g filter="url(#boxShadow)">
      <rect x="556" y="212" width="238" height="74" rx="16" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect x="556" y="212" width="6" height="74" rx="3" fill="#0891b2"/>
    </g>
    <text x="580" y="242" class="box-title">Airflow + GE</text>
    <text x="580" y="262" class="box-sub">DQ gates · Retrain DAGs</text>

    <g filter="url(#boxShadow)">
      <rect x="808" y="212" width="238" height="74" rx="16" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect x="808" y="212" width="6" height="74" rx="3" fill="#059669"/>
    </g>
    <text x="832" y="242" class="box-title">MLflow + MinIO</text>
    <text x="832" y="262" class="box-sub">Registry · Artifacts</text>

    <!-- Status strip -->
    <g filter="url(#boxShadow)">
      <rect x="556" y="300" width="490" height="74" rx="16" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect x="556" y="300" width="490" height="8" rx="8" fill="#10b981" fill-opacity="0.6"/>
    </g>
    <text x="580" y="330" class="box-title">PostgreSQL</text>
    <text x="580" y="350" class="box-sub">MLflow metadata backend · Model registry state</text>
    <text x="820" y="344" class="box-tag" fill="#10b981">LIVE</text>

    <!-- ── 4. Observability ── -->
    <rect x="1078" y="0" width="466" height="412" rx="22" fill="url(#observeGrad)" filter="url(#card)"/>
    <rect x="1078" y="0" width="466" height="50" rx="22" fill="#0891b2" fill-opacity="0.85"/>
    <rect x="1078" y="26" width="466" height="24" fill="#0891b2" fill-opacity="0.85"/>
    <rect x="1102" y="8" width="186" height="26" rx="13" fill="#fff" fill-opacity="0.2"/>
    <text x="1124" y="25" class="pill">4 · OBSERVABILITY</text>

    <text x="1102" y="82" class="sec-title">Metrics, logs, traces, alerts</text>
    <text x="1102" y="102" class="sec-sub">Prometheus scrapes · Grafana visualizes · Loki + Jaeger collect</text>

    <!-- Top row -->
    <g filter="url(#boxShadow)">
      <rect x="1102" y="124" width="204" height="74" rx="16" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect x="1102" y="124" width="6" height="74" rx="3" fill="#e97716"/>
    </g>
    <text x="1126" y="154" class="box-title">Prometheus</text>
    <text x="1126" y="174" class="box-sub">Metrics · Alerts</text>

    <g filter="url(#boxShadow)">
      <rect x="1324" y="124" width="204" height="74" rx="16" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect x="1324" y="124" width="6" height="74" rx="3" fill="#1e293b"/>
    </g>
    <text x="1348" y="154" class="box-title">Loki</text>
    <text x="1348" y="174" class="box-sub">Log aggregation</text>

    <!-- Bottom row -->
    <g filter="url(#boxShadow)">
      <rect x="1102" y="212" width="204" height="74" rx="16" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect x="1102" y="212" width="6" height="74" rx="3" fill="#f0a500"/>
    </g>
    <text x="1126" y="242" class="box-title">Grafana</text>
    <text x="1126" y="262" class="box-sub">Dashboards · SLA viz</text>

    <g filter="url(#boxShadow)">
      <rect x="1324" y="212" width="204" height="74" rx="16" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect x="1324" y="212" width="6" height="74" rx="3" fill="#9f7aea"/>
    </g>
    <text x="1348" y="242" class="box-title">Jaeger</text>
    <text x="1348" y="262" class="box-sub">Distributed traces</text>

    <!-- SLA alert note -->
    <g filter="url(#boxShadow)">
      <rect x="1102" y="300" width="426" height="74" rx="16" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1.5"/>
    </g>
    <text x="1126" y="330" class="box-title">Alert targets</text>
    <text x="1126" y="350" class="box-sub">SLA breach · Drift · Retrain failure · Infra regression</text>
    <text x="1300" y="344" class="box-tag" fill="#e11d48">50ms SLA</text>
  </g>

  <!-- ══════════════════════════════════════════
       FOOTER — CURRENT REALITY
       ══════════════════════════════════════════ -->
  <rect x="56" y="870" width="1488" height="172" rx="22" fill="url(#footerGrad)" filter="url(#card)"/>
  <rect x="56" y="870" width="1488" height="6" rx="3" fill="#1e293b" fill-opacity="0.15"/>

  <text x="80" y="916" class="footer-title">Current reality</text>

  <!-- 4 callouts in a row -->
  <g>
    <rect x="80" y="938" width="330" height="78" rx="14" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="80" y="938" width="5" height="78" rx="3" fill="#e07010"/>
    <text x="100" y="966" class="box-title" font-size="14">analysis-service</text>
    <text x="100" y="984" class="box-sub" font-size="12">Only extracted domain runtime</text>
    <text x="100" y="1002" class="box-sub" font-size="12">on the live request path today.</text>
  </g>

  <g>
    <rect x="426" y="938" width="330" height="78" rx="14" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="426" y="938" width="5" height="78" rx="3" fill="#059669"/>
    <text x="446" y="966" class="box-title" font-size="14">Ingestion + Learning</text>
    <text x="446" y="984" class="box-sub" font-size="12">Still run inside ML Engine and</text>
    <text x="446" y="1002" class="box-sub" font-size="12">Airflow — not yet extracted.</text>
  </g>

  <g>
    <rect x="772" y="938" width="330" height="78" rx="14" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="772" y="938" width="5" height="78" rx="3" fill="#0891b2"/>
    <text x="792" y="966" class="box-title" font-size="14">Platform ops wired</text>
    <text x="792" y="984" class="box-sub" font-size="12">MLflow, observability, and CI/CD</text>
    <text x="792" y="1002" class="box-sub" font-size="12">already self-hosted and operational.</text>
  </g>

  <g>
    <rect x="1118" y="938" width="426" height="78" rx="14" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="1118" y="938" width="5" height="78" rx="3" fill="#7c3aed"/>
    <text x="1138" y="966" class="box-title" font-size="14">Next extraction</text>
    <text x="1138" y="984" class="box-sub" font-size="12">Extract ingestion and learning</text>
    <text x="1138" y="1002" class="box-sub" font-size="12">behind stable contracts incrementally.</text>
  </g>

</svg>
