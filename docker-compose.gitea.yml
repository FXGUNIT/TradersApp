# ─────────────────────────────────────────────────────────────────────────────
# TradersApp — Gitea + Woodpecker CI/CD Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Self-hosted Git (Gitea) + CI Pipeline (Woodpecker CI).
#
# Start:
#   docker compose -f docker-compose.gitea.yml up -d
#
# Access:
#   Gitea:     http://localhost:3000  (admin / traders123)
#   Woodpecker: http://localhost:8080  (admin / secrets from env)
# ─────────────────────────────────────────────────────────────────────────────

version: "3.8"

services:
  # ── Gitea (Self-hosted Git) ────────────────────────────────────────────────
  gitea:
    image: gitea/gitea:1.22
    container_name: traders-gitea
    ports:
      - "3000:3000"
      - "2222:22"
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres_gitea:5432
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=${GITEA_DB_PASSWORD:-gitea123}
      - GITEA__database__NAME=gitea
      - GITEA__server__PROTOCOL=http
      - GITEA__server__DOMAIN=localhost
      - GITEA__server__ROOT_URL=http://localhost:3000
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__service__DISABLE_REGISTRATION=false
      - GITEA__service__REQUIRE_SIGNIN_VIEW=false
      - GITEA__mailer__ENABLED=false
    depends_on:
      postgres_gitea:
        condition: service_healthy
    volumes:
      - gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

  # ── PostgreSQL for Gitea ──────────────────────────────────────────────────
  postgres_gitea:
    image: postgres:16-alpine
    container_name: traders-postgres-gitea
    environment:
      POSTGRES_USER: gitea
      POSTGRES_PASSWORD: ${GITEA_DB_PASSWORD:-gitea123}
      POSTGRES_DB: gitea
    volumes:
      - postgres-gitea-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitea"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Woodpecker CI ─────────────────────────────────────────────────────────
  woodpecker-server:
    image: woodpeckerci/woodpecker-server:v2.5
    container_name: traders-woodpecker-server
    ports:
      - "8080:8000"
    environment:
      - WOODPECKER_OPEN=true
      - WOODPECKER_ADMIN=admin
      - WOODPECKER_HOST=http://localhost:8080
      - WOODPECKER_GITEA=true
      - WOODPECKER_GITEA_URL=http://gitea:3000
      - WOODPECKER_GITEA_CLIENT=${WOODPECKER_GITEA_CLIENT}
      - WOODPECKER_GITEA_SECRET=${WOODPECKER_GITEA_SECRET}
      - WOODPECKER_SECRET=${WOODPECKER_SECRET:-traders_secret}
      - WOODPECKER_DATABASE_DRIVER=postgres
      - WOODPECKER_DATABASE_DATASOURCE=postgres://woodpecker:${WOODPECKER_DB_PASSWORD:-woodpecker123}@postgres_woodpecker:5432/woodpecker?sslmode=disable
    depends_on:
      postgres_woodpecker:
        condition: service_healthy
    volumes:
      - woodpecker-data:/var/lib/woodpecker
    restart: unless-stopped

  # ── Woodpecker Agent ──────────────────────────────────────────────────────
  woodpecker-agent:
    image: woodpeckerci/woodpecker-agent:v2.5
    container_name: traders-woodpecker-agent
    command: agent
    environment:
      - WOODPECKER_SERVER=http://woodpecker-server:9000
      - WOODPECKER_SECRET=${WOODPECKER_SECRET:-traders_secret}
      - WOODPECKER_NETWORK=tradersapp_gitea
    depends_on:
      woodpecker-server:
        condition: service_started
    restart: unless-stopped
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # ── PostgreSQL for Woodpecker ─────────────────────────────────────────────
  postgres_woodpecker:
    image: postgres:16-alpine
    container_name: traders-postgres-woodpecker
    environment:
      POSTGRES_USER: woodpecker
      POSTGRES_PASSWORD: ${WOODPECKER_DB_PASSWORD:-woodpecker123}
      POSTGRES_DB: woodpecker
    volumes:
      - postgres-woodpecker-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woodpecker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  gitea-data:
  postgres-gitea-data:
  woodpecker-data:
  postgres-woodpecker-data:
