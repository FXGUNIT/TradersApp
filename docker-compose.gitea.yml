name: tradersapp-cicd

services:
  postgres:
    image: postgres:16-alpine
    container_name: tradersapp-gitea-db
    environment:
      POSTGRES_DB: ${GITEA_DB_NAME:-gitea}
      POSTGRES_USER: ${GITEA_DB_USER:-gitea}
      POSTGRES_PASSWORD: ${GITEA_DB_PASSWORD:?set GITEA_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GITEA_DB_USER:-gitea} -d ${GITEA_DB_NAME:-gitea}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - gitea-db:/var/lib/postgresql/data
    networks:
      - cicd

  gitea:
    image: docker.gitea.com/gitea:1.22.6
    container_name: tradersapp-gitea
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${GITEA_HTTP_PORT:-3000}:3000"
      - "${GITEA_SSH_PORT:-2222}:22"
    environment:
      USER_UID: ${GITEA_UID:-1000}
      USER_GID: ${GITEA_GID:-1000}
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: ${GITEA_DB_NAME:-gitea}
      GITEA__database__USER: ${GITEA_DB_USER:-gitea}
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD:?set GITEA_DB_PASSWORD}
      GITEA__server__DOMAIN: ${GITEA_DOMAIN:?set GITEA_DOMAIN}
      GITEA__server__ROOT_URL: ${GITEA_ROOT_URL:?set GITEA_ROOT_URL}
      GITEA__server__SSH_DOMAIN: ${GITEA_SSH_DOMAIN:?set GITEA_SSH_DOMAIN}
      GITEA__server__SSH_PORT: ${GITEA_SSH_EXTERNAL_PORT:-22}
      GITEA__server__START_SSH_SERVER: "false"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "false"
      GITEA__service__REQUIRE_SIGNIN_VIEW: "false"
      GITEA__packages__ENABLED: "true"
      GITEA__api__MAX_RESPONSE_ITEMS: "50"
      GITEA__webhook__ALLOWED_HOST_LIST: ${GITEA_WEBHOOK_ALLOWED_HOST_LIST:-external}
      GITEA__mailer__ENABLED: "false"
    restart: unless-stopped
    volumes:
      - gitea-data:/data
    networks:
      - cicd

  woodpecker-server:
    image: woodpeckerci/woodpecker-server:v3.12.0
    container_name: tradersapp-woodpecker-server
    depends_on:
      gitea:
        condition: service_started
    ports:
      - "${WOODPECKER_PORT:-8000}:8000"
    environment:
      WOODPECKER_OPEN: "false"
      WOODPECKER_HOST: ${WOODPECKER_HOST:?set WOODPECKER_HOST}
      WOODPECKER_SERVER_ADDR: :8000
      WOODPECKER_GRPC_ADDR: :9000
      WOODPECKER_GRPC_SECRET: ${WOODPECKER_GRPC_SECRET:?set WOODPECKER_GRPC_SECRET}
      WOODPECKER_AGENT_SECRET: ${WOODPECKER_AGENT_SECRET:?set WOODPECKER_AGENT_SECRET}
      WOODPECKER_ADMIN: ${WOODPECKER_ADMIN:?set WOODPECKER_ADMIN}
      WOODPECKER_REPO_OWNERS: ${WOODPECKER_REPO_OWNERS:?set WOODPECKER_REPO_OWNERS}
      WOODPECKER_DATABASE_DRIVER: sqlite3
      WOODPECKER_DATABASE_DATASOURCE: /var/lib/woodpecker/woodpecker.sqlite
      WOODPECKER_GITEA: "true"
      WOODPECKER_GITEA_URL: ${WOODPECKER_GITEA_URL:-http://gitea:3000/}
      WOODPECKER_EXPERT_FORGE_OAUTH_HOST: ${WOODPECKER_EXPERT_FORGE_OAUTH_HOST:-${GITEA_ROOT_URL:?set GITEA_ROOT_URL}}
      WOODPECKER_GITEA_CLIENT: ${WOODPECKER_GITEA_CLIENT:?set WOODPECKER_GITEA_CLIENT}
      WOODPECKER_GITEA_SECRET: ${WOODPECKER_GITEA_SECRET:?set WOODPECKER_GITEA_SECRET}
      WOODPECKER_PLUGINS_PRIVILEGED: ${WOODPECKER_PLUGINS_PRIVILEGED:-woodpeckerci/plugin-docker-buildx,docker.io/woodpeckerci/plugin-docker-buildx,quay.io/woodpeckerci/plugin-docker-buildx}
      WOODPECKER_LOG_LEVEL: info
    restart: unless-stopped
    volumes:
      - woodpecker-data:/var/lib/woodpecker
    networks:
      - cicd

  woodpecker-agent:
    image: woodpeckerci/woodpecker-agent:v3.12.0
    container_name: tradersapp-woodpecker-agent
    depends_on:
      woodpecker-server:
        condition: service_started
    environment:
      WOODPECKER_SERVER: woodpecker-server:9000
      WOODPECKER_AGENT_SECRET: ${WOODPECKER_AGENT_SECRET:?set WOODPECKER_AGENT_SECRET}
      WOODPECKER_BACKEND: docker
      WOODPECKER_BACKEND_DOCKER_NETWORK: tradersapp-cicd
      WOODPECKER_MAX_WORKFLOWS: ${WOODPECKER_AGENT_MAX_WORKFLOWS:-2}
      WOODPECKER_LOG_LEVEL: info
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cicd

networks:
  cicd:
    name: tradersapp-cicd

volumes:
  gitea-data:
  gitea-db:
  woodpecker-data:
