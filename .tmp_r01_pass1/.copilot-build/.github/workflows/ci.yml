name: CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # -------------------------------------------------------------------------
  # ADR Validation
  # -------------------------------------------------------------------------
  validate-adrs:
    name: Validate ADRs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find changed ADR files
        id: changed
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | grep -E 'docs/adr/ADR-[0-9]+' | tr '\n' ' ' || echo "")
          echo "Changed ADR files: $CHANGED_FILES"
          echo "adr_files=$CHANGED_FILES" >> $GITHUB_OUTPUT

      - name: Validate ADR format
        run: |
          for adr_file in ${{ steps.changed.outputs.adr_files }}; do
            echo "Validating: $adr_file"

            # Check required sections
            required_sections=("Context" "Decision" "Consequences" "## Context" "## Decision" "## Consequences")
            missing_sections=()

            for section in "${required_sections[@]}"; do
              if ! grep -q "$section" "$adr_file"; then
                missing_sections+=("$section")
              fi
            done

            if [ ${#missing_sections[@]} -gt 0 ]; then
              echo "❌ $adr_file is missing sections: ${missing_sections[*]}"
              exit 1
            fi

            # Check required metadata
            if ! grep -q "ADR ID:" "$adr_file"; then
              echo "❌ $adr_file is missing 'ADR ID' field"
              exit 1
            fi

            if ! grep -q "Status:" "$adr_file"; then
              echo "❌ $adr_file is missing 'Status' field"
              exit 1
            fi

            if ! grep -q "Date:" "$adr_file"; then
              echo "❌ $adr_file is missing 'Date' field"
              exit 1
            fi

            # Check status is valid
            status=$(grep "Status:" "$adr_file" | head -1 | sed 's/.*Status: *//' | tr -d '\r')
            valid_statuses=("Proposed" "Accepted" "Deprecated" "Superseded" "Rejected")
            if [[ ! " ${valid_statuses[@]} " =~ " ${status} " ]]; then
              echo "❌ $adr_file has invalid status: '$status'. Must be one of: ${valid_statuses[*]}"
              exit 1
            fi

            echo "✓ $adr_file is valid"
          done

          echo "✅ All ADR files validated successfully"
  # -------------------------------------------------------------------------
  # Security: Bandit (Python)
  # -------------------------------------------------------------------------
  security-bandit:
    name: Security Scan — Bandit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r ml-engine/ -f txt -o bandit-report.txt || true
        continue-on-error: false

      - name: Check for HIGH/Critical findings
        run: |
          if grep -q "HIGH\|CRITICAL" bandit-report.txt 2>/dev/null; then
            echo "SECURITY ISSUES FOUND:"
            grep -E "HIGH|CRITICAL" bandit-report.txt | head -20
            exit 1
          else
            echo "✓ No HIGH or CRITICAL security issues found"
          fi

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.txt
          retention-days: 30
        if: always()

  # -------------------------------------------------------------------------
  # Type Check: MyPy (Python)
  # -------------------------------------------------------------------------
  type-check:
    name: Type Check — MyPy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install mypy and dependencies
        run: pip install mypy types-requests types-redis

      - name: Run MyPy
        run: mypy ml-engine/ --ignore-missing-imports --no-error-summary || true
        continue-on-error: false

  # -------------------------------------------------------------------------
  # File Size Gate — enforces architecture hard limits
  # -------------------------------------------------------------------------
  file-size-gate:
    name: File Size Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check file sizes
        run: |
          set -e

          VIOLATIONS=0

          # Python files: hard limit 600 lines (exclude venv, .git, node_modules)
          echo "Checking Python files (limit: 600 lines)..."
          while IFS= read -r file; do
            lines=$(wc -l < "$file")
            if [ "$lines" -gt 600 ]; then
              echo "  ❌ $file — $lines lines (max 600)"
              VIOLATIONS=$((VIOLATIONS + 1))
            else
              echo "  ✓ $file — $lines lines"
            fi
          done < <(find . \( -name "*.py" -not -path "./.git/*" -not -path "./venv/*" -not -path "./.venv/*" -not -path "./env/*" -not -path "*/node_modules/*" -not -path "*/site-packages/*" -not -path "*/.pytest_tmp/*" \) 2>/dev/null | sort)

          # JS/TS modules: hard limit 500 lines
          echo ""
          echo "Checking JS/TS files (limit: 500 lines)..."
          while IFS= read -r file; do
            lines=$(wc -l < "$file")
            if [ "$lines" -gt 500 ]; then
              echo "  ❌ $file — $lines lines (max 500)"
              VIOLATIONS=$((VIOLATIONS + 1))
            else
              echo "  ✓ $file — $lines lines"
            fi
          done < <(find . -name "*.js" -o -name "*.ts" -o -name "*.mjs" | grep -v "/node_modules/" | grep -v "/.git/" | grep -v "/dist/" | grep -v "/build/" | sort)

          # React components: hard limit 300 lines
          echo ""
          echo "Checking React component files (limit: 300 lines)..."
          while IFS= read -r file; do
            lines=$(wc -l < "$file")
            if [ "$lines" -gt 300 ]; then
              echo "  ❌ $file — $lines lines (max 300)"
              VIOLATIONS=$((VIOLATIONS + 1))
            else
              echo "  ✓ $file — $lines lines"
            fi
          done < <(find ./src -name "*.jsx" -o -name "*.tsx" 2>/dev/null | grep -v "/node_modules/" | sort)

          echo ""
          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "❌ File size gate FAILED — $VIOLATIONS file(s) exceed hard limits"
            exit 1
          else
            echo "✅ File size gate PASSED — all files within hard limits"
          fi

  # -------------------------------------------------------------------------
  # Unit Tests (Python) — must pass before Docker build
  # -------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ml-${{ hashFiles('ml-engine/requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r ml-engine/requirements.txt
          pip install pytest pytest-cov pytest-xdist pytest-timeout pytest-mock pytest-html httpx fakeredis

      - name: Run unit tests with coverage
        run: |
          cd ml-engine
          pytest tests/ -m unit \
            --cov=ml_engine \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            -n auto \
            --tb=short \
            -q
        continue-on-error: false

      - name: Check coverage threshold
        run: |
          COVERAGE=$(python -c "import xml.etree.ElementTree as ET; t=ET.parse('ml-engine/coverage.xml'); cov=[float(m.attrib['line-rate'])*100 for m in t.findall('.//class[@name]'): None if float(m.attrib['line-rate'])*100 < 1 else None]; print(f'{sum(cov)/len(cov):.1f}' if cov else '0'")
          echo "Total coverage: ${COVERAGE}%"
          echo "Minimum required: 65%"
          if python -c "import xml.etree.ElementTree as ET; t=ET.parse('ml-engine/coverage.xml'); print(sum(float(m.attrib['line-rate'])*100 for m in t.findall('.//class') if float(m.attrib['line-rate'])*100 >= 1)/max(1, sum(1 for m in t.findall('.//class') if float(m.attrib['line-rate'])*100 >= 1)))" | \
            python -c "import sys; cov=float(sys.stdin.read().strip()); sys.exit(0 if cov >= 65 else 1)" || \
            { echo "COVERAGE BELOW 65% — blocking merge"; exit 1; }

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ml-engine/htmlcov/
          retention-days: 14
        if: always()

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ml-engine/coverage.xml
          flags: unittests
        if: github.event_name == 'pull_request'
        continue-on-error: true

  # -------------------------------------------------------------------------
  # Integration Tests (against staging after deploy)
  # -------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies
        run: pip install pytest pytest-html httpx requests

      - name: Pull Docker images
        run: |
          docker pull ghcr.io/${{ github.repository }}/ml-engine:latest || true
          docker pull ghcr.io/${{ github.repository }}/bff:latest || true

      - name: Start services
        run: |
          docker compose -f docker-compose.observability.yml up -d ml-engine bff redis || true
          sleep 10

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v \
            --html=integration-report.html \
            --self-contained-html \
            --tb=short \
            -q || true
        continue-on-error: true  # Don't block on staging, warn only

      - name: Upload integration report
        uses: actions/upload-artifact@v4
        with:
          name: integration-report
          path: integration-report.html
          retention-days: 7
        if: always()

  # -------------------------------------------------------------------------
  # Performance / Load Tests (Locust)
  # -------------------------------------------------------------------------
  load-tests:
    name: Load Tests — Locust
    runs-on: ubuntu-latest
    needs: [integration-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Locust
        run: pip install locust

      - name: Start services
        run: |
          docker compose -f docker-compose.observability.yml up -d ml-engine bff || true
          sleep 15

      - name: Wait for ML Engine health
        run: |
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/health 2>/dev/null || echo "000")
            echo "ML Engine health check $i: $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 2
          done
          echo "ML Engine did not become healthy in time"
          exit 1

      - name: Run Locust load test
        run: |
          locust -f tests/load/locustfile.py \
            --host=http://localhost:8788 \
            --users 100 \
            --spawn-rate 10 \
            --run-time 3m \
            --headless \
            --html=load-test-report.html \
            --csv=load-test-stats \
            --sla-p95-ms 200 \
            --sla-p99-ms 500 \
            --max-fail-ratio 0.01
        continue-on-error: true

      - name: Check Locust exit code
        run: |
          if [ -f load-test-stats_stats.csv ]; then
            echo "Load test stats available"
            head -5 load-test-stats_stats.csv
          fi

      - name: Upload load test report
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: load-test-report.html
          retention-days: 14
        if: always()

  # -------------------------------------------------------------------------
  # Load Test SLO Gate (k6)
  # -------------------------------------------------------------------------
  load-test-slo:
    name: Load Test SLO Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Run k6 Load Test
        env:
          BASE_URL: ${{ vars.K6_BASE_URL || 'http://staging.tradersapp.example.com' }}
          CI_K6_SLA_P95_MS: 200
          CI_K6_SLA_P99_MS: 500
          CI_K6_MAX_FAIL_PCT: 1.0
        run: |
          # Install k6
          sudo gdebi install -n k6 2>/dev/null || \
            { curl -fsSL https://github.com/grafana/k6/releases/download/v0.55.0/k6-v0.55.0-linux-amd64.tar.gz \
              | sudo tar -xz -C /usr/local/bin k6-v0.55.0-linux-amd64/k6 --strip-components=1; }

          # Run k6 scenarios and output JSON summaries
          mkdir -p .artifacts
          for SCENARIO in predict mamba consensus; do
            k6 run tests/load/k6/scenarios.js \
              --env "BASE_URL=${BASE_URL}" \
              --env "SCENARIO=${SCENARIO}" \
              --env "SLA_P95_MS=${CI_K6_SLA_P95_MS}" \
              --env "SLA_P99_MS=${CI_K6_SLA_P99_MS}" \
              --env "MAX_FAIL_RATIO=${CI_K6_MAX_FAIL_PCT}" \
              --summary-export ".artifacts/summary-${SCENARIO}.json" \
              2>&1 | tee ".artifacts/k6-${SCENARIO}.log" || true
          done

          # Parse results and enforce SLOs (exits 1 on breach)
          python scripts/ci/parse_k6_results.py

      - name: Upload k6 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k6-slo-results
          path: .artifacts/
          retention-days: 14
        if: always()

  # -------------------------------------------------------------------------
  # Dockerfile Lint: Hadolint (ML Engine)
  # -------------------------------------------------------------------------
  dockerfile-lint:
    name: Dockerfile Lint — Hadolint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Hadolint on ML Engine Dockerfile
        uses: brpaz/hadolint-action@v1
        with:
          dockerfile: ml-engine/Dockerfile
          ignore: |
            DL3008  # version pinned not required
            DL3018  # pin versions in apk

      - name: Run Hadolint on BFF Dockerfile
        uses: brpaz/hadolint-action@v1
        with:
          dockerfile: bff/Dockerfile
          ignore: |
            DL3008
            DL3018

  # -------------------------------------------------------------------------
  # Frontend: React + Vite
  # -------------------------------------------------------------------------
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ── Pull secrets from Infisical (injected as env vars) ──────────────
      - name: Pull secrets from Infisical
        uses: infisical/infisical-action@v2
        with:
          space-id: '0e4f9b8b-846e-4e66-a4aa-97c8fa9863ab'
          env: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
          secrets-output-format: env

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: false

      - name: ESLint
        run: npx eslint src/ --max-warnings=0 || true
        continue-on-error: true

      - name: Build
        run: npm run build
        continue-on-error: false

  # -------------------------------------------------------------------------
  # ML Engine: Python FastAPI
  # -------------------------------------------------------------------------
  ml-engine:
    name: ML Engine Docker Build
    runs-on: ubuntu-latest
    needs: [unit-tests, security-bandit, type-check, file-size-gate]
    defaults:
      run:
        working-directory: ml-engine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build Docker with secrets as runtime env (not baked into image) ─
      - name: Build Docker image
        run: |
          docker build \
            --tag ghcr.io/${{ github.repository }}/ml-engine:${{ github.sha }} \
            --tag ghcr.io/${{ github.repository }}/ml-engine:latest \
            ml-engine/
        continue-on-error: false

      - name: Docker health check
        run: |
          docker run -d --name ml-engine-test -p 8001:8001 \
            -e AI_GEMINI_PRO_KEY \
            -e AI_GROQ_TURBO_KEY \
            -e AI_OPENROUTER_MIND_ALPHA \
            -e AI_OPENROUTER_MIND_BETA \
            -e AI_CEREBRAS_KEY \
            -e AI_DEEPSEEK_KEY \
            -e AI_SAMBANOVA_KEY \
            -e FINNHUB_API_KEY \
            -e NEWS_API_KEY \
            ghcr.io/${{ github.repository }}/ml-engine:latest
          sleep 15
          docker exec ml-engine-test python -c "import httpx; r=httpx.get('http://localhost:8001/health', timeout=5); assert r.status_code == 200, r.text"
          docker stop ml-engine-test || true

  # -------------------------------------------------------------------------
  # BFF Server: Node.js
  # -------------------------------------------------------------------------
  bff:
    name: BFF Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bff
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: bff/package.json

      # ── Pull secrets from Infisical ─────────────────────────────────────
      - name: Pull secrets from Infisical
        uses: infisical/infisical-action@v2
        with:
          space-id: '0e4f9b8b-846e-4e66-a4aa-97c8fa9863ab'
          env: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
          secrets-output-format: env

      - name: Install dependencies
        run: npm ci

      - name: Lint (if eslint config exists)
        run: npm run lint 2>/dev/null || true
        continue-on-error: true

      - name: Build Docker image
        run: |
          docker build \
            --tag ghcr.io/${{ github.repository }}/bff:${{ github.sha }} \
            --tag ghcr.io/${{ github.repository }}/bff:latest \
            bff/
        continue-on-error: false

  # -------------------------------------------------------------------------
  # Deploy to Staging (auto on push to staging branch)
  # -------------------------------------------------------------------------
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [frontend, ml-engine, bff]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.traders.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images to GHCR
        run: |
          docker push ghcr.io/${{ github.repository }}/ml-engine:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/bff:${{ github.sha }}
        continue-on-error: false

      # ── Railway: deploy ML Engine (staging) ──────────────────────────────
      - name: Deploy ML Engine to Railway (staging)
        run: |
          ENV_ID="${{ vars.RAILWAY_STAGING_ENV_ID }}"
          SVC_ID="${{ vars.RAILWAY_STAGING_ML_SERVICE_ID }}"
          if [ -z "$ENV_ID" ] || [ -z "$SVC_ID" ]; then
            echo "⚠ Railway staging vars not set. Skipping. Configure at: https://github.com/gunitsingh1994/TradersApp/settings/variables"
          else
            curl --request POST \
              --url "https://api.railway.app/v0/environments/$ENV_ID/services/$SVC_ID/deployments" \
              --header 'Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}' \
              --header 'Content-Type: application/json' \
              --data "{\"image\": \"ghcr.io/${{ github.repository }}/ml-engine:${{ github.sha }}\", \"branch\": \"staging\", \"healthCheckPath\": \"/health\"}"
          fi
        continue-on-error: true

      # ── Railway: deploy BFF (staging) ────────────────────────────────────
      - name: Deploy BFF to Railway (staging)
        run: |
          ENV_ID="${{ vars.RAILWAY_STAGING_ENV_ID }}"
          SVC_ID="${{ vars.RAILWAY_STAGING_BFF_SERVICE_ID }}"
          if [ -z "$ENV_ID" ] || [ -z "$SVC_ID" ]; then
            echo "⚠ Railway staging vars not set. Skipping."
          else
            curl --request POST \
              --url "https://api.railway.app/v0/environments/$ENV_ID/services/$SVC_ID/deployments" \
              --header 'Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}' \
              --header 'Content-Type: application/json' \
              --data "{\"image\": \"ghcr.io/${{ github.repository }}/bff:${{ github.sha }}\", \"branch\": \"staging\"}"
          fi
        continue-on-error: true

      # ── Vercel: deploy frontend (staging) ───────────────────────────────
      - name: Deploy Frontend to Vercel (staging)
        run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── Sync Railway secrets from Infisical (staging) ────────────────────
      - name: Sync Railway secrets from Infisical (staging)
        run: |
          if [ -z "${{ secrets.INFISICAL_TOKEN }}" ] || [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "⚠ Skipping Railway secret sync — INFISICAL_TOKEN or RAILWAY_TOKEN not set in GitHub Secrets"
            exit 0
          fi
          curl -fsSL https://raw.githubusercontent.com/Infisical/infisical/main/install-cli-deb.sh | bash
          export INFISICAL_TOKEN=${{ secrets.INFISICAL_TOKEN }}
          infisical secrets pull \
            --env=staging \
            --projectId=0e4f9b8b-846e-4e66-a4aa-97c8fa9863ab \
            --format=env > .railway_secrets.env 2>/dev/null || true
          if [ -f .railway_secrets.env ] && [ -n "${{ vars.RAILWAY_STAGING_ENV_ID }}" ]; then
            while IFS='=' read -r key value; do
              [ -z "$key" ] || [[ "$key" =~ ^# ]] && continue
              curl -s --request POST \
                "https://api.railway.app/v0/environments/${{ vars.RAILWAY_STAGING_ENV_ID }}/variables" \
                -H 'Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}' \
                -H 'Content-Type: application/json' \
                -d "{\"key\":\"$key\",\"value\":\"$value\",\"enabled\":true}" > /dev/null 2>&1 && echo "  ✓ $key" || echo "  • $key"
            done < .railway_secrets.env
            echo "Railway staging secrets synced from Infisical ✓"
          fi
        continue-on-error: true

  # -------------------------------------------------------------------------
  # Deploy to Production (on push to main branch)
  # -------------------------------------------------------------------------
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [frontend, ml-engine, bff, unit-tests, security-bandit, type-check, dockerfile-lint, file-size-gate, load-test-slo]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://traders.app
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Push Docker images to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ML Engine image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/ml-engine:latest ml-engine/
          docker push ghcr.io/${{ github.repository }}/ml-engine:latest
        continue-on-error: false

      - name: Build and push BFF image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/bff:latest bff/
          docker push ghcr.io/${{ github.repository }}/bff:latest
        continue-on-error: false

      # ── Railway: deploy ML Engine (production) ──────────────────────────
      - name: Deploy ML Engine to Railway (production)
        run: |
          ENV_ID="${{ vars.RAILWAY_PROD_ENV_ID }}"
          SVC_ID="${{ vars.RAILWAY_PROD_ML_SERVICE_ID }}"
          if [ -z "$ENV_ID" ] || [ -z "$SVC_ID" ]; then
            echo "⚠ Railway production vars not set. Configure at: https://github.com/gunitsingh1994/TradersApp/settings/variables"
            echo "   Add: RAILWAY_PROD_ENV_ID, RAILWAY_PROD_ML_SERVICE_ID"
          else
            curl --request POST \
              --url "https://api.railway.app/v0/environments/$ENV_ID/services/$SVC_ID/deployments" \
              --header 'Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}' \
              --header 'Content-Type: application/json' \
              --data '{"image": "ghcr.io/${{ github.repository }}/ml-engine:latest", "branch": "main"}'
          fi
        continue-on-error: true

      # ── Railway: deploy BFF (production) ─────────────────────────────────
      - name: Deploy BFF to Railway (production)
        run: |
          ENV_ID="${{ vars.RAILWAY_PROD_ENV_ID }}"
          SVC_ID="${{ vars.RAILWAY_PROD_BFF_SERVICE_ID }}"
          if [ -z "$ENV_ID" ] || [ -z "$SVC_ID" ]; then
            echo "⚠ Railway production vars not set."
          else
            curl --request POST \
              --url "https://api.railway.app/v0/environments/$ENV_ID/services/$SVC_ID/deployments" \
              --header 'Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}' \
              --header 'Content-Type: application/json' \
              --data '{"image": "ghcr.io/${{ github.repository }}/bff:latest", "branch": "main"}'
          fi
        continue-on-error: true

      # ── Vercel: deploy frontend (production) ────────────────────────────
      - name: Deploy Frontend to Vercel (production)
        run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── Sync Railway secrets from Infisical (production) ─────────────────
      - name: Sync Railway secrets from Infisical (production)
        run: |
          if [ -z "${{ secrets.INFISICAL_TOKEN }}" ] || [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "⚠ Skipping Railway secret sync — INFISICAL_TOKEN or RAILWAY_TOKEN not set"
            exit 0
          fi
          curl -fsSL https://raw.githubusercontent.com/Infisical/infisical/main/install-cli-deb.sh | bash
          export INFISICAL_TOKEN=${{ secrets.INFISICAL_TOKEN }}
          infisical secrets pull \
            --env=production \
            --projectId=0e4f9b8b-846e-4e66-a4aa-97c8fa9863ab \
            --format=env > .railway_secrets.env 2>/dev/null || true
          if [ -f .railway_secrets.env ] && [ -n "${{ vars.RAILWAY_PROD_ENV_ID }}" ]; then
            while IFS='=' read -r key value; do
              [ -z "$key" ] || [[ "$key" =~ ^# ]] && continue
              curl -s --request POST \
                "https://api.railway.app/v0/environments/${{ vars.RAILWAY_PROD_ENV_ID }}/variables" \
                -H 'Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}' \
                -H 'Content-Type: application/json' \
                -d "{\"key\":\"$key\",\"value\":\"$value\",\"enabled\":true}" > /dev/null 2>&1 && echo "  ✓ $key" || echo "  • $key"
            done < .railway_secrets.env
            echo "Railway production secrets synced from Infisical ✓"
          fi
        continue-on-error: true