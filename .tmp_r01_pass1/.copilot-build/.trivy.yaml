# Trivy Configuration
# Container Vulnerability Scanner Configuration
# Version: 1.0.0
# Updated: 2026-04-06

# Scan targets
format: table
quiet: false
debug: false
verbose: false
color: auto

# Severity thresholds
severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
security-checks:
  - vuln        # Vulnerability scanning
  - config      # Misconfiguration scanning
  - secret      # Secret scanning

# Vulnerability types
vuln-type:
  - os          # OS packages (alpine, debian, ubuntu, etc.)
  - library     # Language packages (pip, npm, gem, etc.)

# Ignore file
ignorefile: .trivyignore

# Exit code settings
exit-code: 0           # Always exit 0, handle severity in CI/CD
limit-cves: 500        # Max CVEs to report per image

# Scan settings
scan:
  scanners:
    - vuln      # Vulnerability scanner
    - misconf   # Misconfiguration scanner
    - secret    # Secret scanner
  timeout: 15m         # Scan timeout
  offline-scan: false   # Requires database

# Database settings
db:
  repository: public.ecr.aws/aquasecurity/trivy-db:latest
  # For air-gapped environments, use self-hosted mirror:
  # repository: your-private-registry.com/trivy-db
  cache-dir: /tmp/trivy-cache
  skip-update: false    # Set to true for air-gapped environments
  offline-repository: false

# Cache settings
cache:
  backend: fs          # Filesystem cache
  ttl: 24h             # Cache TTL

# Image scanning settings
image:
  # Scan non-pullable images
  non-unique-ports: false

  # Registry authentication
  registry:
    # Path to credentials file
    # credentials-file: ~/.docker/config.json

  # Aqua Source License (for commercial features)
  # aqua:

# Filesystem scanning
fs:
  # Paths to scan
  paths:
    - ./
  # Skip files/directories
  skip-files:
    - "*.test.js"
    - "*.test.py"
    - "node_modules/"
    - "__pycache__/"
    - ".git/"

# Repository scanning
repo:
  # Scan private repositories
  # ca-cert:

# Remote scanning
remote:
  # URL of the Trivy server
  # server: http://trivy-server:8080

# SBOM settings
sbom:
  # Format: spdx-json, spdx-tag, cyclonedx-json, cyclonedx-xml
  format: spdx-json
  # Include non-secret info
  include-non-secret: true
  # Aggregate effects
  aggregate: true

# Report settings
report:
  # Output format: table, json, sarif, cyclonedx, spdx-json, spdx-tag, github, cosine
  format: table
  # Include non-secret info in JSON output
  include-non-secret: true
  # Columns to display in table format
  # columns:
  #   - Severity
  #   - Package
  #   - Installed
  #   - Fixed
  #   - Vuln ID
  #   - Title
  # Truncate output
  output: ""
  # Write to file instead of stdout
  template: ""
  # Exit with this code regardless of results
  exit-code: "0"

# Compliance checks
compliance:
  # NIST SP 800-190
  # NIST SSDF
  # ISO/IEC 27001
  # SOC 2
  # PCI DSS 3.2.1
  # HIPAA
  docker-bench: ""
