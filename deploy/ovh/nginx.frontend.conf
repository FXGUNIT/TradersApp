server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header Cache-Control "public, max-age=300";

  location = /health {
    access_log off;
    default_type text/plain;
    return 200 "ok";
  }

  location /assets/ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, immutable";
  }

  location ^~ /@fs/ {
    return 404;
  }

  location ^~ /@vite/ {
    return 404;
  }

  location ~ /\.(?!well-known/) {
    return 404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
