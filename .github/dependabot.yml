version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      frontend:
        dependency-type: "direct"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "pip"
    directory: "/ml-engine"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      ml:
        dependency-type: "direct"
        update-types:
          - "minor"
          - "patch"
