name: Verify Contabo Public Deploy

on:
  workflow_dispatch:
    inputs:
      frontend_host:
        description: "Frontend public host"
        required: false
        default: "tradergunit.is-a.dev"
      bff_host:
        description: "BFF public host"
        required: false
        default: "bff.tradergunit.is-a.dev"
      api_host:
        description: "ML Engine public host"
        required: false
        default: "api.tradergunit.is-a.dev"
      timeout_seconds:
        description: "Probe timeout in seconds"
        required: false
        default: "15"
      with_k6:
        description: "Run the public-edge k6 suite after health checks"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    name: Verify Public Edge
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install k6
        if: ${{ inputs.with_k6 }}
        shell: bash
        run: |
          set -euo pipefail
          sudo gdebi install -n k6 2>/dev/null || \
            { curl -fsSL https://github.com/grafana/k6/releases/download/v0.55.0/k6-v0.55.0-linux-amd64.tar.gz \
              | sudo tar -xz -C /usr/local/bin k6-v0.55.0-linux-amd64/k6 --strip-components=1; }

      - name: Run public verification
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .artifacts/contabo
          args=(
            --frontend-host "${{ inputs.frontend_host }}"
            --bff-host "${{ inputs.bff_host }}"
            --api-host "${{ inputs.api_host }}"
            --timeout "${{ inputs.timeout_seconds }}"
            --output ".artifacts/contabo/public-readiness-${{ github.run_id }}.json"
          )

          if [ "${{ inputs.with_k6 }}" = "true" ]; then
            args+=(--with-k6)
          fi

          python scripts/contabo/verify_public_deploy.py "${args[@]}"

      - name: Summarize verification report
        if: always()
        id: public_summary
        shell: bash
        run: |
          set -euo pipefail
          python scripts/contabo/summarize_public_report.py \
            --input ".artifacts/contabo/public-readiness-${{ github.run_id }}.json" \
            --markdown-out ".artifacts/contabo/public-summary-${{ github.run_id }}.md" \
            --step-summary "${GITHUB_STEP_SUMMARY}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Upload verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contabo-public-verification-${{ github.run_id }}
          path: |
            .artifacts/contabo/
            .artifacts/k6-slo-*/
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 14

      - name: Send verification alert
        if: always()
        shell: bash
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          STATUS="success"
          TITLE="Contabo public verification passed"
          BODY="Frontend: https://${{ inputs.frontend_host }} | BFF: https://${{ inputs.bff_host }}/health | API: https://${{ inputs.api_host }}/health"

          if [ "${{ job.status }}" != "success" ]; then
            STATUS="error"
            TITLE="Contabo public verification failed"
            BODY="Failed checks: ${{ steps.public_summary.outputs.failed_checks || 'unknown' }} | Artifact: contabo-public-verification-${{ github.run_id }}"
          elif [ "${{ steps.public_summary.outputs.load_thresholds_state || 'not_run' }}" = "fail" ]; then
            STATUS="warning"
            TITLE="Contabo public verification passed but k6 thresholds breached"
            BODY="Artifact: contabo-public-verification-${{ github.run_id }} | Review k6 summary for the current fallback baseline."
          fi

          python scripts/ci/send_webhook_alert.py \
            --status "${STATUS}" \
            --title "${TITLE}" \
            --body "${BODY}" \
            --run-url "${RUN_URL}"

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Contabo public verification"
            echo ""
            echo "- Frontend: \`https://${{ inputs.frontend_host }}\`"
            echo "- BFF health: \`https://${{ inputs.bff_host }}/health\`"
            echo "- API health: \`https://${{ inputs.api_host }}/health\`"
            echo "- k6 suite: \`${{ inputs.with_k6 }}\`"
            echo "- Artifact: \`contabo-public-verification-${{ github.run_id }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
