name: Test Cloudflare Token Scopes

on:
  workflow_dispatch:

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  diagnose-token:
    name: Diagnose Token Scopes
    runs-on: ubuntu-latest
    steps:
      - name: Test token against multiple CF endpoints
        run: |
          echo "=== Token /user/tokens/verify ==="
          curl -s "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" | python3 -c "import json,sys; d=json.load(sys.stdin); print(json.dumps(d, indent=2))"

          echo ""
          echo "=== Token /accounts/$CLOUDFLARE_ACCOUNT_ID ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" | python3 -c "import json,sys; d=json.load(sys.stdin); print('success:', d.get('success')); print('account name:', d.get('result',{}).get('name') if d.get('result') else 'N/A'); print('errors:', d.get('errors'))"

          echo ""
          echo "=== Token /accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" | python3 -c "import json,sys; d=json.load(sys.stdin); print('success:', d.get('success')); print('errors:', d.get('errors')); print('result count:', len(d.get('result',[]) or []))"

          echo ""
          echo "=== Token /accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" | python3 -c "import json,sys; d=json.load(sys.stdin); print('success:', d.get('success')); print('errors:', d.get('errors')); print('result count:', len(d.get('result',[]) or []))"
