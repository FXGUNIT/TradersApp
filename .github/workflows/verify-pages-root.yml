name: Verify Pages Root Runtime

on:
  workflow_dispatch:
    inputs:
      frontend_host:
        description: "Canonical public frontend host"
        required: false
        default: "tradergunit.pages.dev"
      bff_host:
        description: "Public BFF host"
        required: false
        default: "bff.173.249.18.14.sslip.io"
      api_host:
        description: "Public API host"
        required: false
        default: "api.173.249.18.14.sslip.io"
      timeout_seconds:
        description: "Probe timeout in seconds"
        required: false
        default: "15"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    name: Verify Pages Root Runtime
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify browser-rendered app shell
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .artifacts/pages-root
          node scripts/pages/verify_pages_root_browser.mjs \
            --url "https://tradergunit.pages.dev" \
            --output ".artifacts/pages-root/browser-${{ github.run_id }}.json"

      - name: Verify Pages root runtime
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .artifacts/pages-root
          python scripts/pages/verify_pages_root_runtime.py \
            --root-url "https://tradergunit.pages.dev" \
            --bff-base-url "https://${{ inputs.bff_host }}" \
            --api-base-url "https://${{ inputs.api_host }}" \
            --project-preview-url "https://${{ inputs.frontend_host }}/" \
            --timeout "${{ inputs.timeout_seconds }}" \
            --output ".artifacts/pages-root/verification-${{ github.run_id }}.json" \
            --step-summary "${GITHUB_STEP_SUMMARY}"

      - name: Summarize Pages verification report
        if: always()
        id: pages_summary
        shell: bash
        run: |
          set -euo pipefail
          python scripts/pages/summarize_pages_root_report.py \
            --input ".artifacts/pages-root/verification-${{ github.run_id }}.json" \
            --browser-input ".artifacts/pages-root/browser-${{ github.run_id }}.json" \
            --markdown-out ".artifacts/pages-root/summary-${{ github.run_id }}.md" \
            --step-summary "${GITHUB_STEP_SUMMARY}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Upload verification artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pages-root-verification-${{ github.run_id }}
          path: .artifacts/pages-root/
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 14

      - name: Send verification alert
        if: always()
        shell: bash
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          STATUS="success"
          TITLE="Pages root verification passed"
          BODY="Root: https://tradergunit.pages.dev | Public frontend: https://${{ inputs.frontend_host }}/ | BFF: https://${{ inputs.bff_host }}/health | API: https://${{ inputs.api_host }}/health"

          if [ "${{ job.status }}" != "success" ]; then
            STATUS="error"
            TITLE="Pages root verification failed"
            BODY="Failed checks: ${{ steps.pages_summary.outputs.failed_checks || 'unknown' }} | Artifact: pages-root-verification-${{ github.run_id }}"
          elif [ "${{ steps.pages_summary.outputs.overall_status || 'success' }}" = "warning" ]; then
            STATUS="warning"
            TITLE="Pages root verification passed with fallback hosts"
            BODY="Artifact: pages-root-verification-${{ github.run_id }} | Fallback used: ${{ steps.pages_summary.outputs.fallback_used || 'false' }} | Runtime fallback hosts: ${{ steps.pages_summary.outputs.runtime_fallback_hosts || 'false' }}"
          fi

          python scripts/ci/send_webhook_alert.py \
            --status "${STATUS}" \
            --title "${TITLE}" \
            --body "${BODY}" \
            --run-url "${RUN_URL}"
