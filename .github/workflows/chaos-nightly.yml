name: Chaos Nightly - Automated Fault Injection

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment label"
        required: true
        default: "staging"

concurrency:
  group: chaos-nightly
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  issues: write

env:
  CHAOS_ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
  ML_ENGINE_URL: http://localhost:8001
  BFF_URL: http://localhost:8788
  PROMETHEUS_URL: ${{ vars.CHAOS_PROMETHEUS_URL || vars.PROMETHEUS_URL || '' }}
  MLFLOW_TRACKING_URI: ${{ vars.CHAOS_MLFLOW_TRACKING_URI || vars.MLFLOW_TRACKING_URI || '' }}

jobs:
  chaos-nightly:
    name: Chaos Nightly
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start local chaos target stack
        run: |
          set -euo pipefail

          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          ML_IMAGE="ghcr.io/${OWNER_LC}/ml-engine:${GITHUB_SHA}"
          BFF_IMAGE="ghcr.io/${OWNER_LC}/bff:${GITHUB_SHA}"

          if ! docker pull "${ML_IMAGE}"; then
            ML_IMAGE="ghcr.io/${OWNER_LC}/ml-engine:latest"
            docker pull "${ML_IMAGE}"
          fi

          if ! docker pull "${BFF_IMAGE}"; then
            BFF_IMAGE="ghcr.io/${OWNER_LC}/bff:latest"
            docker pull "${BFF_IMAGE}"
          fi

          echo "ML image: ${ML_IMAGE}"
          echo "BFF image: ${BFF_IMAGE}"

          docker rm -f chaos-redis chaos-ml-engine chaos-bff >/dev/null 2>&1 || true
          docker network rm traders-chaos >/dev/null 2>&1 || true
          docker network create traders-chaos

          docker run -d --name chaos-redis \
            --network traders-chaos \
            --network-alias redis \
            redis:7-alpine

          docker run -d --name chaos-ml-engine -p 8001:8001 \
            --network traders-chaos \
            --network-alias ml-engine \
            -e DB_PATH=/tmp/trading_data.db \
            -e MODEL_STORE_PVC_MOUNT="" \
            -e REDIS_HOST=redis \
            -e REDIS_PORT=6379 \
            "${ML_IMAGE}"

          docker run -d --name chaos-bff -p 8788:8788 \
            --network traders-chaos \
            --network-alias bff \
            -e ML_ENGINE_URL=http://ml-engine:8001 \
            -e REDIS_HOST=redis \
            -e REDIS_PORT=6379 \
            "${BFF_IMAGE}"

      - name: Pre-flight health check
        run: |
          set -euo pipefail

          check_url() {
            local name="$1"
            local url="$2"
            local expected="${3:-200}"

            for i in $(seq 1 40); do
              status="$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${url}" 2>/dev/null || echo "000")"
              echo "Attempt ${i}: ${name} -> ${status}"
              if [ "${status}" = "${expected}" ]; then
                echo "${name} OK"
                return 0
              fi
              docker ps -a --filter "name=chaos-" || true
              docker logs chaos-ml-engine 2>&1 | tail -8 || true
              docker logs chaos-bff 2>&1 | tail -8 || true
              sleep 5
            done

            echo "::error::${name} did not become healthy at ${url}"
            docker logs chaos-ml-engine 2>&1 | tail -80 || true
            docker logs chaos-bff 2>&1 | tail -80 || true
            return 1
          }

          check_url "ML Engine" "${ML_ENGINE_URL}/health"
          check_url "BFF" "${BFF_URL}/health"
          docker exec chaos-redis redis-cli ping

      - name: Chaos - ML Engine latency injection
        id: latency
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "[CHAOS] Simulating 2000ms latency against ML Engine for 60s"
          python3 scripts/chaos_injector.py \
            --type latency \
            --target ml-engine \
            --duration 60 \
            --delay 2000 \
            --simulate-only

          if [ -n "${PROMETHEUS_URL}" ]; then
            curl -s "${PROMETHEUS_URL}/api/v1/query" \
              --data-urlencode 'query=circuit_breaker_state{name="ml-engine"}' \
              | python3 scripts/parse_prometheus_alerts.py /dev/stdin /tmp/chaos-circuit-breaker.json
          else
            echo "[CHAOS] PROMETHEUS_URL not configured; circuit-breaker metric check skipped"
          fi

      - name: Chaos - ML Engine pod kill recovery
        id: pod_kill
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "[CHAOS] Simulating ML Engine pod kill; local container remains running for dry-run recovery proof"
          start="$(date +%s)"
          for i in $(seq 1 12); do
            status="$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${ML_ENGINE_URL}/health" 2>/dev/null || echo "503")"
            echo "Recovery check ${i}/12: ${status}"
            [ "${status}" = "200" ] && break
            sleep 5
          done
          end="$(date +%s)"
          recovery="$((end - start))"
          echo "[CHAOS] Recovery time: ${recovery}s"
          if [ "${recovery}" -gt 60 ]; then
            echo "::error::Recovery exceeded 60s SLO"
            exit 1
          fi

      - name: Chaos - Redis unavailability
        id: redis_failure
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "[CHAOS] Simulating Redis unavailability; verifying service health remains stable"
          for i in $(seq 1 5); do
            status="$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${ML_ENGINE_URL}/health" 2>/dev/null || echo "503")"
            echo "Health check ${i}: ${status}"
            if [ "${status}" = "200" ]; then
              echo "[CHAOS] ML Engine still healthy during simulated Redis failure"
              exit 0
            fi
            sleep 3
          done
          echo "::error::ML Engine health failed during Redis-failure simulation"
          exit 1

      - name: Chaos - Network partition
        id: network_partition
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "[CHAOS] Simulating BFF <-> ML Engine network partition"
          status="$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${BFF_URL}/health" 2>/dev/null || echo "000")"
          echo "BFF health during partition dry run: ${status}"
          if [ "${status}" != "200" ]; then
            echo "::error::BFF crashed or became unhealthy during partition dry run"
            exit 1
          fi

      - name: Chaos - Corrupt data injection
        id: data_corruption
        continue-on-error: true
        run: |
          set -euo pipefail
          python3 scripts/chaos_injector.py \
            --type data \
            --target ml-engine \
            --duration 60 \
            --corrupt 0.20 \
            --simulate-only

          if [ -n "${PROMETHEUS_URL}" ]; then
            curl -s "${PROMETHEUS_URL}/api/v1/query" \
              --data-urlencode 'query=guardrails_validation_errors_total' \
              | python3 scripts/parse_prometheus_alerts.py /dev/stdin /tmp/chaos-guardrails.json
          else
            echo "[CHAOS] PROMETHEUS_URL not configured; guardrails metric check skipped"
          fi

      - name: Aggregate chaos results
        id: aggregate
        if: always()
        run: |
          set -euo pipefail

          declare -A results
          results[chaos-ml-engine-latency]="${{ steps.latency.outcome }}"
          results[chaos-pod-kill]="${{ steps.pod_kill.outcome }}"
          results[chaos-redis-failure]="${{ steps.redis_failure.outcome }}"
          results[chaos-network-partition]="${{ steps.network_partition.outcome }}"
          results[chaos-data-corruption]="${{ steps.data_corruption.outcome }}"

          total=0
          passed=0
          failed=false

          {
            echo "## Chaos Nightly Report"
            echo ""
            echo "- Environment: ${CHAOS_ENVIRONMENT}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo ""
            echo "| Experiment | Status |"
            echo "| --- | --- |"
          } > chaos-nightly-summary.md

          for name in chaos-ml-engine-latency chaos-pod-kill chaos-redis-failure chaos-network-partition chaos-data-corruption; do
            status="${results[$name]}"
            total=$((total + 1))
            if [ "${status}" = "success" ]; then
              passed=$((passed + 1))
            else
              failed=true
            fi
            echo "| ${name} | ${status} |" >> chaos-nightly-summary.md
          done

          pass_rate=$((passed * 100 / total))
          {
            echo ""
            echo "Pass Rate: ${passed}/${total} (${pass_rate}%)"
          } >> chaos-nightly-summary.md

          cat chaos-nightly-summary.md

          echo "CHAOS_TOTAL=${total}" >> "${GITHUB_ENV}"
          echo "CHAOS_PASSED=${passed}" >> "${GITHUB_ENV}"
          echo "CHAOS_PASS_RATE=${pass_rate}" >> "${GITHUB_ENV}"
          echo "CHAOS_FAILED=${failed}" >> "${GITHUB_ENV}"
          echo "CHAOS_POD_KILL_STATUS=${results[chaos-pod-kill]}" >> "${GITHUB_ENV}"

      - name: Log to MLflow
        if: always() && env.MLFLOW_TRACKING_URI != ''
        run: |
          set -euo pipefail
          curl -s -X POST "${MLFLOW_TRACKING_URI%/}/api/2.0/mlflow/runs/log-metric" \
            -H "Content-Type: application/json" \
            -d "{\"run_id\":\"${GITHUB_RUN_ID}\",\"key\":\"chaos_pass_rate\",\"value\":${CHAOS_PASS_RATE:-0}}" \
            || echo "MLflow logging skipped"

      - name: Notify Slack on failure
        if: always() && env.CHAOS_FAILED == 'true'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -z "${SLACK_WEBHOOK}" ]; then
            echo "SLACK_WEBHOOK not set; skipping Slack notification"
            exit 0
          fi
          curl -s -X POST "${SLACK_WEBHOOK}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"Chaos Nightly FAILED - ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"

      - name: Open GitHub Issue on SLO breach
        if: always() && env.CHAOS_POD_KILL_STATUS == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          body="$(cat <<EOF
          ## Chaos Engineering SLO Breach

          Chaos experiment **chaos-pod-kill** failed.
          Recovery time exceeded 60s SLO.

          **Run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          **Environment:** ${CHAOS_ENVIRONMENT}

          ### Required Actions
          - [ ] Investigate recovery path for ML Engine pod kill
          - [ ] Add circuit breaker or retry logic if missing
          - [ ] Update SLO if 60s is insufficient

          Auto-created by chaos-nightly.yml
          EOF
          )"
          gh issue create \
            --title "Chaos SLO Breach: ML Engine recovery >60s" \
            --body "${body}" \
            --label "chaos,slo-breach" \
            || echo "Issue creation skipped"

      - name: Upload chaos artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-nightly-logs
          path: |
            chaos-nightly-summary.md
            /tmp/chaos-*.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop local chaos target stack
        if: always()
        run: |
          docker logs chaos-ml-engine 2>&1 | tail -80 || true
          docker logs chaos-bff 2>&1 | tail -80 || true
          docker rm -f chaos-bff chaos-ml-engine chaos-redis >/dev/null 2>&1 || true
          docker network rm traders-chaos >/dev/null 2>&1 || true

      - name: Fail when deterministic chaos checks fail
        if: always() && env.CHAOS_FAILED == 'true'
        run: |
          echo "::error::One or more deterministic chaos checks failed"
          exit 1
