name: Setup and Deploy BFF Proxy Worker

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  setup-and-deploy:
    name: Setup CF Account ID + Deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Account ID from Pages API
        id: account
        run: |
          echo "=== Extracting Account ID from Pages API ==="
          # Try account ID from secret first
          for ACCT in "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ""; do
            if [ -z "$ACCT" ] || [ "$ACCT" = "CLOUDFLARE_ACCOUNT_ID" ]; then
              continue
            fi
            RESP=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$ACCT/pages/projects" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json")
            if echo "$RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if d.get('success') else 1)" 2>/dev/null; then
              echo "Found valid Account ID from secret: $ACCT"
              echo "account_id=$ACCT" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          # If secret didn't work, try the Workers API zone listing as fallback
          echo "Trying Workers zones API as fallback..."
          ZONE_RESP=$(curl -s "https://api.cloudflare.com/client/v4/zones" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json")
          if echo "$ZONE_RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if d.get('success') else 1)" 2>/dev/null; then
            ZONE_ID=$(echo "$ZONE_RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); r=d.get('result',[]); print(r[0].get('account',{}).get('id','') if r else '')" 2>/dev/null)
            if [ -n "$ZONE_ID" ]; then
              echo "Found Account ID from zones API: $ZONE_ID"
              echo "account_id=$ZONE_ID" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "ERROR: Could not determine Cloudflare Account ID from any API"
          exit 1

      - name: Save Account ID as GitHub Actions variable
        run: |
          echo "=== Saving Account ID as GitHub Actions variable ==="
          if gh api repos/FXGUNIT/TradersApp/actions/variables/CLOUDFLARE_ACCOUNT_ID -X GET 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if d.get('name') else 1)"; then
            gh api repos/FXGUNIT/TradersApp/actions/variables/CLOUDFLARE_ACCOUNT_ID -X PATCH \
              -H "Content-Type: application/json" \
              --field value="${{ steps.account.outputs.account_id }}" 2>&1
          else
            gh api repos/FXGUNIT/TradersApp/actions/variables -X POST \
              -H "Content-Type: application/json" \
              --field name=CLOUDFLARE_ACCOUNT_ID \
              --field value="${{ steps.account.outputs.account_id }}" 2>&1
          fi
          echo "Saved CLOUDFLARE_ACCOUNT_ID = ${{ steps.account.outputs.account_id }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check Workers API access with discovered Account ID
        run: |
          echo "=== Testing Workers API access with Account ID ${{ steps.account.outputs.account_id }} ==="
          RESP=$(curl -s "https://api.cloudflare.com/client/v4/accounts/${{ steps.account.outputs.account_id }}/workers/scripts" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json")
          echo "$RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); print('Workers API success:', d.get('success')); print('Errors:', d.get('errors') or [])"
          echo ""

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Deploy Worker
        run: |
          echo "=== Attempting Worker deploy ==="
          cd deploy/cloudflare-tunnel/bff-worker
          CLOUDFLARE_ACCOUNT_ID="${{ steps.account.outputs.account_id }}" \
          CLOUDFLARE_API_TOKEN="$CLOUDFLARE_API_TOKEN" \
          npx wrangler deploy --name tradersapp-bff-proxy --env production 2>&1
