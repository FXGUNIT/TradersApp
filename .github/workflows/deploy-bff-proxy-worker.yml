name: Setup and Deploy BFF Proxy Worker

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  CLOUDFLARE_GLOBAL_KEY: ${{ secrets.CLOUDFLARE_GLOBAL_KEY }}
  CLOUDFLARE_EMAIL:      ${{ secrets.CLOUDFLARE_EMAIL }}

jobs:
  deploy-worker:
    name: Deploy BFF Proxy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Worker via Workers Scripts API
        run: |
          ACCOUNT_ID="0f779fe4981d424548a48856cc9139db"
          WORKER_NAME="tradersapp-bff-proxy"

          echo "=== Deploying BFF Proxy Worker ==="
          echo "Account: $ACCOUNT_ID"
          echo "Worker: $WORKER_NAME"
          echo ""

          echo "=== Uploading script (PUT /workers/scripts/{name}/content) ==="
          RESP=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/content" \
            -H "X-Auth-Email: ${CLOUDFLARE_EMAIL}" \
            -H "X-Auth-Key: ${CLOUDFLARE_GLOBAL_KEY}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@deploy/cloudflare-tunnel/bff-worker/index.js")
          echo "$RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); print('Deploy success:', d.get('success')); [print('ERROR:', e.get('message', e)) for e in (d.get('errors') or [])]; [print('OK:', w.get('message', w)) for w in (d.get('messages') or [])]"
          echo ""

          if [ "$(echo '$RESP' | python3 -c 'import json,sys; print(json.load(sys.stdin).get(\"success\"))')" = "True" ]; then
            echo "=== Worker deployed successfully ==="
          else
            echo "=== Deploy failed ==="
            exit 1
          fi
