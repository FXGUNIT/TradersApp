name: Setup and Deploy BFF Proxy Worker

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_EMAIL:     ${{ secrets.CLOUDFLARE_EMAIL }}

jobs:
  deploy-worker:
    name: Deploy BFF Proxy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Deploy Worker via Wrangler v3
        run: |
          set -euo pipefail
          cd deploy/cloudflare-tunnel/bff-worker

          echo "=== Deploying BFF Proxy Worker ==="
          echo "Worker URL: https://tradersapp-bff-proxy.gunitsingh1994.workers.dev"

          # Wrangler v3 authenticates via CLOUDFLARE_API_TOKEN env var directly.
          # It does NOT call /user/tokens/verify (Wrangler v4 does, which blocks cfat_ tokens).
          npx wrangler@3.103.0 deploy \
            --name tradersapp-bff-proxy

          echo ""
          echo "=== Worker deployed successfully ==="
          echo "URL: https://tradersapp-bff-proxy.gunitsingh1994.workers.dev"