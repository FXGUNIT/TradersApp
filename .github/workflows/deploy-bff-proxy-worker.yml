name: Setup and Deploy BFF Proxy Worker

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_EMAIL:     ${{ secrets.CLOUDFLARE_EMAIL }}

jobs:
  deploy-worker:
    name: Deploy BFF Proxy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover account ID from token
        id: discover
        run: |
          echo "=== Discovering Cloudflare account ID ==="
          # cfat_ tokens: use the full raw token value (including cfat_ prefix)
          # in Authorization: Bearer header — Cloudflare's gateway decodes it
          BEARER_TOKEN="${CLOUDFLARE_API_TOKEN}"
          RESP=$(curl -s "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer ${BEARER_TOKEN}" \
            -H "X-Auth-Email: ${CLOUDFLARE_EMAIL}")
          echo "Token verify: $RESP"

          SUCCESS=$(echo "$RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('success'))")
          if [ "$SUCCESS" != "True" ]; then
            echo "Token verification failed"
            exit 1
          fi

          # Get account ID from accounts list
          ACCOUNTS=$(curl -s "https://api.cloudflare.com/client/v4/accounts" \
            -H "Authorization: Bearer ${BEARER_TOKEN}" \
            -H "X-Auth-Email: ${CLOUDFLARE_EMAIL}")
          echo "Accounts response: $ACCOUNTS"
          ACCOUNT_ID=$(echo "$ACCOUNTS" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('result', [{}])[0].get('id',''))" 2>/dev/null)
          echo "ACCOUNT_ID=$ACCOUNT_ID"

          if [ -z "$ACCOUNT_ID" ]; then
            echo "Could not determine account ID"
            exit 1
          fi

          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      - name: Deploy Worker via Workers Scripts API
        run: |
          ACCOUNT_ID="${{ steps.discover.outputs.account_id }}"
          WORKER_NAME="tradersapp-bff-proxy"

          echo "=== Deploying BFF Proxy Worker ==="
          echo "Account: $ACCOUNT_ID"
          echo "Worker: $WORKER_NAME"

          echo "=== Uploading script (PUT /workers/scripts/{name}/content) ==="
          RESP=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X PUT "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/content" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "X-Auth-Email: ${CLOUDFLARE_EMAIL}" \
            -H "Content-Type: application/javascript" \
            --data-binary "@deploy/cloudflare-tunnel/bff-worker/index.js")
          HTTP_CODE=$(echo "$RESP" | tail -1 | cut -d: -f2)
          BODY=$(echo "$RESP" | sed '$d')
          echo "HTTP_CODE: $HTTP_CODE"
          echo "BODY: $BODY"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "=== Worker deployed successfully ==="
          else
            echo "=== Deploy failed ==="
            exit 1
          fi