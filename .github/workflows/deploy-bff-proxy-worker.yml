name: Setup and Deploy BFF Proxy Worker

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_EMAIL:     ${{ secrets.CLOUDFLARE_EMAIL }}

jobs:
  deploy-worker:
    name: Deploy BFF Proxy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Deploy Worker via Wrangler v3
        run: |
          set -euo pipefail
          cd deploy/cloudflare-tunnel/bff-worker

          echo "=== Deploying BFF Proxy Worker ==="
          echo "Worker URL: https://tradersapp-bff-proxy.\${CLOUDFLARE_WORKERS_SUBDOMAIN}.workers.dev"

          # Wrangler v3 doesn't call /user/tokens/verify — works with cfat_ tokens
          # Use --nodejs flag to explicitly bundle without ES module validation
          npx wrangler@3.103.0 deploy \
            --name tradersapp-bff-proxy \
            --no-bundle

          echo "=== Worker deployed successfully ==="