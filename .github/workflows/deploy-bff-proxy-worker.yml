name: Setup and Deploy BFF Proxy Worker

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  GH_TOKEN: ${{ github.token }}

jobs:
  setup-and-deploy:
    name: Setup CF Account ID + Deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Worker
        run: |
          echo "=== Deploying BFF Proxy Worker ==="
          echo "Account ID: 0f779fe4981d424548a48856cc9139db"
          echo "Worker: tradersapp-bff-proxy"
          echo "Token scopes: Workers Scripts Write"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check Workers API access
        run: |
          echo "=== Testing Workers API ==="
          RESP=$(curl -s "https://api.cloudflare.com/client/v4/accounts/0f779fe4981d424548a48856cc9139db/workers/scripts" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          echo "$RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); print('Workers API success:', d.get('success')); print('Errors:', d.get('errors') or [])"
          echo ""

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Deploy Worker
        run: |
          echo "=== Deploying BFF Proxy Worker ==="
          echo "Account ID: 0f779fe4981d424548a48856cc9139db"
          echo "Worker: tradersapp-bff-proxy"
          echo "Token scopes: Workers Scripts Write"
          cd deploy/cloudflare-tunnel/bff-worker
          CLOUDFLARE_ACCOUNT_ID="0f779fe4981d424548a48856cc9139db" \
          npx wrangler deploy --name tradersapp-bff-proxy 2>&1
