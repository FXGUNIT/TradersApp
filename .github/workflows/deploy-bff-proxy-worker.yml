name: Setup and Deploy BFF Proxy Worker

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  GH_TOKEN: ${{ github.token }}

jobs:
  setup-and-deploy:
    name: Setup CF Account ID + Deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Worker
        run: |
          echo "=== Deploying BFF Proxy Worker ==="
          echo "Account ID: 0f779fe4981d424548a48856cc9139db"
          echo "Worker: tradersapp-bff-proxy"
          echo "Token scopes: Workers Scripts Write"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check Workers API access with discovered Account ID
        run: |
          echo "=== Testing Workers API access with Account ID ${{ steps.account.outputs.account_id }} ==="
          RESP=$(curl -s "https://api.cloudflare.com/client/v4/accounts/${{ steps.account.outputs.account_id }}/workers/scripts" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json")
          echo "$RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); print('Workers API success:', d.get('success')); print('Errors:', d.get('errors') or [])"
          echo ""

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Deploy Worker
        run: |
          echo "=== Attempting Worker deploy ==="
          cd deploy/cloudflare-tunnel/bff-worker
          CLOUDFLARE_ACCOUNT_ID="${{ steps.account.outputs.account_id }}" \
          CLOUDFLARE_API_TOKEN="$CLOUDFLARE_API_TOKEN" \
          npx wrangler deploy --name tradersapp-bff-proxy --env production 2>&1
