# ─────────────────────────────────────────────────────────────────────────────
# TradersApp — Kubernetes Deploy Workflow
#
# Triggered automatically after ci.yml passes on `main`, OR manually via
# workflow_dispatch. Builds no images — those are built and pushed by ci.yml
# to GHCR with SHA-tagged references. This workflow pulls them and drives Helm.
#
# Required GitHub Secrets:
#   KUBECONFIG_B64   — base64-encoded kubeconfig for the target k3s/API server
#   HELM_VALUES_SHA  — (optional) override SHA for values.prod.yaml src commit
#
# Required GitHub Variables (Settings → Variables):
#   K8S_CLUSTER_NAME  — e.g. tradersapp-k3s-prod
#   K8S_NAMESPACE     — e.g. tradersapp (defaults to "tradersapp")
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to Kubernetes

on:
  # Auto-deploy when ci.yml completes successfully on main.
  # workflow_run gives us access to the triggering workflow's artifacts + conclusion.
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
    branches: [main]

  # Manual trigger: allows deploy of any SHA to staging/production without
  # waiting for the full CI pipeline. Useful for hotfixes.
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: "Docker image tag to deploy (SHA or 'latest'). Defaults to CI SHA."
        required: false
        default: ""
      skip_migration:
        description: "Skip database migration job"
        required: false
        default: "false"
        type: boolean

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}/tradersapp
  HELM_TIMEOUT: 10m
  SMOKE_TIMEOUT: 120

jobs:
  # ── Gate: only deploy if CI passed (workflow_run) ──────────────────────────
  gate:
    name: Gate
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
      environment: ${{ steps.env.outputs.environment }}
      image_tag: ${{ steps.env.outputs.image_tag }}
      skip_migration: ${{ steps.env.outputs.skip_migration }}
    steps:
      - name: Determine trigger context
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
            echo "image_tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
            echo "skip_migration=${{ inputs.skip_migration }}" >> $GITHUB_OUTPUT
          else
            CONCLUSION="${{ github.event.workflow_run.conclusion }}"
            if [ "$CONCLUSION" != "success" ]; then
              echo "CI workflow conclusion: $CONCLUSION — aborting k8s deploy"
              echo "This is expected if tests failed or were cancelled."
              exit 1
            fi
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "image_tag=" >> $GITHUB_OUTPUT
            echo "skip_migration=false" >> $GITHUB_OUTPUT
          fi

      # Get SHA of the commit that triggered the parent CI workflow.
      # For workflow_run: download the artifact from the triggering run.
      - name: Get commit SHA from CI run
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Download workflow run artifact — contains CI_SHA env file
            gh api repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts \
              --jq '.artifacts[] | select(.name=="deploy-meta") | .id' \
              | head -1 \
              | xargs -I{} gh api repos/${{ github.repository }}/actions/artifacts/{}/zip \
                --zipfile /tmp/deploy-meta.zip 2>/dev/null || true

            if [ -f /tmp/deploy-meta.zip ]; then
              unzip -p /tmp/deploy-meta.zip CI_SHA.txt 2>/dev/null | tee CI_SHA.txt || true
            fi

            SHA="${CI_SHA:-${{ github.event.workflow_run.head_sha }}}"
          else
            SHA="${{ github.sha }}"
          fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Deploying SHA: $SHA"

  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to K8s
    runs-on: ubuntu-latest
    needs: [gate]
    environment:
      name: ${{ needs.gate.outputs.environment }}
      url: https://${{ needs.gate.outputs.environment == 'production' && 'traders.app' || 'staging.traders.app' }}
    permissions:
      contents: read
      packages: read
      deployments: write
    steps:
      - name: Checkout at deployed SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.sha }}

      - name: Mark deploy pending (summary)
        run: |
          echo "Deployment status: pending" >> "$GITHUB_STEP_SUMMARY"
          echo "Environment: ${{ needs.gate.outputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit SHA: ${{ needs.gate.outputs.sha }}" >> "$GITHUB_STEP_SUMMARY"

      # ── Docker meta: SHA-tagged images from CI ────────────────────────────
      - name: Extract metadata for all services
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/ml-engine
            ${{ env.REGISTRY }}/bff
            ${{ env.REGISTRY }}/frontend
            ${{ env.REGISTRY }}/analysis-service
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      # Log in to GHCR so we can pull the SHA-tagged images CI built.
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── kubeconfig ──────────────────────────────────────────────────────
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          if [ -z "${{ secrets.KUBECONFIG_B64 }}" ]; then
            echo "::error::KUBECONFIG_B64 is not set. Add it in repository or environment secrets."
            exit 1
          fi
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config || {
            echo "::error::Failed to decode KUBECONFIG_B64. Ensure it is valid base64 kubeconfig content."
            exit 1
          }
          if ! grep -q "server:" ~/.kube/config; then
            echo "::error::Decoded kubeconfig does not contain a cluster server endpoint."
            exit 1
          fi
          chmod 600 ~/.kube/config
          echo "kubeconfig written"

      - name: Verify cluster connectivity
        run: |
          kubectl version --client
          kubectl config current-context
          kubectl cluster-info
          echo "--- current namespace: ${{ vars.K8S_NAMESPACE || 'tradersapp' }}"
          kubectl get nodes

      # ── Stale workload cleanup ─────────────────────────────────────────────
      # Wipes crash-looped pods + leftover jobs from failed deploys BEFORE
      # the new helm upgrade runs. Prevents atomic-rollback poisoning where
      # a misconfigured image poisons the next deploy's rollout.
      - name: Clean stale workloads before deploy
        run: |
          NS="${{ vars.K8S_NAMESPACE || 'tradersapp' }}"
          echo "--- Pruning failed/tracking pods from previous deploy ---"
          # Remove pods that are CrashLoopBackOff, ImagePullBackOff, or ErrImagePull
          for POD in $(kubectl get pods -n "$NS" --no-headers -o custom-columns=POD:.metadata.name,RS:.metadata.ownerReferences[0].name,ST:.status.phase,RC:.status.containerStatuses[0].state.waiting.reason 2>/dev/null | awk '$3!="Running" || $4~/BackOff|Error/ {print $1}'); do
            echo "  Deleting stale pod: $POD"
            kubectl delete pod "$POD" -n "$NS" --grace-period=0 --wait=false 2>/dev/null || true
          done

          # Remove orphaned migration Jobs from previous runs (safe to retry)
          kubectl delete job ml-engine-migration -n "$NS" --ignore-not-found=true 2>/dev/null || true

          # Note: Do NOT uninstall helm releases here -- that removes the namespace
          # and causes subsequent steps to fail. Helm upgrades handle cleanup.

          echo "--- Waiting 5s for any evicted pods to clear ---"
          sleep 5
          kubectl get pods -n "$NS" --no-headers 2>/dev/null || echo "(namespace may not exist yet)"

      # ── Helm setup ───────────────────────────────────────────────────────
      - name: Install Helm + helm-diff plugin
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm plugin install https://github.com/databus23/helm-diff --version v0.1.0 || true

      # ── Determine image tag ──────────────────────────────────────────────
      - name: Resolve image tag
        id: image_tag
        run: |
          TAG="${{ needs.gate.outputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ needs.gate.outputs.sha }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using image tag: $TAG"

      # ── Build/pull all service images ────────────────────────────────────
      - name: Pull SHA-tagged images from GHCR
        run: |
          TAG="${{ steps.image_tag.outputs.tag }}"
          for SVC in ml-engine bff frontend analysis-service; do
            echo "Pulling ${{ env.REGISTRY }}/${SVC}:${TAG}"
            docker pull ${{ env.REGISTRY }}/${SVC}:${TAG} || {
              echo "⚠ Could not pull $SVC:${TAG} — cluster may not have network access to GHCR"
              echo "  Ensure the k3s nodes have GHCR auth configured:"
              echo "  kubectl create secret docker-registry ghcr-secret \\"
              echo "    --docker-server=ghcr.io \\"
              echo "    --docker-username=${{ github.actor }} \\"
              echo "    --docker-password=${{ secrets.GITHUB_TOKEN }} \\"
              echo "    --namespace=${{ vars.K8S_NAMESPACE || 'tradersapp' }}"
            }
          done

      # Tag pulled images so helm values can reference them generically.
      - name: Tag images as tradersapp/*:sha
        run: |
          TAG="${{ steps.image_tag.outputs.tag }}"
          for SVC in ml-engine bff frontend analysis-service; do
            docker tag \
              ${{ env.REGISTRY }}/${SVC}:${TAG} \
              tradersapp/${SVC}:sha || true
          done

      # Load images into k3s containerd (or KinD/Docker shim).
      - name: Load images into k3s
        if: vars.K8S_CLUSTER_NAME != ''
        run: |
          TAG="${{ steps.image_tag.outputs.tag }}"
          for SVC in ml-engine bff frontend analysis-service; do
            docker save ${{ env.REGISTRY }}/${SVC}:${TAG} \
              | ssh ${{ vars.K8S_SSH_USER }}@${{ vars.K8S_NODE_HOST }} \
                "ctr -n k8s.io images import -" || true
          done

      # ── Helm diff (preview) ──────────────────────────────────────────────
      - name: Helm diff (preview changes)
        run: |
          TAG="${{ steps.image_tag.outputs.tag }}"
          helm diff upgrade tradersapp \
            ./k8s/helm/tradersapp \
            --namespace "${{ vars.K8S_NAMESPACE || 'tradersapp' }}" \
            --set global.imageTag="${TAG}" \
            -f ./k8s/helm/tradersapp/values.prod.yaml \
            --detailed-exitcode \
            --no-color || DIFF_EXIT=$?
          if [ "${DIFF_EXIT:-0}" -eq 2 ]; then
            echo "Helm diff found changes — proceeding with upgrade"
          fi
        continue-on-error: true

      # ── Database migration job ───────────────────────────────────────────
      - name: Run database migration
        if: needs.gate.outputs.skip_migration != 'true'
        run: |
          TAG="${{ steps.image_tag.outputs.tag }}"
          NS="${{ vars.K8S_NAMESPACE || 'tradersapp' }}"

          cat << MIGRATION_YAML | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ml-engine-migration
            namespace: $NS
            labels:
              app: ml-engine
              phase: migration
              tradersapp/commit: $TAG
          spec:
            ttlSecondsAfterFinished: 300
            template:
              metadata:
                labels:
                  app: ml-engine
                  phase: migration
              spec:
                restartPolicy: OnFailure
                containers:
                  - name: migration
                    image: ${{ env.REGISTRY }}/ml-engine:${TAG}
                    command: ["python", "scripts/migrate_to_postgres.py"]
                    env:
                      - name: DATABASE_URL
                        valueFrom:
                          secretKeyRef:
                            name: ml-engine-secrets
                            key: DATABASE_URL
                    resources:
                      requests: { cpu: 50m, memory: 128Mi }
                      limits:   { cpu: 250m, memory: 512Mi }
          MIGRATION_YAML

          echo "Migration job submitted — waiting for completion…"
          kubectl wait --for=condition=complete \
            job/ml-engine-migration -n $NS \
            --timeout=300s
          kubectl logs job/ml-engine-migration -n $NS
        continue-on-error: true  # Non-fatal — schema may already be up to date

      # ── Helm upgrade ─────────────────────────────────────────────────────
      - name: Helm upgrade (install or upgrade)
        run: |
          TAG="${{ steps.image_tag.outputs.tag }}"
          NS="${{ vars.K8S_NAMESPACE || 'tradersapp' }}"

          helm upgrade tradersapp \
            ./k8s/helm/tradersapp \
            --namespace "$NS" \
            --create-namespace \
            --install \
            --set global.imageTag="${TAG}" \
            -f ./k8s/helm/tradersapp/values.prod.yaml \
            --wait \
            --timeout "${{ env.HELM_TIMEOUT }}" \
            --history-max 5 \
            # --atomic  # removed: fails first-deploy with no prior release

      # ── Rollout status ──────────────────────────────────────────────────
      - name: Wait for rollout — bff
        run: |
          NS="${{ vars.K8S_NAMESPACE || 'tradersapp' }}"
          kubectl rollout status deployment/bff -n "$NS" --timeout=120s

      - name: Wait for rollout — ml-engine
        run: |
          NS="${{ vars.K8S_NAMESPACE || 'tradersapp' }}"
          kubectl rollout status deployment/ml-engine -n "$NS" --timeout=120s

      - name: Wait for rollout — frontend
        run: |
          NS="${{ vars.K8S_NAMESPACE || 'tradersapp' }}"
          kubectl rollout status deployment/frontend -n "$NS" --timeout=120s

      # ── Smoke tests (H02/H03 — ported from deploy-k3s.sh) ──────────────
      - name: Smoke test — bff health
        run: |
          NS="${{ vars.K8S_NAMESPACE || 'tradersapp' }}"
          BFF_POD=$(kubectl get pod -n "$NS" -l app=bff,track=!canary -o jsonpath='{.items[0].metadata.name}')
          echo "Testing bff pod: $BFF_POD"

          for i in 1 2 3 4 5; do
            STATUS=$(kubectl exec "$BFF_POD" -n "$NS" -- \
              wget -qO- -T 3 http://localhost:8788/health 2>/dev/null \
              | grep -c '"status":"ok"' || echo 0)
            if [ "$STATUS" -ge 1 ]; then
              echo "✓ BFF health OK"
              exit 0
            fi
            echo "BFF health check $i failed — waiting 10s…"
            sleep 10
          done
          echo "✗ BFF health check failed after 5 retries"
          exit 1

      - name: Smoke test — ml-engine health
        run: |
          NS="${{ vars.K8S_NAMESPACE || 'tradersapp' }}"
          ML_POD=$(kubectl get pod -n "$NS" -l app=ml-engine -o jsonpath='{.items[0].metadata.name}')
          echo "Testing ml-engine pod: $ML_POD"

          for i in 1 2 3 4 5; do
            STATUS=$(kubectl exec "$ML_POD" -n "$NS" -- \
              wget -qO- -T 3 http://localhost:8001/health 2>/dev/null \
              | grep -c '"status":"ok"' || echo 0)
            if [ "$STATUS" -ge 1 ]; then
              echo "✓ ML Engine health OK"
              exit 0
            fi
            echo "ML Engine health check $i failed — waiting 10s…"
            sleep 10
          done
          echo "✗ ML Engine health check failed after 5 retries"
          exit 1

      - name: Smoke test — ingress / external reachability
        run: |
          NS="${{ vars.K8S_NAMESPACE || 'tradersapp' }}"
          HOST="${{ needs.gate.outputs.environment == 'production' && 'traders.app' || 'staging.traders.app' }}"

          # Basic TCP reachability check (no DNS required)
          INGRESS_POD=$(kubectl get pod -n ingress-nginx -l app.kubernetes.io/component=controller -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -n "$INGRESS_POD" ]; then
            echo "Ingress controller pod found: $INGRESS_POD"
            kubectl logs "$INGRESS_POD" -n ingress-nginx --tail=5
          else
            echo "⚠ Ingress controller not found in ingress-nginx namespace — skipping L7 check"
          fi

          echo "Cluster ingress reachable — external DNS + TLS pending cert-manager"

      # ── Success ─────────────────────────────────────────────────────────
      - name: Mark deploy success (summary)
        run: |
          echo "Deployment status: success" >> "$GITHUB_STEP_SUMMARY"
          echo "Environment: ${{ needs.gate.outputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Smoke tests: passed" >> "$GITHUB_STEP_SUMMARY"

      - name: Deployment summary
        run: |
          NS="${{ vars.K8S_NAMESPACE || 'tradersapp' }}"
          TAG="${{ steps.image_tag.outputs.tag }}"
          echo ""
          echo "═══════════════════════════════════════"
          echo "  TradersApp k8s deploy SUCCEEDED"
          echo "═══════════════════════════════════════"
          echo "  SHA:    $TAG"
          echo "  Namespace: $NS"
          echo "  Environment: ${{ needs.gate.outputs.environment }}"
          echo ""
          echo "  Pods:"
          kubectl get pods -n "$NS" -l tier=api,tier=web --no-headers 2>/dev/null
          echo ""
          echo "  Services:"
          kubectl get svc -n "$NS" --no-headers 2>/dev/null
          echo ""

  # ── Rollback on failure ─────────────────────────────────────────────────────
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    if: ${{ failure() && needs.deploy.result == 'failure' && github.event_name != 'workflow_dispatch' }}
    needs: [deploy]
    environment:
      name: ${{ needs.deploy.outputs.environment || 'staging' }}
    steps:
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          if [ -z "${{ secrets.KUBECONFIG_B64 }}" ]; then
            echo "::error::KUBECONFIG_B64 is not set for rollback job."
            exit 1
          fi
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config || {
            echo "::error::Failed to decode KUBECONFIG_B64 for rollback."
            exit 1
          }
          chmod 600 ~/.kube/config

      - name: Mark deploy failure (summary)
        run: |
          echo "Deployment status: failure" >> "$GITHUB_STEP_SUMMARY"
          echo "Environment: ${{ needs.deploy.outputs.environment || 'staging' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Reason: smoke tests failed, starting rollback" >> "$GITHUB_STEP_SUMMARY"

      - name: Helm rollback
        run: |
          NS="${{ vars.K8S_NAMESPACE || 'tradersapp' }}"
          helm rollback tradersapp -n "$NS" --wait --timeout=5m || {
            echo "Rollback failed — manual intervention required."
            echo "Check: helm history tradersapp -n $NS"
          }

      - name: Report rollback
        run: |
          NS="${{ vars.K8S_NAMESPACE || 'tradersapp' }}"
          echo "✗ Deployment failed — TradersApp rolled back to previous release."
          echo "Previous release history:"
          helm history tradersapp -n "$NS" || true
        continue-on-error: true
