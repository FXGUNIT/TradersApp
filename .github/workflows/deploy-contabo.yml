name: Deploy to Contabo VPS

on:
  repository_dispatch:
    types: [deploy-contabo]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref or SHA to deploy"
        required: false
        default: ""
      image_tag:
        description: "Docker image tag to publish and deploy (defaults to commit SHA)"
        required: false
        default: ""
      compose_profiles:
        description: "Optional compose profiles such as mlops,observability"
        required: false
        default: "core"
      skip_bootstrap:
        description: "Skip remote bootstrap and only run the deploy step"
        required: false
        default: false
        type: boolean
      skip_build:
        description: "Skip Docker builds and deploy the selected image tag"
        required: false
        default: false
        type: boolean
      skip_public_verify:
        description: "Skip public DNS/TLS/HTTP verification after deploy"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Deploy Contabo VPS
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: deploy-contabo-production
      cancel-in-progress: false
    if: |
      vars.PRODUCTION_DEPLOY_PLATFORM == 'contabo' &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'repository_dispatch' ||
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main'
        )
      )
    environment:
      name: production
      url: https://traders.app

    steps:
      - name: Resolve deploy context
        id: context
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            REF="${{ github.event.workflow_run.head_sha }}"
            IMAGE_TAG="${{ github.event.workflow_run.head_sha }}"
            COMPOSE_PROFILES="${{ vars.CONTABO_COMPOSE_PROFILES || 'core' }}"
            # The VPS bootstrap is a one-time host provisioning step.
            # Automatic deploys should reuse the provisioned host and only
            # push/pull images plus restart the stack.
            SKIP_BOOTSTRAP="true"
            SKIP_BUILD="false"
            SKIP_PUBLIC_VERIFY="false"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            # Called by CI via repository_dispatch — use client_payload or fall back to GITHUB_SHA
            REF="${{ github.event.client_payload.ref || github.sha }}"
            IMAGE_TAG="${{ github.event.client_payload.image_tag || github.sha }}"
            COMPOSE_PROFILES="${{ vars.CONTABO_COMPOSE_PROFILES || 'core' }}"
            SKIP_BOOTSTRAP="true"
            SKIP_BUILD="false"
            SKIP_PUBLIC_VERIFY="false"
          else
            REF="${{ inputs.ref }}"
            IMAGE_TAG="${{ inputs.image_tag }}"
            COMPOSE_PROFILES="${{ inputs.compose_profiles }}"
            SKIP_BOOTSTRAP="${{ inputs.skip_bootstrap }}"
            SKIP_BUILD="${{ inputs.skip_build }}"
            SKIP_PUBLIC_VERIFY="${{ inputs.skip_public_verify }}"
          fi

          if [ -z "${REF}" ]; then
            REF="${GITHUB_SHA}"
          fi

          if [ -z "${IMAGE_TAG}" ]; then
            IMAGE_TAG="${REF}"
          fi

          if [ -z "${COMPOSE_PROFILES}" ]; then
            COMPOSE_PROFILES="core"
          fi

          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"

          DOMAIN="${{ vars.CONTABO_DOMAIN }}"
          if [ -z "${DOMAIN}" ]; then
            DOMAIN="${{ vars.TRADERSAPP_DOMAIN }}"
          fi
          if [ -z "${DOMAIN}" ]; then
            DOMAIN="traders.app"
          fi

          BFF_HOST="${{ vars.BFF_PUBLIC_HOST }}"
          if [ -z "${BFF_HOST}" ]; then
            BFF_HOST="bff.${DOMAIN}"
          fi

          API_HOST="${{ vars.API_PUBLIC_HOST }}"
          if [ -z "${API_HOST}" ]; then
            API_HOST="api.${DOMAIN}"
          fi

          APP_ROOT="${{ vars.CONTABO_APP_ROOT }}"
          if [ -z "${APP_ROOT}" ]; then
            APP_ROOT="/opt/tradersapp"
          fi

          {
            echo "ref=${REF}"
            echo "image_tag=${IMAGE_TAG}"
            echo "compose_profiles=${COMPOSE_PROFILES}"
            echo "owner=${OWNER_LC}"
            echo "domain=${DOMAIN}"
            echo "bff_host=${BFF_HOST}"
            echo "api_host=${API_HOST}"
            echo "app_root=${APP_ROOT}"
            echo "skip_bootstrap=${SKIP_BOOTSTRAP}"
            echo "skip_build=${SKIP_BUILD}"
            echo "skip_public_verify=${SKIP_PUBLIC_VERIFY}"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate production contract
        shell: bash
        run: |
          set -euo pipefail
          missing=0

          for key in CONTABO_VPS_HOST CONTABO_VPS_USER CONTABO_SSH_KEY; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret: ${key}"
              missing=1
            fi
          done

          if [ -z "${CONTABO_APP_ENV:-}" ] && { [ -z "${INFISICAL_TOKEN:-}" ] || [ -z "${INFISICAL_PROJECT_ID:-}" ]; }; then
            echo "::error::Provide CONTABO_APP_ENV or both INFISICAL_TOKEN and INFISICAL_PROJECT_ID."
            missing=1
          fi

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi
        env:
          CONTABO_VPS_HOST: ${{ secrets.CONTABO_VPS_HOST }}
          CONTABO_VPS_USER: ${{ secrets.CONTABO_VPS_USER }}
          CONTABO_SSH_KEY: ${{ secrets.CONTABO_SSH_KEY }}
          CONTABO_APP_ENV: ${{ secrets.CONTABO_APP_ENV }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}

      - name: Checkout deploy commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.context.outputs.ref }}

      - name: Prepare runtime env
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .artifacts/contabo

          if [ -n "${CONTABO_APP_ENV:-}" ]; then
            printf '%s\n' "${CONTABO_APP_ENV}" > .artifacts/contabo/base.env
          else
            curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo -E bash
            sudo apt-get update
            sudo apt-get install -y infisical
            export INFISICAL_TOKEN
            infisical secrets pull \
              --env=production \
              --projectId="${INFISICAL_PROJECT_ID}" \
              --format=env > .artifacts/contabo/base.env
          fi

          bash scripts/contabo/build-runtime-env.sh \
            --base-env .artifacts/contabo/base.env \
            --output .artifacts/contabo/.env.contabo \
            --ghcr-owner "${{ steps.context.outputs.owner }}" \
            --image-tag "${{ steps.context.outputs.image_tag }}" \
            --domain "${{ steps.context.outputs.domain }}" \
            --bff-host "${{ steps.context.outputs.bff_host }}" \
            --api-host "${{ steps.context.outputs.api_host }}" \
            --compose-profiles "${{ steps.context.outputs.compose_profiles }}"
        env:
          CONTABO_APP_ENV: ${{ secrets.CONTABO_APP_ENV }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}

      - name: Login to GHCR
        if: steps.context.outputs.skip_build != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ML Engine image
        if: steps.context.outputs.skip_build != 'true'
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_SHA="ghcr.io/${{ steps.context.outputs.owner }}/ml-engine:${{ steps.context.outputs.image_tag }}"
          IMAGE_LATEST="ghcr.io/${{ steps.context.outputs.owner }}/ml-engine:latest"
          docker build \
            --build-arg FINNHUB_API_KEY="${{ secrets.FINNHUB_API_KEY }}" \
            --build-arg NEWS_API_KEY="${{ secrets.NEWS_API_KEY }}" \
            --build-arg AI_GEMINI_PRO_KEY="${{ secrets.AI_GEMINI_PRO_KEY }}" \
            --build-arg AI_GROQ_TURBO_KEY="${{ secrets.AI_GROQ_TURBO_KEY }}" \
            --build-arg AI_OPENROUTER_MIND_ALPHA="${{ secrets.AI_OPENROUTER_MIND_ALPHA }}" \
            --build-arg AI_OPENROUTER_MIND_BETA="${{ secrets.AI_OPENROUTER_MIND_BETA }}" \
            --build-arg AI_CEREBRAS_KEY="${{ secrets.AI_CEREBRAS_KEY }}" \
            --build-arg AI_DEEPSEEK_KEY="${{ secrets.AI_DEEPSEEK_KEY }}" \
            --build-arg AI_SAMBANOVA_KEY="${{ secrets.AI_SAMBANOVA_KEY }}" \
            -t "${IMAGE_SHA}" \
            -t "${IMAGE_LATEST}" \
            --file ml-engine/Dockerfile \
            ml-engine/
          docker push "${IMAGE_SHA}"
          docker push "${IMAGE_LATEST}"

      - name: Build and push BFF image
        if: steps.context.outputs.skip_build != 'true'
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_SHA="ghcr.io/${{ steps.context.outputs.owner }}/bff:${{ steps.context.outputs.image_tag }}"
          IMAGE_LATEST="ghcr.io/${{ steps.context.outputs.owner }}/bff:latest"
          docker build \
            --build-arg BFF_ADMIN_PASS_HASH="${{ secrets.BFF_ADMIN_PASS_HASH }}" \
            --build-arg MASTER_SALT="${{ secrets.MASTER_SALT }}" \
            --build-arg FINNHUB_API_KEY="${{ secrets.FINNHUB_API_KEY }}" \
            --build-arg NEWS_API_KEY="${{ secrets.NEWS_API_KEY }}" \
            --build-arg AI_GEMINI_PRO_KEY="${{ secrets.AI_GEMINI_PRO_KEY }}" \
            --build-arg AI_GROQ_TURBO_KEY="${{ secrets.AI_GROQ_TURBO_KEY }}" \
            --build-arg AI_OPENROUTER_MIND_ALPHA="${{ secrets.AI_OPENROUTER_MIND_ALPHA }}" \
            --build-arg AI_OPENROUTER_MIND_BETA="${{ secrets.AI_OPENROUTER_MIND_BETA }}" \
            --build-arg AI_CEREBRAS_KEY="${{ secrets.AI_CEREBRAS_KEY }}" \
            --build-arg AI_DEEPSEEK_KEY="${{ secrets.AI_DEEPSEEK_KEY }}" \
            --build-arg AI_SAMBANOVA_KEY="${{ secrets.AI_SAMBANOVA_KEY }}" \
            -t "${IMAGE_SHA}" \
            -t "${IMAGE_LATEST}" \
            --file bff/Dockerfile \
            .
          docker push "${IMAGE_SHA}"
          docker push "${IMAGE_LATEST}"

      - name: Build and push Frontend image
        if: steps.context.outputs.skip_build != 'true'
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_SHA="ghcr.io/${{ steps.context.outputs.owner }}/frontend:${{ steps.context.outputs.image_tag }}"
          IMAGE_LATEST="ghcr.io/${{ steps.context.outputs.owner }}/frontend:latest"
          docker build \
            --build-arg VITE_BFF_URL="https://${{ steps.context.outputs.bff_host }}" \
            --build-arg VITE_API_URL="https://${{ steps.context.outputs.api_host }}" \
            -t "${IMAGE_SHA}" \
            -t "${IMAGE_LATEST}" \
            --file deploy/contabo/Dockerfile.frontend \
            .
          docker push "${IMAGE_SHA}"
          docker push "${IMAGE_LATEST}"

      - name: Prepare SSH access
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${CONTABO_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config <<EOF
          Host contabo-vps
            HostName ${CONTABO_VPS_HOST}
            User ${CONTABO_VPS_USER}
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            BatchMode yes
            ConnectTimeout 20
            ConnectionAttempts 3
            ServerAliveInterval 15
            ServerAliveCountMax 3
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config
          ssh-keyscan -T 10 -H "${CONTABO_VPS_HOST}" >> ~/.ssh/known_hosts
        env:
          CONTABO_VPS_HOST: ${{ secrets.CONTABO_VPS_HOST }}
          CONTABO_VPS_USER: ${{ secrets.CONTABO_VPS_USER }}
          CONTABO_SSH_KEY: ${{ secrets.CONTABO_SSH_KEY }}

      - name: Upload Contabo release bundle
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            local status=0
            while true; do
              if "$@"; then
                return 0
              fi
              status=$?
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                return "${status}"
              fi
              sleep $(( attempt * 5 ))
              attempt=$(( attempt + 1 ))
            done
          }

          mkdir -p .artifacts/contabo
          tar -czf .artifacts/contabo/contabo-bundle.tgz deploy/contabo scripts/contabo

          retry 3 ssh contabo-vps "rm -rf /tmp/tradersapp-contabo-release && mkdir -p /tmp/tradersapp-contabo-release"
          retry 3 scp .artifacts/contabo/contabo-bundle.tgz contabo-vps:/tmp/tradersapp-contabo-release/contabo-bundle.tgz
          retry 3 scp .artifacts/contabo/.env.contabo contabo-vps:/tmp/tradersapp-contabo-release/.env.contabo

      - name: Bootstrap and deploy on Contabo
        shell: bash
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p .artifacts/contabo
          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            local status=0
            while true; do
              if "$@"; then
                return 0
              fi
              status=$?
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                return "${status}"
              fi
              sleep $(( attempt * 5 ))
              attempt=$(( attempt + 1 ))
            done
          }

          REMOTE_APP_ROOT='${{ steps.context.outputs.app_root }}'
          REMOTE_SKIP_BOOTSTRAP='${{ steps.context.outputs.skip_bootstrap }}'
          REMOTE_GHCR_USERNAME='${{ github.actor }}'

          run_remote_deploy() {
            {
              echo "=== bootstrap-and-deploy $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
              printf '%s' "${GHCR_TOKEN}" | ssh -T contabo-vps \
                "APP_ROOT='${REMOTE_APP_ROOT}' SKIP_BOOTSTRAP='${REMOTE_SKIP_BOOTSTRAP}' GHCR_USERNAME='${REMOTE_GHCR_USERNAME}' bash -lc 'set -euo pipefail; RELEASE_DIR=/tmp/tradersapp-contabo-release; tar -xzf \"\$RELEASE_DIR/contabo-bundle.tgz\" -C \"\$RELEASE_DIR\"; RELEASE_DIR=\"\$RELEASE_DIR\" APP_ROOT=\"\$APP_ROOT\" SKIP_BOOTSTRAP=\"\$SKIP_BOOTSTRAP\" GHCR_USERNAME=\"\$GHCR_USERNAME\" GHCR_TOKEN_STDIN=1 bash \"\$RELEASE_DIR/scripts/contabo/remote-run-deploy.sh\"'"
            } 2>&1 | tee -a .artifacts/contabo/bootstrap-and-deploy.log
          }

          attempt=1
          max_attempts=3
          until run_remote_deploy; do
            status=$?
            if [ "${attempt}" -ge "${max_attempts}" ]; then
              exit "${status}"
            fi
            sleep $(( attempt * 5 ))
            attempt=$(( attempt + 1 ))
          done

      - name: Capture remote status
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .artifacts/contabo
          REMOTE_APP_ROOT='${{ steps.context.outputs.app_root }}'
          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            local status=0
            while true; do
              if "$@"; then
                return 0
              fi
              status=$?
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                return "${status}"
              fi
              sleep $(( attempt * 5 ))
              attempt=$(( attempt + 1 ))
            done
          }

          run_remote_status() {
            local command_name="$1"
            ssh -T contabo-vps \
              "APP_ROOT='${REMOTE_APP_ROOT}' STATUS_COMMAND='${command_name}' bash -lc 'set -euo pipefail; RELEASE_DIR=/tmp/tradersapp-contabo-release; if [ -f \"\$RELEASE_DIR/contabo-bundle.tgz\" ] && [ ! -d \"\$RELEASE_DIR/scripts/contabo\" ]; then tar -xzf \"\$RELEASE_DIR/contabo-bundle.tgz\" -C \"\$RELEASE_DIR\"; fi; APP_ROOT=\"\$APP_ROOT\" bash \"\$RELEASE_DIR/scripts/contabo/remote-compose-status.sh\" \"\$STATUS_COMMAND\"'"
          }

          capture_ps() {
            run_remote_status ps > .artifacts/contabo/compose-ps.txt 2>&1
          }

          capture_logs() {
            run_remote_status logs > .artifacts/contabo/compose-logs.txt 2>&1
          }

          attempt=1
          max_attempts=3
          until capture_ps; do
            status=$?
            if [ "${attempt}" -ge "${max_attempts}" ]; then
              exit "${status}"
            fi
            sleep $(( attempt * 5 ))
            attempt=$(( attempt + 1 ))
          done

          attempt=1
          until capture_logs; do
            status=$?
            if [ "${attempt}" -ge "${max_attempts}" ]; then
              exit "${status}"
            fi
            sleep $(( attempt * 5 ))
            attempt=$(( attempt + 1 ))
          done

      - name: Verify public deployment
        if: steps.context.outputs.skip_public_verify != 'true'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/contabo/verify_public_deploy.py \
            --frontend-host "${{ steps.context.outputs.domain }}" \
            --bff-host "${{ steps.context.outputs.bff_host }}" \
            --api-host "${{ steps.context.outputs.api_host }}" \
            --output ".artifacts/contabo/public-readiness-${{ github.run_id }}.json"

      - name: Upload Contabo deploy evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contabo-deploy-evidence-${{ github.run_id }}
          path: .artifacts/contabo/
          retention-days: 14

      - name: Publish summary
        shell: bash
        run: |
          {
            echo "## Contabo deploy complete"
            echo ""
            echo "- Commit: \`${{ steps.context.outputs.ref }}\`"
            echo "- Image tag: \`${{ steps.context.outputs.image_tag }}\`"
            echo "- Domain: \`https://${{ steps.context.outputs.domain }}\`"
            echo "- BFF health: \`https://${{ steps.context.outputs.bff_host }}/health\`"
            echo "- API health: \`https://${{ steps.context.outputs.api_host }}/health\`"
            echo "- Compose profiles: \`${{ steps.context.outputs.compose_profiles }}\`"
            echo "- Public verification skipped: \`${{ steps.context.outputs.skip_public_verify }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
