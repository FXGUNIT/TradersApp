name: Monitoring & Alerts

on:
  schedule:
    # Health check every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to check"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ml-engine
          - bff
          - frontend

env:
  ML_ENGINE_URL: ${{ vars.ML_ENGINE_URL || 'https://api.traders.app' }}
  BFF_URL: ${{ vars.BFF_URL || 'https://bff.traders.app' }}
  FRONTEND_URL: ${{ vars.FRONTEND_URL || 'https://traders.app' }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

jobs:
  # -------------------------------------------------------------------------
  # Health Check — ML Engine
  # -------------------------------------------------------------------------
  ml-engine-health:
    name: ML Engine Health
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.service == 'all' || github.event.inputs.service == 'ml-engine'
    steps:
      - name: Check ML Engine /health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${{ env.ML_ENGINE_URL }}/health" 2>/dev/null || echo "000")
          echo "ML Engine status: $response"
          if [ "$response" != "200" ]; then
            echo "ML_ENGINE_DOWN=true" >> $GITHUB_ENV
          fi

      - name: Check ML Engine /model-status
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${{ env.ML_ENGINE_URL }}/model-status" 2>/dev/null || echo "000")
          echo "Model status: $response"

      - name: Send alert on ML Engine failure
        if: env.ML_ENGINE_DOWN == 'true'
        run: |
          payload=$(cat <<'PAYLOAD'
          {
            "text": ":red_alert: ML Engine DOWN",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": ":rotating_light: *ML Engine Health Check Failed*\nEndpoint: ${{ env.ML_ENGINE_URL }}/health\nStatus: NON-200"
                }
              },
              {
                "type": "context",
                "elements": [
                  { "type": "mrkdwn", "text": "Checked at: ${{ github.event.repository.updated_at }}" }
                ]
              }
            ]
          }
          PAYLOAD)
          curl -s -X POST -H "Content-Type: application/json" \
            -d "$payload" "${{ env.SLACK_WEBHOOK_URL }}" 2>/dev/null || true
          curl -s -X POST -H "Content-Type: application/json" \
            -d "{\"content\": \":red_alert: ML Engine DOWN - ${{ env.ML_ENGINE_URL }}/health non-200 response\"}" \
            "${{ env.DISCORD_WEBHOOK_URL }}" 2>/dev/null || true

  # -------------------------------------------------------------------------
  # Health Check — BFF Server
  # -------------------------------------------------------------------------
  bff-health:
    name: BFF Health
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.service == 'all' || github.event.inputs.service == 'bff'
    steps:
      - name: Check BFF /health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${{ env.BFF_URL }}/health" 2>/dev/null || echo "000")
          echo "BFF status: $response"
          if [ "$response" != "200" ]; then
            echo "BFF_DOWN=true" >> $GITHUB_ENV
          fi

      - name: Send alert on BFF failure
        if: env.BFF_DOWN == 'true'
        run: |
          payload=$(cat <<'PAYLOAD'
          {
            "text": ":red_alert: BFF Server DOWN",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": ":rotating_light: *BFF Server Health Check Failed*\nEndpoint: ${{ env.BFF_URL }}/health\nStatus: NON-200"
                }
              }
            ]
          }
          PAYLOAD)
          curl -s -X POST -H "Content-Type: application/json" \
            -d "$payload" "${{ env.SLACK_WEBHOOK_URL }}" 2>/dev/null || true

  # -------------------------------------------------------------------------
  # Health Check — Frontend (Vercel)
  # -------------------------------------------------------------------------
  frontend-health:
    name: Frontend Health
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.service == 'all' || github.event.inputs.service == 'frontend'
    steps:
      - name: Check Frontend
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${{ env.FRONTEND_URL }}" 2>/dev/null || echo "000")
          echo "Frontend status: $response"
          if [ "$response" != "200" ] && [ "$response" != "304" ]; then
            echo "FRONTEND_DOWN=true" >> $GITHUB_ENV
          fi

      - name: Send alert on Frontend failure
        if: env.FRONTEND_DOWN == 'true'
        run: |
          curl -s -X POST -H "Content-Type: application/json" \
            -d "{\"content\": \":red_alert: Frontend DOWN - ${{ env.FRONTEND_URL }} non-200 response\"}" \
            "${{ env.DISCORD_WEBHOOK_URL }}" 2>/dev/null || true

  # -------------------------------------------------------------------------
  # ML Model Staleness Check — warn if models not retrained in 7 days
  # -------------------------------------------------------------------------
  model-freshness:
    name: ML Model Freshness
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Check model last trained date
        run: |
          response=$(curl -s --max-time 15 "${{ env.ML_ENGINE_URL }}/model-status" 2>/dev/null)
          echo "Model status response: $response"
          last_trained=$(echo "$response" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('last_trained','unknown'))" 2>/dev/null || echo "unknown")
          echo "Last trained: $last_trained"
          echo "last_trained=$last_trained" >> $GITHUB_ENV

      - name: Alert if models stale (>7 days)
        if: env.last_trained != 'unknown' && env.last_trained != ''
        run: |
          days_old=$(python3 -c "
from datetime import datetime, timezone
try:
    last = datetime.fromisoformat('${{ env.last_trained }}'.replace('Z','+00:00'))
    age = (datetime.now(timezone.utc) - last).days
    print(age)
except:
    print(-1)
" 2>/dev/null || echo "-1")
          echo "Model age: $days_old days"
          if [ "$days_old" -gt 7 ]; then
            curl -s -X POST -H "Content-Type: application/json" \
              -d "{\"content\": \":warning: ML Models are $days_old days old (>7 day threshold) — consider retraining\"}" \
              "${{ env.DISCORD_WEBHOOK_URL }}" 2>/dev/null || true
          fi

  # -------------------------------------------------------------------------
  # Daily ML Model Backup to GitHub Releases
  # -------------------------------------------------------------------------
  backup-models:
    name: Backup ML Models
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 2 * * *'
    # Run daily at 2 AM
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download trained models from ML Engine
        run: |
          mkdir -p models_backup
          curl -s "${{ env.ML_ENGINE_URL }}/model-status" | python3 -c "
import sys, json, os
data = json.load(sys.stdin)
print('Models:', json.dumps(data, indent=2))
" 2>/dev/null || echo "Could not reach ML engine"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: models-$(date +%Y-%m-%d)
          name: ML Models $(date +%Y-%m-%d)
          body: "Automated daily ML model backup."
          files: models_backup/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # -------------------------------------------------------------------------
  # Vercel Deployment Status Check
  # -------------------------------------------------------------------------
  vercel-status:
    name: Vercel Deploy Status
    runs-on: ubuntu-latest
    if: github.event_name == 'deployment_status'
    steps:
      - name: Check deployment status
        run: |
          echo "Deployment ${{ github.event.deployment_status.state }} for ${{ github.event.deployment.url }}"

      - name: Alert on failed Vercel deployment
        if: github.event.deployment_status.state == 'failure'
        run: |
          curl -s -X POST -H "Content-Type: application/json" \
            -d "{\"content\": \":x: Vercel deployment FAILED for ${{ github.event.deployment.url }}\"}" \
            "${{ env.DISCORD_WEBHOOK_URL }}" 2>/dev/null || true
