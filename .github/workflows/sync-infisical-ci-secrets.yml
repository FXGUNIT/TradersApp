name: Sync Infisical CI Secrets

on:
  workflow_dispatch:
    inputs:
      target_envs:
        description: "Comma-separated Infisical environment slugs"
        required: false
        default: "dev"
        type: string
      fail_on_missing_env:
        description: "Fail if a requested Infisical environment is missing"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DEFAULT_INFISICAL_ENV: "${{ vars.INFISICAL_ENV || 'dev' }}"

jobs:
  sync:
    name: Sync GitHub secrets to Infisical
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Infisical CLI
        run: npm install -g @infisical/cli@0.43.77

      - name: Sync target secrets
        shell: bash
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID || vars.INFISICAL_PROJECT_ID || '0e4f9b8b-846e-4e66-a4aa-97c8fa9863ab' }}
          CONTABO_APP_ENV: ${{ secrets.CONTABO_APP_ENV }}
          BFF_ADMIN_PASS_HASH: ${{ secrets.BFF_ADMIN_PASS_HASH }}
          MASTER_SALT: ${{ secrets.MASTER_SALT }}
          AI_GEMINI_PRO_KEY: ${{ secrets.AI_GEMINI_PRO_KEY }}
          AI_GROQ_TURBO_KEY: ${{ secrets.AI_GROQ_TURBO_KEY }}
          AI_OPENROUTER_MIND_ALPHA: ${{ secrets.AI_OPENROUTER_MIND_ALPHA }}
          AI_OPENROUTER_MIND_BETA: ${{ secrets.AI_OPENROUTER_MIND_BETA }}
          AI_CEREBRAS_KEY: ${{ secrets.AI_CEREBRAS_KEY }}
          AI_DEEPSEEK_KEY: ${{ secrets.AI_DEEPSEEK_KEY }}
          AI_SAMBANOVA_KEY: ${{ secrets.AI_SAMBANOVA_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${INFISICAL_TOKEN:-}" ]; then
            echo "::error::Missing GitHub secret: INFISICAL_TOKEN"
            exit 1
          fi

          if [ -z "${INFISICAL_PROJECT_ID:-}" ]; then
            echo "::error::Missing Infisical project id. Set repo variable or secret INFISICAL_PROJECT_ID."
            exit 1
          fi

          requested_envs_raw="${{ inputs.target_envs }}"
          if [ -z "${requested_envs_raw// }" ]; then
            requested_envs_raw="${DEFAULT_INFISICAL_ENV}"
          fi

          declare -A requested_seen=()
          target_envs=()
          IFS=',' read -r -a requested_envs <<< "${requested_envs_raw}"
          for raw_env in "${requested_envs[@]}"; do
            env_slug="$(printf '%s' "${raw_env}" | xargs)"
            if [ -z "${env_slug}" ]; then
              continue
            fi
            if [ -n "${requested_seen[${env_slug}]+x}" ]; then
              continue
            fi
            requested_seen["${env_slug}"]=1
            target_envs+=("${env_slug}")
          done

          if [ "${#target_envs[@]}" -eq 0 ]; then
            echo "::error::No Infisical environments selected."
            exit 1
          fi

          declare -A runtime_values=()
          if [ -n "${CONTABO_APP_ENV:-}" ]; then
            while IFS= read -r raw_line || [ -n "${raw_line}" ]; do
              line="${raw_line%$'\r'}"
              line="${line#export }"
              if [ -z "${line}" ] || [[ "${line}" =~ ^[[:space:]]*# ]]; then
                continue
              fi
              if [[ "${line}" != *=* ]]; then
                continue
              fi
              key="${line%%=*}"
              value="${line#*=}"
              key="$(printf '%s' "${key}" | xargs)"
              if [ -z "${key}" ]; then
                continue
              fi
              if [[ "${value}" =~ ^\".*\"$ ]] || [[ "${value}" =~ ^\'.*\'$ ]]; then
                value="${value:1:${#value}-2}"
              fi
              runtime_values["${key}"]="${value}"
            done <<< "${CONTABO_APP_ENV}"
          fi

          get_value() {
            local key="$1"
            local value=""
            if [ -n "${runtime_values[${key}]+x}" ] && [ -n "${runtime_values[${key}]}" ]; then
              value="${runtime_values[${key}]}"
            elif [ -n "${!key:-}" ]; then
              value="${!key}"
            fi

            if [ -z "${value}" ]; then
              case "${key}" in
                BFF_TELEGRAM_BOT_TOKEN)
                  value="${runtime_values[TELEGRAM_BOT_TOKEN]:-${TELEGRAM_BOT_TOKEN:-}}"
                  ;;
                BFF_TELEGRAM_CHAT_ID)
                  value="${runtime_values[TELEGRAM_CHAT_ID]:-${TELEGRAM_CHAT_ID:-}}"
                  ;;
              esac
            fi

            printf '%s' "${value}"
          }

          candidate_keys=(
            BFF_ADMIN_PASS_HASH
            MASTER_SALT
            AI_GEMINI_PRO_KEY
            AI_GROQ_TURBO_KEY
            AI_OPENROUTER_MIND_ALPHA
            AI_OPENROUTER_MIND_BETA
            AI_CEREBRAS_KEY
            AI_DEEPSEEK_KEY
            AI_SAMBANOVA_KEY
            FINNHUB_API_KEY
            NEWS_API_KEY
            TELEGRAM_BOT_TOKEN
            TELEGRAM_CHAT_ID
            TELEGRAM_ADMIN_CHAT_IDS
            BFF_TELEGRAM_BOT_TOKEN
            BFF_TELEGRAM_CHAT_ID
            SUPPORT_SERVICE_KEY
            TELEGRAM_BRIDGE_PORT
            TELEGRAM_BOT_MODE
            BOARD_ROOM_TELEGRAM_CHAT_ID
            ML_ENGINE_URL
            ML_ENGINE_API_KEY
            DATABASE_URL
          )

          declare -A resolved_values=()
          sync_keys=()
          for key in "${candidate_keys[@]}"; do
            value="$(get_value "${key}")"
            if [ -z "${value}" ]; then
              continue
            fi
            resolved_values["${key}"]="${value}"
            sync_keys+=("${key}")
          done

          if [ "${#sync_keys[@]}" -eq 0 ]; then
            echo "::error::No non-empty secrets were resolved from CONTABO_APP_ENV or GitHub Secrets."
            exit 1
          fi

          synced_envs=()
          skipped_envs=()
          total_writes=0

          for target_env in "${target_envs[@]}"; do
            echo "Syncing ${#sync_keys[@]} keys to Infisical env '${target_env}'..."
            env_writes=0
            env_missing="false"

            for key in "${sync_keys[@]}"; do
              value="${resolved_values[${key}]}"
              echo "::add-mask::${value}"

              set +e
              output="$(
                infisical secrets set "${key}=${value}" \
                  --env="${target_env}" \
                  --projectId="${INFISICAL_PROJECT_ID}" \
                  --token="${INFISICAL_TOKEN}" \
                  --silent 2>&1 >/dev/null
              )"
              status=$?
              set -e

              if [ "${status}" -ne 0 ]; then
                if [[ "${output}" == *"Folder with path '/' in environment"* ]] || [[ "${output}" == *"environment '${target_env}' was not found"* ]]; then
                  echo "::warning::Skipping Infisical env '${target_env}' because it does not exist for project ${INFISICAL_PROJECT_ID}."
                  env_missing="true"
                  break
                fi

                echo "::error::Failed to sync ${key} to Infisical env '${target_env}'."
                printf '%s\n' "${output}"
                exit 1
              fi

              env_writes=$((env_writes + 1))
              total_writes=$((total_writes + 1))
            done

            if [ "${env_missing}" = "true" ]; then
              skipped_envs+=("${target_env}")
              if [ "${{ inputs.fail_on_missing_env }}" = "true" ]; then
                echo "::error::Requested Infisical env '${target_env}' is missing."
                exit 1
              fi
              continue
            fi

            synced_envs+=("${target_env}")
            echo "Synced ${env_writes} keys to '${target_env}'."
          done

          if [ "${#synced_envs[@]}" -eq 0 ]; then
            echo "::error::No Infisical environments were synced successfully."
            exit 1
          fi

          {
            echo "## Infisical sync complete"
            echo ""
            echo "- Project ID: \`${INFISICAL_PROJECT_ID}\`"
            echo "- Requested envs: \`${target_envs[*]}\`"
            echo "- Synced envs: \`${synced_envs[*]}\`"
            if [ "${#skipped_envs[@]}" -gt 0 ]; then
              echo "- Skipped missing envs: \`${skipped_envs[*]}\`"
            fi
            echo "- Keys synced per env: \`${#sync_keys[@]}\`"
            echo "- Secret writes completed: \`${total_writes}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
