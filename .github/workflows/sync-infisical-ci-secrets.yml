name: Sync Infisical CI Secrets

on:
  workflow_dispatch:
    inputs:
      sync_dev:
        description: "Sync the dev Infisical environment"
        required: false
        default: true
        type: boolean
      sync_production:
        description: "Sync the production Infisical environment"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  INFISICAL_PROJECT_ID: "0e4f9b8b-846e-4e66-a4aa-97c8fa9863ab"

jobs:
  sync:
    name: Sync GitHub secrets to Infisical
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Infisical CLI
        run: npm install -g @infisical/cli@0.43.77

      - name: Sync target secrets
        shell: bash
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          BFF_ADMIN_PASS_HASH: ${{ secrets.BFF_ADMIN_PASS_HASH }}
          MASTER_SALT: ${{ secrets.MASTER_SALT }}
          AI_GEMINI_PRO_KEY: ${{ secrets.AI_GEMINI_PRO_KEY }}
          AI_GROQ_TURBO_KEY: ${{ secrets.AI_GROQ_TURBO_KEY }}
          AI_OPENROUTER_MIND_ALPHA: ${{ secrets.AI_OPENROUTER_MIND_ALPHA }}
          AI_OPENROUTER_MIND_BETA: ${{ secrets.AI_OPENROUTER_MIND_BETA }}
          AI_CEREBRAS_KEY: ${{ secrets.AI_CEREBRAS_KEY }}
          AI_DEEPSEEK_KEY: ${{ secrets.AI_DEEPSEEK_KEY }}
          AI_SAMBANOVA_KEY: ${{ secrets.AI_SAMBANOVA_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${INFISICAL_TOKEN:-}" ]; then
            echo "::error::Missing GitHub secret: INFISICAL_TOKEN"
            exit 1
          fi

          envs=()
          if [ "${{ inputs.sync_dev }}" = "true" ]; then
            envs+=("dev")
          fi
          if [ "${{ inputs.sync_production }}" = "true" ]; then
            envs+=("production")
          fi

          if [ "${#envs[@]}" -eq 0 ]; then
            echo "::error::No Infisical environments selected."
            exit 1
          fi

          keys=(
            BFF_ADMIN_PASS_HASH
            MASTER_SALT
            AI_GEMINI_PRO_KEY
            AI_GROQ_TURBO_KEY
            AI_OPENROUTER_MIND_ALPHA
            AI_OPENROUTER_MIND_BETA
            AI_CEREBRAS_KEY
            AI_DEEPSEEK_KEY
            AI_SAMBANOVA_KEY
            FINNHUB_API_KEY
            NEWS_API_KEY
          )

          synced=0
          for key in "${keys[@]}"; do
            value="${!key:-}"
            if [ -z "${value}" ]; then
              echo "::warning::Skipping ${key}; matching GitHub secret is empty or missing."
              continue
            fi

            echo "::add-mask::${value}"
            for target_env in "${envs[@]}"; do
              infisical secrets set "${key}=${value}" \
                --env="${target_env}" \
                --projectId="${INFISICAL_PROJECT_ID}" \
                --token="${INFISICAL_TOKEN}" \
                --silent > /dev/null
              synced=$((synced + 1))
            done
          done

          {
            echo "## Infisical sync complete"
            echo ""
            echo "- Project ID: \`${INFISICAL_PROJECT_ID}\`"
            echo "- Environments: \`${envs[*]}\`"
            echo "- Keys processed: \`${#keys[@]}\`"
            echo "- Secret writes attempted: \`${synced}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
