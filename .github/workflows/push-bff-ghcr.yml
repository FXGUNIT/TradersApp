name: Push BFF Image to GHCR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to push'
        required: false
        default: 'watchtower-fix'

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check available image on Contabo
        run: |
          echo "::notice::Will push to ghcr.io/fxgunit/bff:${{ github.event.inputs.image_tag }}"
          echo "::notice::SSH to Contabo and run: docker push ghcr.io/fxgunit/bff:${{ github.event.inputs.image_tag }}"

      - name: Setup Docker for GHCR via OIDC
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image from Contabo via remote Docker
        run: |
          echo "::error::Contabo SSH is down. Run manually when SSH returns:"
          echo ""
          echo "ssh root@173.249.18.14"
          echo "docker push ghcr.io/fxgunit/bff:${{ github.event.inputs.image_tag }}"
          exit 1
