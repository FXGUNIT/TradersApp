name: Retag Existing BFF Image in GHCR

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Existing BFF image tag to retag"
        required: true
        default: "latest"
      target_tag:
        description: "New BFF image tag to create"
        required: true
        default: "manual-retag"

jobs:
  retag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag existing BFF image
        shell: bash
        run: |
          set -euo pipefail
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          SOURCE="ghcr.io/${OWNER_LC}/bff:${{ inputs.source_tag }}"
          TARGET="ghcr.io/${OWNER_LC}/bff:${{ inputs.target_tag }}"

          docker buildx imagetools inspect "${SOURCE}" >/dev/null
          docker buildx imagetools create -t "${TARGET}" "${SOURCE}"

          {
            echo "## BFF image retagged"
            echo ""
            echo "- Source: \`${SOURCE}\`"
            echo "- Target: \`${TARGET}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
