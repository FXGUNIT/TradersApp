name: Rollback ML Models

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Backup version to restore (e.g., models_backup_20260401_020000)"
        required: true
        type: string
      confirm:
        description: "Type 'yes' to confirm rollback"
        required: true
        default: "no"

