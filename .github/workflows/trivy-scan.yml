name: Container Security Scan

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to scan. Defaults to this workflow commit SHA."
        required: false
        default: ""
  pull_request:
    paths:
      - "bff/**"
      - "ml-engine/**"
      - "Dockerfile.frontend"
      - "deploy/**/Dockerfile.frontend"
      - ".dockerignore"
      - ".github/workflows/trivy-scan.yml"

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve scan image refs
        id: images
        run: |
          set -euo pipefail
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          TAG="${{ inputs.image_tag || github.event.workflow_run.head_sha || github.sha }}"
          [ -n "${TAG}" ] || TAG="${GITHUB_SHA}"
          echo "ml=tradersapp/ml-engine:scan" >> "$GITHUB_OUTPUT"
          echo "frontend=tradersapp/frontend:scan" >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            echo "bff=tradersapp/bff:scan" >> "$GITHUB_OUTPUT"
          else
            echo "bff=ghcr.io/${OWNER_LC}/bff:${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build local scan images
        run: |
          set -euo pipefail
          docker build -t tradersapp/ml-engine:scan --file ml-engine/Dockerfile ml-engine/
          docker build -t tradersapp/frontend:scan --file Dockerfile.frontend .
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            docker build -t tradersapp/bff:scan --file bff/Dockerfile .
          else
            docker pull "${{ steps.images.outputs.bff }}"
          fi

      - name: Run Trivy vulnerability scanner (ML Engine)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.images.outputs.ml }}
          format: sarif
          output: trivy-results-ml-engine.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Run Trivy vulnerability scanner (BFF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.images.outputs.bff }}
          format: sarif
          output: trivy-results-bff.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.images.outputs.frontend }}
          format: sarif
          output: trivy-results-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload Trivy ML Engine results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results-ml-engine.sarif
          category: trivy-ml-engine

      - name: Upload Trivy BFF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results-bff.sarif
          category: trivy-bff

      - name: Upload Trivy Frontend results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results-frontend.sarif
          category: trivy-frontend

      - name: Trivy scan summary
        if: always()
        run: |
          echo "Trivy scan complete."
          echo "BFF scan target: ${{ steps.images.outputs.bff }}"
