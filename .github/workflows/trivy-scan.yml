# .github/workflows/trivy-scan.yml — Trivy container vulnerability scanning
# Runs on every push to main and every PR.
# Blocks merge if CRITICAL vulnerabilities found.

name: Container Security Scan

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    paths:
      - 'Dockerfile*'
      - '.github/workflows/trivy-scan.yml'

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker build -t tradersapp/ml-engine:latest -f Dockerfile.ml-engine .
          docker build -t tradersapp/bff:latest -f Dockerfile.bff .
          docker build -t tradersapp/frontend:latest -f Dockerfile.frontend .

      - name: Run Trivy vulnerability scanner (ML Engine)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'tradersapp/ml-engine:latest'
          format: 'sarif'
          output: 'trivy-results-ml-engine.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail on CRITICAL

      - name: Run Trivy vulnerability scanner (BFF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'tradersapp/bff:latest'
          format: 'sarif'
          output: 'trivy-results-bff.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'tradersapp/frontend:latest'
          format: 'sarif'
          output: 'trivy-results-frontend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-ml-engine.sarif'

      - name: Trivy scan summary
        if: always()
        run: |
          echo "Trivy scan complete. Results uploaded to Security tab."
          echo "Critical vulnerabilities block merge."
