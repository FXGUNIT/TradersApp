name: Deploy Pages Root

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-pages-root.yml"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - "scripts/pages/**"
      - "src/**"
      - "vite.config.js"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-pages-root
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy tradergunit.pages.dev
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
      CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_GLOBAL_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Validate Cloudflare credentials
        run: |
          set -euo pipefail
          if [ -n "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "Cloudflare API token found (${#CLOUDFLARE_API_TOKEN} chars)"
          elif [ -n "${CLOUDFLARE_EMAIL:-}" ] && [ -n "${CLOUDFLARE_API_KEY:-}" ]; then
            echo "Using Cloudflare global API key for authentication"
          else
            echo "::error::Missing Cloudflare credentials: need CLOUDFLARE_API_TOKEN or CLOUDFLARE_EMAIL + CLOUDFLARE_API_KEY (GLOBAL_KEY)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build root bundle
        env:
          VITE_BFF_URL: https://bff.173.249.18.14.sslip.io
          VITE_PROOF_FRONTEND: https://tradergunit.pages.dev/
          VITE_PROOF_BFF: https://bff.173.249.18.14.sslip.io/health
          VITE_PROOF_API: https://api.173.249.18.14.sslip.io/health
        run: npm run build

      - name: Verify Pages root contract
        shell: bash
        run: |
          set -euo pipefail
          test -f public/_headers
          grep -q 'DEVELOPER_PREVIEW_PATH' src/App.jsx

      - name: Deploy to Cloudflare Pages via Wrangler v3
        run: |
          set -euo pipefail
          # Wrangler v3 authenticates via CLOUDFLARE_API_TOKEN env var directly.
          # Wrangler v4 calls /user/tokens/verify which blocks cfat_ tokens.
          # Fall back to global API key if token not available.
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "Using Cloudflare global API key auth for wrangler"
          fi
          DEPLOY_OUTPUT=$(npx wrangler@3.103.0 pages deploy dist \
            --project-name tradergunit \
            --branch main \
            --commit-hash "${GITHUB_SHA}" 2>&1)
          echo "${DEPLOY_OUTPUT}"
          # Extract preview URL and save for downstream steps
          DEPLOY_URL=$(echo "${DEPLOY_OUTPUT}" | grep -o 'https://[^ ]*\.tradergunit\.pages\.dev' | tail -1)
          echo "DEPLOY_URL=${DEPLOY_URL}" >> "${GITHUB_OUTPUT}"

      - name: Promote preview to production
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_URL:-}" ]; then
            echo "::warning::No DEPLOY_URL — skipping promotion"
            exit 0
          fi
          echo "Promoting ${DEPLOY_URL} to production..."
          # Extract deployment ID from preview URL
          DEPLOYMENT_ID=$(echo "${DEPLOY_URL}" | grep -o '[a-f0-9]\{10\}' | tail -1)
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/tradergunit/deployments/${DEPLOYMENT_ID}/promote" \
            -H "X-Auth-Email: ${CLOUDFLARE_EMAIL}" \
            -H "X-Auth-Key: ${CLOUDFLARE_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}' | python3 -c "import json,sys; d=json.load(sys.stdin); print('Promotion success:', d.get('success'), d.get('errors', []))"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify browser-rendered app shell
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .artifacts/pages-root
          node scripts/pages/verify_pages_root_browser.mjs \
            --url "${DEPLOY_URL}" \
            --output ".artifacts/pages-root/browser-${{ github.run_id }}.json"

      - name: Verify Pages root runtime
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .artifacts/pages-root
          python scripts/pages/verify_pages_root_runtime.py \
            --root-url "${DEPLOY_URL}" \
            --bff-base-url "https://${{ vars.BFF_PUBLIC_HOST || format('bff.{0}', vars.CONTABO_DOMAIN || '173.249.18.14.sslip.io') }}" \
            --api-base-url "https://${{ vars.API_PUBLIC_HOST || format('api.{0}', vars.CONTABO_DOMAIN || '173.249.18.14.sslip.io') }}" \
            --project-preview-url "${DEPLOY_URL}/" \
            --output ".artifacts/pages-root/verification-${{ github.run_id }}.json" \
            --step-summary "${GITHUB_STEP_SUMMARY}"

      - name: Summarize Pages verification report
        if: always()
        id: pages_summary
        shell: bash
        run: |
          set -euo pipefail
          python scripts/pages/summarize_pages_root_report.py \
            --input ".artifacts/pages-root/verification-${{ github.run_id }}.json" \
            --browser-input ".artifacts/pages-root/browser-${{ github.run_id }}.json" \
            --markdown-out ".artifacts/pages-root/summary-${{ github.run_id }}.md" \
            --step-summary "${GITHUB_STEP_SUMMARY}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Upload Pages verification artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pages-root-verification-${{ github.run_id }}
          path: .artifacts/pages-root/
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 14

      - name: Send Pages verification alert
        if: always()
        shell: bash
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          STATUS="success"
          TITLE="Pages root deploy verification passed"
          BODY="Root: https://tradergunit.pages.dev | BFF: https://bff.173.249.18.14.sslip.io/health | API: https://api.173.249.18.14.sslip.io/health"

          if [ "${{ job.status }}" != "success" ]; then
            STATUS="error"
            TITLE="Pages root deploy or verification failed"
            BODY="Failed checks: ${{ steps.pages_summary.outputs.failed_checks || 'unknown' }} | Artifact: pages-root-verification-${{ github.run_id }}"
          elif [ "${{ steps.pages_summary.outputs.overall_status || 'success' }}" = "warning" ]; then
            STATUS="warning"
            TITLE="Pages root deploy verification passed with fallback hosts"
            BODY="Artifact: pages-root-verification-${{ github.run_id }} | Fallback used: ${{ steps.pages_summary.outputs.fallback_used || 'false' }} | Runtime fallback hosts: ${{ steps.pages_summary.outputs.runtime_fallback_hosts || 'false' }}"
          fi

          python scripts/ci/send_webhook_alert.py \
            --status "${STATUS}" \
            --title "${TITLE}" \
            --body "${BODY}" \
            --run-url "${RUN_URL}"

      - name: Publish summary
        shell: bash
        run: |
          {
            echo "## Cloudflare Pages root deploy complete"
            echo ""
            echo "- Project: \`tradergunit\`"
            echo "- URL: \`${DEPLOY_URL}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Build command: \`npm ci && npm run build\`"
            echo "- Deploy mode: \`wrangler pages deploy dist --project-name tradergunit\`"
            echo "- Browser contract: \`browser-${{ github.run_id }}.json\`"
            echo "- Overall verification state: \`${{ steps.pages_summary.outputs.overall_status || 'unknown' }}\`"
            echo "- Verification artifact: \`pages-root-verification-${{ github.run_id }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
