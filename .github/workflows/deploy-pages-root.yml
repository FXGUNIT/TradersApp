name: Deploy Pages Root

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-pages-root.yml"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - "src/**"
      - "vite.config.js"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-pages-root
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy tradergunit.pages.dev
    runs-on: ubuntu-latest
    environment:
      name: pages-root
      url: https://tradergunit.pages.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Validate Cloudflare secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          missing=0
          for key in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required GitHub secret: ${key}"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build root bundle
        run: npm run build

      - name: Verify Pages root contract
        shell: bash
        run: |
          set -euo pipefail
          test -f public/_headers
          grep -q "tradergunit.pages.dev" src/App.jsx

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@4.84.1 pages deploy dist \
            --project-name tradergunit \
            --branch main \
            --commit-hash "${GITHUB_SHA}"

      - name: Publish summary
        shell: bash
        run: |
          {
            echo "## Cloudflare Pages root deploy complete"
            echo ""
            echo "- Project: \`tradergunit\`"
            echo "- URL: \`https://tradergunit.pages.dev\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Build command: \`npm ci && npm run build\`"
            echo "- Deploy mode: \`wrangler pages deploy dist --project-name tradergunit\`"
          } >> "${GITHUB_STEP_SUMMARY}"
