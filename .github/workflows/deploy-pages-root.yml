name: Deploy Pages Root

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-pages-root.yml"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - "scripts/pages/**"
      - "src/**"
      - "vite.config.js"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-pages-root
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy tradergunit.pages.dev
    runs-on: ubuntu-latest
    environment:
      name: pages-root
      url: https://tradergunit.pages.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Validate Cloudflare secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          missing=0
          for key in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required GitHub secret: ${key}"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build root bundle
        env:
          VITE_PROOF_FRONTEND: https://${{ vars.TRADERSAPP_DOMAIN || vars.CONTABO_DOMAIN || '173.249.18.14.sslip.io' }}/
          VITE_PROOF_BFF: https://${{ vars.BFF_PUBLIC_HOST || format('bff.{0}', vars.TRADERSAPP_DOMAIN || vars.CONTABO_DOMAIN || '173.249.18.14.sslip.io') }}/health
          VITE_PROOF_API: https://${{ vars.API_PUBLIC_HOST || format('api.{0}', vars.TRADERSAPP_DOMAIN || vars.CONTABO_DOMAIN || '173.249.18.14.sslip.io') }}/health
        run: npm run build

      - name: Verify Pages root contract
        shell: bash
        run: |
          set -euo pipefail
          test -f public/_headers
          grep -q "tradergunit.pages.dev" src/App.jsx

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@4.84.1 pages deploy dist \
            --project-name tradergunit \
            --branch main \
            --commit-hash "${GITHUB_SHA}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify browser-rendered landing page
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .artifacts/pages-root
          node scripts/pages/verify_pages_root_browser.mjs \
            --url "https://tradergunit.pages.dev" \
            --output ".artifacts/pages-root/browser-${{ github.run_id }}.json"

      - name: Verify Pages root runtime
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .artifacts/pages-root
          python scripts/pages/verify_pages_root_runtime.py \
            --root-url "https://tradergunit.pages.dev" \
            --bff-base-url "https://${{ vars.BFF_PUBLIC_HOST || format('bff.{0}', vars.TRADERSAPP_DOMAIN || vars.CONTABO_DOMAIN || '173.249.18.14.sslip.io') }}" \
            --api-base-url "https://${{ vars.API_PUBLIC_HOST || format('api.{0}', vars.TRADERSAPP_DOMAIN || vars.CONTABO_DOMAIN || '173.249.18.14.sslip.io') }}" \
            --project-preview-url "https://${{ vars.TRADERSAPP_DOMAIN || vars.CONTABO_DOMAIN || '173.249.18.14.sslip.io' }}/" \
            --output ".artifacts/pages-root/verification-${{ github.run_id }}.json" \
            --step-summary "${GITHUB_STEP_SUMMARY}"

      - name: Summarize Pages verification report
        if: always()
        id: pages_summary
        shell: bash
        run: |
          set -euo pipefail
          python scripts/pages/summarize_pages_root_report.py \
            --input ".artifacts/pages-root/verification-${{ github.run_id }}.json" \
            --browser-input ".artifacts/pages-root/browser-${{ github.run_id }}.json" \
            --markdown-out ".artifacts/pages-root/summary-${{ github.run_id }}.md" \
            --step-summary "${GITHUB_STEP_SUMMARY}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Upload Pages verification artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pages-root-verification-${{ github.run_id }}
          path: .artifacts/pages-root/
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 14

      - name: Send Pages verification alert
        if: always()
        shell: bash
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          STATUS="success"
          TITLE="Pages root deploy verification passed"
          BODY="Root: https://tradergunit.pages.dev | Frontend: https://${{ vars.TRADERSAPP_DOMAIN || vars.CONTABO_DOMAIN || '173.249.18.14.sslip.io' }}/ | BFF: https://${{ vars.BFF_PUBLIC_HOST || format('bff.{0}', vars.TRADERSAPP_DOMAIN || vars.CONTABO_DOMAIN || '173.249.18.14.sslip.io') }}/health | API: https://${{ vars.API_PUBLIC_HOST || format('api.{0}', vars.TRADERSAPP_DOMAIN || vars.CONTABO_DOMAIN || '173.249.18.14.sslip.io') }}/health"

          if [ "${{ job.status }}" != "success" ]; then
            STATUS="error"
            TITLE="Pages root deploy or verification failed"
            BODY="Failed checks: ${{ steps.pages_summary.outputs.failed_checks || 'unknown' }} | Artifact: pages-root-verification-${{ github.run_id }}"
          elif [ "${{ steps.pages_summary.outputs.overall_status || 'success' }}" = "warning" ]; then
            STATUS="warning"
            TITLE="Pages root deploy verification passed with fallback hosts"
            BODY="Artifact: pages-root-verification-${{ github.run_id }} | Fallback used: ${{ steps.pages_summary.outputs.fallback_used || 'false' }} | Runtime fallback hosts: ${{ steps.pages_summary.outputs.runtime_fallback_hosts || 'false' }}"
          fi

          python scripts/ci/send_webhook_alert.py \
            --status "${STATUS}" \
            --title "${TITLE}" \
            --body "${BODY}" \
            --run-url "${RUN_URL}"

      - name: Publish summary
        shell: bash
        run: |
          {
            echo "## Cloudflare Pages root deploy complete"
            echo ""
            echo "- Project: \`tradergunit\`"
            echo "- URL: \`https://tradergunit.pages.dev\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Build command: \`npm ci && npm run build\`"
            echo "- Deploy mode: \`wrangler pages deploy dist --project-name tradergunit\`"
            echo "- Browser contract: \`browser-${{ github.run_id }}.json\`"
            echo "- Overall verification state: \`${{ steps.pages_summary.outputs.overall_status || 'unknown' }}\`"
            echo "- Verification artifact: \`pages-root-verification-${{ github.run_id }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
