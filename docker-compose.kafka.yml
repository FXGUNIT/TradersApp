# ─────────────────────────────────────────────────────────────────────────────
# TradersApp — Apache Kafka + Schema Registry Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Event-driven inter-service communication for TradersApp.
#
# Topics:
#   candle-data          — 5-min OHLCV candles from data pipeline
#   consensus-signals    — ML consensus outputs (signal, confidence, votes)
#   model-predictions    — Per-model predictions + SHAP explanations
#   feedback-loop        — Trade outcomes → retraining signals
#   drift-alerts        — DriftMonitor alerts → retrain pipeline trigger
#
# Start:
#   docker compose -f docker-compose.kafka.yml up -d
#
# Verify:
#   docker compose -f docker-compose.kafka.yml exec kafka kafka-topics --list --bootstrap-server localhost:9092
# ─────────────────────────────────────────────────────────────────────────────

version: "3.8"

services:
  # ── Apache Kafka (KRaft mode — no Zookeeper needed) ──────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: traders-kafka
    hostname: kafka
    ports:
      - "9092:9092"   # External access
      - "29092:29092" # Internal (for other containers)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: >
        PLAINTEXT://0.0.0.0:9092,
        PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT://localhost:9092,
        PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
      # Producer/consumer settings
      KAFKA_PRODUCER_ACKS: "all"
      KAFKA_PRODUCER_RETRIES: 3
      KAFKA_PRODUCER_MAX_IN_FLIGHT_REQUESTS_PER_CONNECTION: 1
      KAFKA_CONSUMER_SESSION_TIMEOUT_MS: 30000
      KAFKA_CONSUMER_MAX_POLL_RECORDS: 500
      KAFKA_CONSUMER_MAX_POLL_INTERVAL_MS: 300000
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Kafka UI (optional — web interface for Kafka topics) ────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: traders-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: traders
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: ""
    depends_on:
      kafka:
        condition: service_healthy

  # ── Kafka Connect (optional — for JDBC source connectors) ────────────────
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.0
    container_name: traders-kafka-connect
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: traders-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: _connect_configs
      CONNECT_OFFSET_STORAGE_TOPIC: _connect_offsets
      CONNECT_STATUS_STORAGE_TOPIC: _connect_statuses
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  kafka-data:
    driver: local
