# NSE India Trading Sessions Configuration
# All times are in Asia/Kolkata (IST, UTC+5:30, no DST)
# Source: NSE India official market timings

sessions:
  pre_market:
    name: "Pre-Market Session"
    start: "09:00"
    end: "09:15"
    timezone: "Asia/Kolkata"
    type: "pre_market"

  regular:
    name: "Regular Session"
    start: "09:15"
    end: "15:30"
    timezone: "Asia/Kolkata"
    type: "regular"

  post_market:
    name: "Post-Market Session"
    start: "15:30"
    end: "16:00"
    timezone: "Asia/Kolkata"
    type: "post_market"

holidays:
  - "2026-01-26"  # Republic Day
  - "2026-03-07"  # Mahashivratri
  - "2026-03-31"  # Ram Navami
  - "2026-04-03"  # Good Friday
  - "2026-04-14"  # Ambedkar Jayanti
  - "2026-05-01"  # Maharashtra Day
  - "2026-08-15"  # Independence Day
  - "2026-10-02"  # Gandhi Jayanti
  - "2026-11-04"  # Diwali (Balipratipada)
  - "2026-11-05"  # Bhai Dooj

default_timezone: "Asia/Kolkata"
