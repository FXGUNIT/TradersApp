# ml-engine/pytest.ini
# pytest configuration for TradersApp ML Engine test suite
#
# Run:
#   pytest                          # all tests
#   pytest -m unit                  # unit tests only
#   pytest -m integration          # integration tests only
#   pytest -m performance          # performance/load tests only
#   pytest -m chaos                 # chaos engineering tests only
#   pytest tests/ --cov=ml_engine   # with coverage

[pytest]
testpaths = tests
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    --cov=ml_engine
    --cov=features
    --cov=infrastructure
    --cov=training
    --cov=optimization
    --cov=alpha
    --cov=session
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    -p no:warnings

# ── Coverage thresholds ────────────────────────────────────────────────────────
# Fail CI if coverage drops below these thresholds
[coverage:run]
branch = True
source =
    ml_engine
    features
    infrastructure
    training
    optimization
    alpha
    session
omit =
    tests/*
    */site-packages/*
    */__pycache__/*

[coverage:report]
precision = 2
skip_empty = True
# Keep aligned with env.UNIT_TEST_COVERAGE_MIN in .github/workflows/ci.yml.
fail_under = 35

[coverage:html]
directory = htmlcov

# ── Markers ────────────────────────────────────────────────────────────────────
markers =
    unit: Unit tests — fast, isolated, no external services required
    integration: Integration tests — require running ML Engine or external services
    performance: Performance / load / latency tests
    chaos: Chaos engineering / fault injection tests
    slow: Tests that take >10s to run
    mlflow: Tests that require MLflow server
    redis: Tests that require Redis
    db: Tests that require the trading database
    e2e: End-to-end lifecycle tests — require all services running

# ── Asyncio ────────────────────────────────────────────────────────────────────
asyncio_mode = auto

# ── Timeout (per test) ─────────────────────────────────────────────────────────
timeout = 60

# ── Filterwarnings ────────────────────────────────────────────────────────────
# Suppress known deprecation warnings from third-party libraries
filterwarnings =
    ignore::DeprecationWarning:lightgbm
    ignore::DeprecationWarning:xgboost
    ignore::DeprecationWarning:sklearn
    ignore::DeprecationWarning:numpy
    ignore::PendingDeprecationWarning:sklearn
    ignore::UserWarning:great_expectations
