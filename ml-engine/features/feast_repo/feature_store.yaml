# Feast Feature Store Configuration
# TradersApp ML Engine — centralized, versioned feature access
#
# Online store: Redis (serves <10ms inference lookups)
# Offline store: SQLite (existing trading_data.db, upgradeable to Parquet/S3)
# Registry: local filesystem (feast_repo/.registry)
#
# Usage:
#   feast apply              — register all feature views
#   feast materialize        — materialize features to online store
#   feast get-online-features — retrieve features for inference

project: tradersapp
registry: .registry
provider: custom
custom_provider: ml_engine.features.feast_repo.custom_provider:TradersProvider

offline_store:
  type: sqlite
  path: ${FEAST_OFFLINE_PATH:ml_engine/data/trading_data.db}

online_store:
  type: redis
  connection_string: ${FEAST_REDIS_URL:redis://localhost:6379}
  ttl: 86400  # 24 hours

entity_key_serialization_version: 2

# Feature views and data sources are defined in Python files:
#   ml_engine/features/feast_repo/feature_views/
#   ml_engine/features/feast_repo/entities/
#   ml_engine/features/feast_repo/data_sources/
