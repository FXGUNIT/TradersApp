version: '3.9'

services:
  ml-engine:
    build:
      context: ./ml-engine
      dockerfile: Dockerfile
    container_name: tradersapp-ml-engine
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - PORT=8001
    ports:
      - "8001:8001"
    volumes:
      - ml_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - tradersapp

  bff:
    build:
      context: .
      dockerfile: bff/Dockerfile
    container_name: tradersapp-bff
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8788
      - ML_ENGINE_URL=http://ml-engine:8001
    ports:
      - "8788:8788"
    depends_on:
      ml-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8788/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - tradersapp

  frontend:
    image: node:20-alpine
    container_name: tradersapp-frontend
    working_dir: /app
    command: sh -c "npm install && npx vite preview --port 3000 --host"
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    depends_on:
      - bff
      - ml-engine
    networks:
      - tradersapp

networks:
  tradersapp:
    driver: bridge

volumes:
  ml_data:
    driver: local
