# ─────────────────────────────────────────────────────────────────────────────
# TradersApp — Full Production Stack Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Complete TradersApp: Frontend + BFF + ML Engine + Redis + PostgreSQL +
# MLflow + Kafka + Observability Stack.
#
# Start (full stack):
#   docker compose -f docker-compose.yml up -d
#
# Start (core only — ML Engine + BFF + Redis):
#   docker compose -f docker-compose.yml up -d redis ml-engine bff frontend
#
# Scale ML Engine:
#   docker compose up -d --scale ml-engine=3
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: traders-postgres
    environment:
      POSTGRES_USER: traders
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-traders123}
      POSTGRES_DB: mlflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traders"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: traders-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ML Engine ──────────────────────────────────────────────────────────────
  ml-engine:
    build:
      context: .
      dockerfile: Dockerfile.ml-engine
    container_name: traders-ml-engine
    ports:
      - "8001:8001"
    environment:
      DB_PATH: /data/trading_data.db
      MODEL_STORE: /models/store
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_ENABLE: "true"
      MLFLOW_TRACKING_URI: http://mlflow:5000
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: ml-engine
      OTEL_EXPORTER_JAEGER_AGENT_HOST_NAME: jaeger
      OTEL_EXPORTER_JAEGER_AGENT_PORT: "6831"
    volumes:
      - ml-data:/data
      - ml-models:/models
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  analysis-service:
    build:
      context: .
      dockerfile: Dockerfile.bff
    container_name: traders-analysis-service
    command: ["node", "analysis-server.mjs"]
    ports:
      - "50051:50051"
    environment:
      ML_ENGINE_URL: http://ml-engine:8001
      ANALYSIS_SERVICE_GRPC_PORT: 50051
      ANALYSIS_SERVICE_HEALTH_PORT: 8082
      NODE_ENV: production
    depends_on:
      ml-engine:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── BFF ───────────────────────────────────────────────────────────────────
  bff:
    build:
      context: .
      dockerfile: Dockerfile.bff
    container_name: traders-bff
    ports:
      - "8788:8788"
    environment:
      ML_ENGINE_URL: http://ml-engine:8001
      ML_ANALYSIS_TRANSPORT: ${ML_ANALYSIS_TRANSPORT:-grpc}
      ML_ANALYSIS_GRPC_ADDR: analysis-service:50051
      ML_ANALYSIS_GRPC_STRICT: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      NODE_ENV: production
    depends_on:
      ml-engine:
        condition: service_healthy
      analysis-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8788/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_BFF_URL: http://localhost:8788
        VITE_API_URL: http://localhost:8788/api
    container_name: traders-frontend
    ports:
      - "80:80"
    depends_on:
      - bff
    restart: unless-stopped

  # ── MLflow ────────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.21.3
    container_name: traders-mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_TRACKING_URI: postgresql://traders:${POSTGRES_PASSWORD:-traders123}@postgres:5432/mlflow
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_DEFAULT_REGION: us-east-1
      MLFLOW_ARTIFACT_ROOT: s3://mlflow-artifacts/
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ── MinIO ─────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: traders-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Kafka ─────────────────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: traders-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: traders-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./k8s/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    container_name: traders-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-traders123}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./k8s/observability/grafana-provisioning:/etc/grafana/provisioning:ro

  # ── Jaeger ────────────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.59
    container_name: traders-jaeger
    ports:
      - "16686:16686"
      - "6831:6831"
      - "14268:14268"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # ── Loki ─────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.2.0
    container_name: traders-loki
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
      - ./k8s/observability/loki.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml

volumes:
  postgres-data:
  redis-data:
  ml-data:
  ml-models:
  minio-data:
  kafka-data:
  prometheus-data:
  grafana-data:
  loki-data:
