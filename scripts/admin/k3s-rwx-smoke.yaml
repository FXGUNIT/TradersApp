apiVersion: v1
kind: Namespace
metadata:
  name: rwx-smoke
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-rwx-smoke
  namespace: rwx-smoke
spec:
  accessModes:
  - ReadWriteMany
  storageClassName: shared-rwx
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: rwx-writer
  namespace: rwx-smoke
spec:
  restartPolicy: Never
  containers:
  - name: writer
    image: rancher/mirrored-library-busybox:1.37.0
    command: ["sh", "-c", "echo shared-rwx-ok > /data/probe.txt; sleep 3600"]
    volumeMounts:
    - name: data
      mountPath: /data
  volumes:
  - name: data
    persistentVolumeClaim:
      claimName: shared-rwx-smoke
---
apiVersion: v1
kind: Pod
metadata:
  name: rwx-reader
  namespace: rwx-smoke
spec:
  restartPolicy: Never
  containers:
  - name: reader
    image: rancher/mirrored-library-busybox:1.37.0
    command: ["sh", "-c", "while [ ! -f /data/probe.txt ]; do sleep 1; done; cat /data/probe.txt; sleep 3600"]
    volumeMounts:
    - name: data
      mountPath: /data
  volumes:
  - name: data
    persistentVolumeClaim:
      claimName: shared-rwx-smoke
