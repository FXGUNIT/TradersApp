when:
  event: [push, pull_request, manual]

steps:
  - name: verify-frontend
    image: node:22-alpine
    pull: true
    depends_on: []
    commands:
      - npm ci
      - npm run lint
      - VITE_BFF_URL=http://127.0.0.1:8788 VITE_API_URL=http://127.0.0.1:8788/api npm run build

  - name: verify-bff
    image: node:22-alpine
    pull: true
    depends_on: []
    commands:
      - cd bff
      - npm ci
      - find . -name '*.mjs' -print0 | xargs -0 -n1 node --check
      - node --input-type=module -e "import('./metrics.mjs')"

  - name: verify-ml-engine
    image: python:3.11-slim
    pull: true
    depends_on: []
    commands:
      - cd ml-engine
      - python -m pip install --upgrade pip
      - pip install -r requirements.txt pytest
      - pytest tests/ -q --maxfail=1
      - python -m py_compile main.py infrastructure/prometheus_exporter.py infrastructure/tracing.py

  - name: verify-k8s
    image: alpine/helm:3.17.3
    pull: true
    depends_on: []
    commands:
      - sh scripts/ci/verify-k8s.sh

  - name: publish-frontend
    image: woodpeckerci/plugin-docker-buildx
    pull: true
    privileged: true
    depends_on: [verify-frontend, verify-bff, verify-ml-engine, verify-k8s]
    settings:
      registry:
        from_secret: registry_host
      repo: ${CI_REPO_OWNER}/frontend
      context: .
      dockerfile: Dockerfile.frontend
      tags:
        - ${CI_COMMIT_SHA}
        - latest
      username:
        from_secret: registry_username
      password:
        from_secret: registry_password
    when:
      - event: push
        branch: main

  - name: publish-bff
    image: woodpeckerci/plugin-docker-buildx
    pull: true
    privileged: true
    depends_on: [verify-frontend, verify-bff, verify-ml-engine, verify-k8s]
    settings:
      registry:
        from_secret: registry_host
      repo: ${CI_REPO_OWNER}/bff
      context: .
      dockerfile: Dockerfile.bff
      tags:
        - ${CI_COMMIT_SHA}
        - latest
      username:
        from_secret: registry_username
      password:
        from_secret: registry_password
    when:
      - event: push
        branch: main

  - name: publish-ml-engine
    image: woodpeckerci/plugin-docker-buildx
    pull: true
    privileged: true
    depends_on: [verify-frontend, verify-bff, verify-ml-engine, verify-k8s]
    settings:
      registry:
        from_secret: registry_host
      repo: ${CI_REPO_OWNER}/ml-engine
      context: .
      dockerfile: Dockerfile.ml-engine
      tags:
        - ${CI_COMMIT_SHA}
        - latest
      username:
        from_secret: registry_username
      password:
        from_secret: registry_password
    when:
      - event: push
        branch: main

  - name: publish-mlflow
    image: woodpeckerci/plugin-docker-buildx
    pull: true
    privileged: true
    depends_on: [verify-frontend, verify-bff, verify-ml-engine, verify-k8s]
    settings:
      registry:
        from_secret: registry_host
      repo: ${CI_REPO_OWNER}/mlflow
      context: .
      dockerfile: Dockerfile.mlflow
      tags:
        - ${CI_COMMIT_SHA}
        - latest
      username:
        from_secret: registry_username
      password:
        from_secret: registry_password
    when:
      - event: push
        branch: main

  - name: deploy-k3s
    image: alpine/k8s:1.32.13
    pull: true
    depends_on: [publish-frontend, publish-bff, publish-ml-engine, publish-mlflow]
    environment:
      REGISTRY_HOST:
        from_secret: registry_host
      REGISTRY_USERNAME:
        from_secret: registry_username
      REGISTRY_PASSWORD:
        from_secret: registry_password
      KUBECONFIG_B64:
        from_secret: k3s_kubeconfig_b64
      K8S_NAMESPACE:
        from_secret: k8s_namespace
      K8S_REGISTRY_SECRET:
        from_secret: k8s_registry_secret
      K8S_RELEASE_NAME: tradersapp
      K8S_HELM_VALUES_FILE: k8s/helm/tradersapp/values.prod.yaml
    commands:
      - sh scripts/ci/deploy-k3s.sh
    when:
      - event: push
        branch: main
