// TradersApp gRPC + Kafka Schema Definitions
// Proto3 definitions for all inter-service messages.
//
// Compiled with: protoc --python_out=. proto/*.proto
// Requires: pip install protobuf grpcio grpcio-tools

syntax = "proto3";

package traders;

option java_multiple_files = true;
option java_package = "com.tradersapp.proto";

// ─── Candle Data ────────────────────────────────────────────────────────────────

message Candle {
  string symbol = 1;
  string timestamp = 2;  // ISO 8601 UTC
  double open = 3;
  double high = 4;
  double low = 5;
  double close = 6;
  double volume = 7;
}

message CandleBatch {
  string symbol = 1;
  repeated Candle candles = 2;
  string received_at = 3;  // ISO 8601
}

// ─── Consensus Signal ────────────────────────────────────────────────────────────

message ModelVote {
  string model_name = 1;
  string signal = 2;          // LONG | SHORT | NEUTRAL
  double probability_long = 3;
  double probability_short = 4;
  double confidence = 5;
  string primary_reason = 6;
  map<string, double> top_factors = 7;
}

message ConsensusSignal {
  string symbol = 1;
  string signal = 2;          // LONG | SHORT | NEUTRAL
  double confidence = 3;
  double long_score = 4;
  double short_score = 5;
  double score_margin = 6;
  repeated ModelVote votes = 7;
  string generated_at = 8;    // ISO 8601
  string regime = 9;
  map<string, string> timing = 10;  // timing recommendations
}

// ─── Trade Outcome ──────────────────────────────────────────────────────────────

message TradeOutcome {
  string trade_id = 1;
  string signal_id = 2;       // Links to signal that triggered the trade
  string symbol = 3;
  string direction = 4;        // LONG | SHORT
  string result = 5;           // win | loss | breakeven
  double pnl_ticks = 6;
  double pnl_dollars = 7;
  string entry_time = 8;      // ISO 8601
  string exit_time = 9;
  string amd_phase = 10;
  double confidence = 11;
  string regime = 12;
}

// ─── Drift Alert ───────────────────────────────────────────────────────────────

message DriftAlert {
  string alert_type = 1;      // feature | concept | regime
  string severity = 2;        // warning | alert | critical
  double metric_value = 3;
  double threshold = 4;
  string description = 5;
  string triggered_at = 6;    // ISO 8601
}

// ─── Service ───────────────────────────────────────────────────────────────────

service TradersService {
  rpc StreamCandles(stream Candle) returns (stream ConsensusSignal);
  rpc GetConsensus(CandleBatch) returns (ConsensusSignal);
}
