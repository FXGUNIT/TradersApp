syntax = "proto3";

package traders.ddd.v1;

option java_multiple_files = true;
option java_package = "com.tradersapp.ddd.v1";

// ─────────────────────────────────────────────────────────────────────────────
// Common Messages — Shared Across All Bounded Contexts
//
// These messages are imported by all service definitions.
// Any changes must be backward-compatible.
// ─────────────────────────────────────────────────────────────────────────────

// ─── Core Primitives ─────────────────────────────────────────────────────────

message HealthRequest {
  string service_name = 1;
}

message HealthResponse {
  bool ok = 1;
  string service = 2;
  string version = 3;
  string status = 4;
  map<string, string> component_status = 5;
  string timestamp = 6;
}

message TrainResult {
  bool ok = 1;
  string run_id = 2;
  string message = 3;
  string timestamp = 4;
}

// ─── Market Data ─────────────────────────────────────────────────────────────

message Candle {
  string symbol = 1;
  string timestamp = 2;  // ISO8601
  double open = 3;
  double high = 4;
  double low = 5;
  double close = 6;
  double volume = 7;
}

message CandleBatch {
  string symbol = 1;
  repeated Candle candles = 2;
  string source = 3;            // "ninjatrader", "kafka", "manual"
  string ingestion_timestamp = 4;
}

message Trade {
  string symbol = 1;
  string direction = 2;         // "LONG" or "SHORT"
  string entry_time = 3;        // ISO8601
  string exit_time = 4;         // ISO8601
  double pnl_ticks = 5;
  double pnl_dollars = 6;
  string result = 7;           // "win", "loss", "breakeven"
  string close_reason = 8;     // "stop_hit", "tp_hit", "manual", "signal_reversal"
}

// ─── Feature Data ─────────────────────────────────────────────────────────────

message FeatureImportance {
  string feature_name = 1;
  double importance = 2;
}

message FeatureVector {
  // OHLCV (5)
  double open = 1;
  double high = 2;
  double low = 3;
  double close = 4;
  double volume = 5;

  // Candle math (9)
  double tr = 6;
  double atr = 7;
  double atr_pct = 8;
  double log_return = 9;
  double intrabar_momentum = 10;
  double range = 11;
  double range_pct = 12;
  double upper_wick_pct = 13;
  double lower_wick_pct = 14;

  // Volatility (4)
  double rolling_std_10 = 15;
  double rolling_std_20 = 16;
  double realized_vol = 17;
  double volatility_regime = 18;

  // Momentum (2)
  double momentum_3bar = 19;
  double momentum_5bar = 20;

  // Volume (1)
  double volume_ratio_5 = 21;

  // Time (8)
  int32 hour_of_day = 22;
  int32 day_of_week = 23;
  double session_pct = 24;
  int32 minutes_into_session = 25;
  int32 session_id = 26;
  bool is_first_30min = 27;
  bool is_last_30min = 28;
  bool is_lunch_hour = 29;

  // Key levels (4)
  double price_to_pdh = 30;
  double price_to_pdl = 31;
  double near_level = 32;
  double vwap_slope_entry = 33;

  // Indicators (6)
  double adx = 34;
  double ci = 35;
  double vwap = 36;
  double vr = 37;
  double sweep_prob = 38;
  double amd_phase = 39;   // Encoded: 0=ACCUMULATION, 1=MANIPULATION, 2=DISTRIBUTION, 3=TRANSITION, 4=UNCLEAR

  // Historical (5)
  double win_rate_20 = 40;
  double win_rate_50 = 41;
  double expectancy_20 = 42;
  double profit_factor_20 = 43;
  double vr_regime = 44;
}

// ─── MathEngine Snapshot ──────────────────────────────────────────────────────
// Mirrors MathEngine.js state for inference

message MathEngineSnapshot {
  double close = 1;
  double open = 2;
  double high = 3;
  double low = 4;
  double volume = 5;
  double vr = 6;
  double adx = 7;
  double ci = 8;
  double vwap = 9;
  double vwap_slope = 10;
  double sweep_prob = 11;
  string amd_phase = 12;  // "ACCUMULATION", "MANIPULATION", "DISTRIBUTION", "TRANSITION", "UNCLEAR"
  string volatility_regime = 13;  // "LOW", "NORMAL", "HIGH"
  double timestamp_unix = 14;
}

// ─── Key Levels ─────────────────────────────────────────────────────────────

message KeyLevels {
  double pdh = 1;   // Previous Day High
  double pdl = 2;  // Previous Day Low
  double pwh = 3;  // Previous Week High
  double pwl = 4;  // Previous Week Low
  double pdh_yesterday = 5;
  double pdl_yesterday = 6;
}

// ─── Regime Output ───────────────────────────────────────────────────────────

message RegimeOutput {
  string regime = 1;                            // "COMPRESSION", "NORMAL", "EXPANSION"
  int32 regime_id = 2;                       // 0=COMPRESSION, 1=NORMAL, 2=EXPANSION
  double regime_confidence = 3;                // 0.0-1.0

  // HMM
  double hmm_state = 4;
  double hmm_probability = 5;

  // FP-FK PDE
  double q_parameter = 6;
  string q_regime = 7;
  double diffusion_exponent = 8;
  double wave_speed = 9;
  double wave_acceleration = 10;
  double criticality_index = 11;
  double deleverage_signal = 12;
  string deleverage_reason = 13;

  // Anomalous Diffusion / Hurst
  double hurst_h = 14;
  string diffusion_type = 15;  // "sub", "normal", "super"
  double multifractality = 16;

  // Risk adjustments
  double stop_multiplier = 17;
  string signal_adjustment = 18;  // "REDUCE", "BALANCED", "INCREASE"
  string explanation = 19;
}

// ─── Timing Output ───────────────────────────────────────────────────────────

message TimingOutput {
  bool enter_now = 1;
  double P_profitable_entry_now = 2;  // 0.0-1.0
  double confidence = 3;
  string current_bucket = 4;          // e.g. "09:30-09:35"
  string recommendation = 5;          // "ENTER_LONG", "ENTER_SHORT", "WAIT"
  repeated string best_buckets = 6;    // Top 3 most profitable time buckets
}

// ─── Alpha Output ────────────────────────────────────────────────────────────

message AlphaOutput {
  double alpha_score = 1;                // Composite alpha (0.0-1.0)
  double momentum_signal = 2;
  double mean_reversion_signal = 3;
  double regime_adjustment = 4;
  double session_adjustment = 5;
  string dominant_pattern = 6;
  string reasoning = 7;
}

// ─── Exit Strategy Output ────────────────────────────────────────────────────

message ExitOutput {
  string primary_exit = 1;                // "fixed", "partial_close", "trailing"
  string trailing_method = 2;            // "atr", "ticks", "percentage"
  int32 trailing_ticks = 3;
  double partial_close_pct = 4;
  int32 hold_minutes = 5;

  // Fixed exits
  int32 sl_ticks = 6;
  int32 tp1_ticks = 7;
  int32 tp2_ticks = 8;
  int32 tp3_ticks = 9;

  // RRR
  double recommended_rrr = 10;
  double min_acceptable_rrr = 11;

  repeated ExitTrigger triggers = 12;
}

message ExitTrigger {
  string trigger_type = 1;  // "rrr_ratio", "time", "trailing", "regime_change", "news"
  string description = 2;
  double threshold = 3;
}

// ─── Position Sizing Output ──────────────────────────────────────────────────

message PositionSizingOutput {
  double kelly_fraction = 1;
  double max_risk_pct = 2;
  int32 max_contracts = 3;
  double recommended_contracts = 4;
  string sizing_method = 5;  // "kelly", "fixed_fractional", "volatility_adjusted"
  double risk_dollars = 6;
  double account_balance_pct = 7;
}

// ─── Expected Move ──────────────────────────────────────────────────────────

message ExpectedMoveOutput {
  int32 tp1_ticks = 1;
  int32 tp2_ticks = 2;
  int32 tp3_ticks = 3;
  int32 conservative_ticks = 4;
  int32 expected_ticks = 5;
  int32 aggressive_ticks = 6;
  double uncertainty_band = 7;
  repeated HorizonMove horizons = 8;
}

message HorizonMove {
  int32 horizon_candles = 1;  // 1, 3, 5, 10
  int32 conservative_ticks = 2;
  int32 expected_ticks = 3;
  int32 aggressive_ticks = 4;
}

// ─── Drift Detection ─────────────────────────────────────────────────────────

message DriftEvaluationResult {
  bool drift_detected = 1;
  string severity = 2;  // "LOW", "MEDIUM", "HIGH", "CRITICAL"
  double score = 3;
  double threshold = 4;
  string drift_type = 5;  // "feature", "concept", "regime"
  string affected_features = 6;
  string message = 7;
  string timestamp = 8;
}

// ─── Portfolio ───────────────────────────────────────────────────────────────

message PortfolioSummary {
  int32 total_trades = 1;
  int32 wins = 2;
  int32 losses = 3;
  double win_rate = 4;
  double profit_factor = 5;
  double expectancy = 6;
  double max_drawdown_pct = 7;
  double max_drawdown_dollars = 8;
  double running_balance = 9;
  double sharpe_ratio = 10;
  double sortino_ratio = 11;
}

// ─── Signal Delivery ─────────────────────────────────────────────────────────

message SignalResponse {
  bool ok = 1;
  string error = 2;
  string signal = 3;         // "LONG", "SHORT", "NEUTRAL"
  double confidence = 4;
  RegimeOutput regime = 5;
  ExitOutput exit_plan = 6;
  PositionSizingOutput position_sizing = 7;
  AlphaOutput alpha = 8;
  TimingOutput timing = 9;
  ExpectedMoveOutput expected_move = 10;
  repeated ModelVote votes = 11;
  double latency_ms = 12;
  string timestamp = 13;
}

message ModelVote {
  string model_name = 1;
  double confidence = 2;
  string signal = 3;
  double probability_long = 4;
  double probability_short = 5;
}

// ─── Circuit Breaker ─────────────────────────────────────────────────────────

message CircuitBreakerStatus {
  string name = 1;
  string state = 2;  // "CLOSED", "HALF_OPEN", "OPEN"
  int32 failure_count = 3;
  string last_failure_age_s = 4;
  int32 recovery_timeout_s = 5;
  bool is_available = 6;
}

