syntax = "proto3";

package traders.ddd.v1;

option java_multiple_files = true;
option java_package = "com.tradersapp.ddd.v1";

message HealthRequest {}

message HealthResponse {
  bool ok = 1;
  string service = 2;
  string version = 3;
  string timestamp = 4;
}

message Candle {
  string symbol = 1;
  string timestamp = 2;
  double open = 3;
  double high = 4;
  double low = 5;
  double close = 6;
  double volume = 7;
}

message CandleBatch {
  string symbol = 1;
  repeated Candle candles = 2;
  string source = 3;
}

message Trade {
  string symbol = 1;
  string direction = 2;
  string entry_time = 3;
  string exit_time = 4;
  double pnl_ticks = 5;
  double pnl_dollars = 6;
  string result = 7;
}

message TrainResult {
  bool ok = 1;
  string run_id = 2;
  string message = 3;
}

